<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I am the best</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f9f9;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      color: #222;
    }

    .toggle {
      display: flex;
      background: #e8e8e8;
      border-radius: 999px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }

    .toggle button {
      border: none;
      background: transparent;
      padding: 10px 28px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      color: #888;
    }

    .toggle button.active {
      background: #fff;
      color: #222;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .video-wrapper {
      width: 100%;
      max-width: 1400px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    video {
      width: 100%;
      display: block;
    }

    footer {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="toggle">
    <button class="active" onclick="switchVideo('ko', this)">🇰🇷 한국어</button>
    <button onclick="switchVideo('en', this)">CA English</button>
  </div>

  <div class="video-wrapper">
    <video id="player" controls preload="metadata">
      <source id="source" src="내가제일잘나가.mp4" type="video/mp4" />
      이 브라우저는 비디오 재생을 지원하지 않습니다.
    </video>
  </div>

  <footer>halmoni-school</footer>

  <script>
    function switchVideo(lang, btn) {
      const video = document.getElementById('player');
      const source = document.getElementById('source');
      const currentTime = video.currentTime;
      const wasPlaying = !video.paused;

      source.src = lang === 'ko' ? '내가제일잘나가.mp4' : 'Iamthebest.mp4';
      video.load();
      video.currentTime = currentTime;
      if (wasPlaying) video.play();

      document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
