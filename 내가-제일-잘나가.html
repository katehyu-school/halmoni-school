<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내가 제일 잘나가</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f9f9;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      color: #222;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .video-wrapper {
      width: 100%;
      max-width: 1400px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    video {
      width: 100%;
      display: block;
    }

    footer {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="video-wrapper">
    <video controls preload="metadata">
      <source src="Iamthebest.mp4" type="video/mp4" />
      이 브라우저는 비디오 재생을 지원하지 않습니다.
    </video>
  </div>

  <footer>halmoni-school</footer>

</body>
</html>
