// ══════════════════════════════════════════════════════
// ── LEVEL 1 TEST ───────────────────────────────────────
// ══════════════════════════════════════════════════════
const L1Q=[
  {ep:'ep01',type:'mc',q:'처음 만났을 때 하는 인사는?',en:'Which phrase means "Nice to meet you"?',opts:['만나서 반가워요','잘 있어요','잘 먹겠습니다','안녕히 가세요'],ans:0,exp:'만나서 반가워요 = Nice to meet you! ep01 첫 만남 표현이에요.'},
  {ep:'ep01',type:'mc',q:'"저는 정민이에요" — 저는 의 뜻은?',en:'"저는 정민이에요" — 저는 means?',opts:['I (formal) 저 = formal I','you 당신','he 그','she 그녀'],ans:0,exp:'저 = I (formal/polite). 친구에게는 나는, 어른에게는 저는을 써요.'},
  {ep:'ep03',type:'listen',audio:'잘 먹겠습니다!',q:'잘 먹겠습니다 — 언제 써요?',en:'When do you say 잘 먹겠습니다?',opts:['밥 먹기 전 — before eating','밥 먹은 후 — after eating','잘 때 — when sleeping','학교 갈 때 — going to school'],ans:0,exp:'잘 먹겠습니다 = I will eat well! 식사 전에 하는 한국 인사예요.'},
  {ep:'ep03',type:'mc',q:'"김치를 먹어요" — 를 의 역할은?',en:'What is the role of 를 in "김치를 먹어요"?',opts:['주어 표시 subject marker','목적어 표시 object marker','장소 표시 location marker','주제 표시 topic marker'],ans:1,exp:'을/를 = object marker. 동사의 대상(무엇을)을 표시해요.'},
  {ep:'ep05',type:'listen',audio:'사과 두 개 주세요.',q:'사과를 몇 개 주문했어요?',en:'How many apples were ordered?',opts:['한 개 one','두 개 two','세 개 three','네 개 four'],ans:1,exp:'두 = two (고유어). 하나/둘/셋/넷은 단위명사 앞에서 한/두/세/네로 바뀌어요.'},
  {ep:'ep05',type:'mc',q:'얼마예요? 의 뜻은?',en:'What does 얼마예요? mean?',opts:['어디예요? Where is it?','얼마예요? How much is it?','뭐예요? What is it?','누구예요? Who is it?'],ans:1,exp:'얼마예요? = How much is it? 가격을 물을 때 써요.'},
  {ep:'ep06',type:'mc',q:'"김밥 2인분 주세요" — 인분 의 뜻은?',en:'"김밥 2인분 주세요" — what does 인분 mean?',opts:['a bottle 병','a cup 잔','a serving/portion 인분','a piece 개'],ans:2,exp:'인분 = serving / portion. 식당에서 음식 주문할 때 쓰는 단위예요.'},
  {ep:'ep07',type:'mc',q:'한국어 어순은?',en:'What is Korean word order?',opts:['SVO (영어처럼)','SOV (주어-목적어-동사)','VSO (동사 먼저)','OVS (목적어 먼저)'],ans:1,exp:'한국어는 SOV — 동사가 항상 문장 끝에! 나는 밥을 먹어요. (I rice eat)'},
  {ep:'ep04',type:'listen',audio:'몇 시에 만날까?',q:'이 문장의 뜻은?',en:'What does this sentence mean?',opts:['What time shall we meet?','Where shall we meet?','Who are we meeting?','When shall we eat?'],ans:0,exp:'몇 시에 = at what time. 만날까? = shall we meet? 약속 잡을 때 써요.'},
  {ep:'ep04',type:'mc',q:'"도서관에서 공부해요" — 에서 의 역할은?',en:'What does 에서 mark in "도서관에서 공부해요"?',opts:['목적어 object','행동 장소 action location','방향 direction','도구 instrument'],ans:1,exp:'에서 = at/in (for actions). 무언가를 하는 장소 앞에 써요. 에 = location of existence.'},
  {ep:'ep08',type:'listen',audio:'가방이 의자 위에 있어요.',q:'가방은 어디에 있어요?',en:'Where is the bag?',opts:['의자 위 on the chair','의자 아래 under the chair','의자 옆 next to the chair','의자 앞 in front of the chair'],ans:0,exp:'위에 = on top of / above. 아래에 = below. 위/아래/옆/앞/뒤 위치 표현!'},
  {ep:'ep08',type:'mc',q:'"열쇠가 없어요" — 없어요 의 반대말은?',en:'What is the opposite of 없어요?',opts:['있어요 it exists / it\'s here','가요 going','먹어요 eating','해요 doing'],ans:0,exp:'있어요 ↔ 없어요. There is ↔ There isn\'t. 위치 표현의 핵심!'},
  {ep:'ep09',type:'mc',q:'고유어 숫자 "여섯" 은?',en:'Native Korean number "여섯" = ?',opts:['5 다섯','6 여섯','7 일곱','8 여덟'],ans:1,exp:'고유어 숫자: 하나(1) 둘(2) 셋(3) 넷(4) 다섯(5) 여섯(6) 일곱(7) 여덟(8)'},
  {ep:'ep09',type:'listen',audio:'딸기 한 박스 주세요.',q:'뭘 주문했어요?',en:'What was ordered?',opts:['딸기 한 박스 one box of strawberries','사과 한 박스 one box of apples','딸기 두 박스 two boxes of strawberries','포도 한 박스 one box of grapes'],ans:0,exp:'딸기 = strawberries. 한 박스 = one box. 한 = 하나 단위 앞에서!'},
  {ep:'ep10',type:'mc',q:'"어제 뭐 했어요?" — 했어요 는 어떤 시제?',en:'"했어요" — which tense is this?',opts:['현재 present','과거 past','미래 future','진행 progressive'],ans:1,exp:'했어요 = 하다 + 았어요 → 했어요. 과거형! 어제(yesterday)와 함께 써요.'},
  {ep:'ep10',type:'listen',audio:'자전거를 타고 있어요.',q:'지금 뭐 하고 있어요?',en:'What are they doing right now?',opts:['자전거 타기 riding a bike','밥 먹기 eating','자기 sleeping','공부하기 studying'],ans:0,exp:'타고 있어요 = is riding (진행형). ~고 있어요 = be + -ing!'},
  {ep:'ep11',type:'listen',audio:'어서 오세요.',q:'어서 오세요 — 언제 써요?',en:'When do you use 어서 오세요?',opts:['손님이 왔을 때 when a guest arrives','밥 먹을 때 when eating','잘 때 when sleeping','공부할 때 when studying'],ans:0,exp:'어서 오세요 = Welcome! 손님이 왔을 때, 가게에 들어왔을 때 써요.'},
  {ep:'ep11',type:'mc',q:'"어떻게 지내셨어요?" — 셨어요 의 역할은?',en:'What does -셨어요 do in "어떻게 지내셨어요?"?',opts:['과거 부정 past negative','높임 표현 honorific marker','미래 표현 future tense','의문문 question marker'],ans:1,exp:'-셨어요 = honorific past. 어른이나 존중하는 사람에게 써요. 지냈어요 → 지내셨어요!'},
  {ep:'ep11',type:'mc',q:'"덕분에 잘 지내고 있어요" — 덕분에 의 뜻은?',en:'What does 덕분에 mean?',opts:['thanks to you 덕분에','in spite of you','without you','instead of you'],ans:0,exp:'덕분에 = thanks to you / owing to you. 따뜻하고 겸손한 표현이에요!'},
  {ep:'ep11',type:'mc',q:'"얘들아, 인사해야지!" — 해야지 의 뜻은?',en:'What does ~해야지 mean?',opts:['하지 마! don\'t do it','해야 해 you should do it (gentle)','했어 I did it','할 거야 I will do it'],ans:1,exp:'~해야지 = you should (gentle nudge). 부모님이 아이에게 부드럽게 권유할 때 써요.'},
  {ep:'ep12',type:'listen',audio_text:'경복궁도 방문할 거예요.',q:'방문할 거예요 — 이 표현의 시제는?',en:'방문할 거예요 — what tense is this?',opts:['미래 future','과거 past','현재 present','불확실 uncertain'],ans:0,exp:'-(으)ㄹ 거예요 = future tense! 방문할 거예요 = going to visit. 미래 계획 표현이에요.'},
  {ep:'ep12',type:'mc',q:'"갈 수 있어요" — 수 있어요 의 뜻은?',en:'What does -(으)ㄹ 수 있어요 mean?',opts:['can do 할 수 있다','must do 해야 한다','did already 이미 했다','will not do 안 할 거다'],ans:0,exp:'-(으)ㄹ 수 있어요 = can / able to. 능력과 가능성을 나타내요! 반대: 수 없어요 / 못 + verb'},
];

let ltIdx=0,ltScore=0,ltAnswered=false;

function loadLevelTest(){
  document.querySelectorAll('.ep-item,.lt-item').forEach(el=>el.classList.remove('active'));
  const si=document.getElementById('lt-sidebar-item');
  if(si)si.classList.add('active');
  ltIdx=0;ltScore=0;ltAnswered=false;
  document.getElementById('content-area').innerHTML=renderLTPage();
  renderLT();
}
function renderLTPage(){
  return`<div class="lt-page">`
    +`<div class="lt-header">`
      +`<div class="lt-title">🏆 Level 1 마감 테스트</div>`
      +`<div class="lt-subtitle">ep01~ep12 · 전체 복습 · 22문제</div>`
      +`<div class="lt-prog-bar"><div class="lt-prog-fill" id="lt-prog-fill" style="width:0%"></div></div>`
      +`<div class="lt-prog-label" id="lt-prog-label">0 / 20</div>`
    +`</div>`
    +`<div id="lt-q-area"></div>`
  +`</div>`;
}
function renderLT(){
  const q=L1Q[ltIdx];
  const progPct=Math.round(ltIdx/L1Q.length*100);
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width=progPct+'%';
  if(pl)pl.textContent=ltIdx+' / '+L1Q.length;
  ltAnswered=false;
  const area=document.getElementById('lt-q-area');
  if(!area)return;
  const listenBtn=q.type==='listen'
    ?`<button class="lt-listen-btn" onclick="speakTTS('${q.audio.replace(/'/g,"\'")}')">🔊 듣기</button><br>`
    :'';
  area.innerHTML=
    `<div class="lt-ep-badge">${q.ep.toUpperCase()} · ${q.ep==='ep01'?'자기소개':q.ep==='ep02'?'식사':q.ep==='ep03'?'쇼핑':q.ep==='ep04'?'주문':q.ep==='ep05'?'한국어 소개':q.ep==='ep06'?'약속':q.ep==='ep07'?'위치':q.ep==='ep08'?'시장':q.ep==='ep09'?'소풍':'손님 초대'}</div>`
    +`<div class="lt-q-text">${ltIdx+1}. ${q.q}</div>`
    +`<div class="lt-q-en">${q.en}</div>`
    +listenBtn
    +`<div class="lt-opts">`
    +q.opts.map((o,i)=>`<button class="lt-opt" id="lt-opt-${i}" onclick="ltChoose(${i})">${o}</button>`).join('')
    +`</div><div id="lt-exp-area"></div>`;
}
function ltChoose(idx){
  if(ltAnswered)return;
  ltAnswered=true;
  const q=L1Q[ltIdx];
  const correct=q.ans===idx;
  if(correct)ltScore++;
  q.opts.forEach((_,i)=>{
    const el=document.getElementById('lt-opt-'+i);
    if(!el)return;
    el.disabled=true;
    if(i===q.ans)el.classList.add('correct');
    else if(i===idx&&!correct)el.classList.add('wrong');
  });
  document.getElementById('lt-exp-area').innerHTML=
    `<div class="lt-exp">${correct?'✅':'❌'} ${q.exp}</div>`
    +`<button class="lt-next-btn" onclick="ltNext()">${ltIdx===L1Q.length-1?'📊 결과 보기':'다음 →'}</button>`;
}
function ltNext(){
  ltIdx++;
  if(ltIdx>=L1Q.length){renderLTScore();return;}
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width=Math.round(ltIdx/L1Q.length*100)+'%';
  if(pl)pl.textContent=ltIdx+' / '+L1Q.length;
  renderLT();
}
function renderLTScore(){
  const total=L1Q.length;
  const pct=Math.round(ltScore/total*100);
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width='100%';
  if(pl)pl.textContent=total+' / '+total;
  let grade,color,msg,next;
  if(pct>=90){grade='A';color='#2e7d50';msg='🏆 완벽해요!';next='Level 2로 갈 준비 됐어요! 🚀';}
  else if(pct>=80){grade='B';color='var(--teal-dark)';msg='🌟 잘했어요!';next='조금만 더 연습하면 Level 2 도전할 수 있어요!';}
  else if(pct>=70){grade='C';color='var(--amber-600)';msg='👍 괜찮아요!';next='헷갈린 에피소드를 복습하고 다시 도전해봐요!';}
  else{grade='D';color='#c0392b';msg='💪 더 연습해요!';next='Level 1 에피소드를 다시 복습하고 재도전해봐요!';}
  document.getElementById('lt-q-area').innerHTML=
    `<div class="lt-score-wrap">`
    +`<div class="lt-grade" style="color:${color}">${grade}</div>`
    +`<div class="lt-grade-lbl" style="color:${color}">${msg}</div>`
    +`<div class="lt-score-detail">`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${ltScore}/${total}</div><div class="lt-score-box-lbl">정답</div></div>`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${pct}%</div><div class="lt-score-box-lbl">정확도</div></div>`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${total-ltScore}</div><div class="lt-score-box-lbl">오답</div></div>`
    +`</div>`
    +`<div style="font-size:13px;color:var(--warm-600);margin:12px 0 20px;line-height:1.6;">${next}</div>`
    +`<button class="lt-retry-btn" onclick="ltRetry()">↺ 다시 풀기</button>`
    +`</div>`;
}
function ltRetry(){
  ltIdx=0;ltScore=0;ltAnswered=false;
  document.getElementById('content-area').innerHTML=renderLTPage();
  renderLT();
}

async function loadEp(epId){
  document.querySelectorAll('.ep-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('ep-item-'+epId);
  if(item)item.classList.add('active');
  document.getElementById('content-area').innerHTML='<div class="loading">로딩 중…</div>';
  // Use cache if already loaded; otherwise fetch JSON
  if(EPISODE_DATA[epId]){
    DATA=EPISODE_DATA[epId];
  } else {
    try{
      const res=await fetch(`data/nhs/L1/${epId}.json`);
      if(res.ok){ DATA=await res.json(); EPISODE_DATA[epId]=DATA; }
      else DATA=null;
    }catch(e){ DATA=null; }
  }
  if(!DATA){
    document.getElementById('content-area').innerHTML='<div class="loading">⚠️ 에피소드 데이터가 없어요.</div>';
    return;
  }
  // Preload slide images so first slide appears without delay
  if(DATA.slides) DATA.slides.forEach(s=>{const img=new Image();img.src=s;});
  qAnswered={};curTab='script';sceneIdx=0;render();
}

function render(){
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const baseLabels=['📽 영상·Script','새어휘 Vocab','문법 Grammar','발음 Pron','반말/존댓말','Usage','Quiz','Real Life'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const labels=DATA.self_check&&DATA.self_check.length?[...baseLabels,'✅ 자기점검']:[...baseLabels];
  document.getElementById('content-area').innerHTML=`
    <div class="ep-header">
      <div class="ep-num-badge">EP.${(DATA.id||'ep01').replace('ep','')} · ${esc(DATA.level)}</div>
      <div class="ep-title-wrap"><div class="ep-title-kr">${esc(DATA.title)}</div><div class="ep-title-en">${esc(DATA.title_en)}${DATA.goal&&DATA.goal.en?` <span class="ep-goal-badge">🎯 ${esc(DATA.goal.en)}</span>`:''}</div></div>
      <div class="ep-scene-badge">${esc(DATA.scene)}</div>
    </div>
    <div class="tab-bar">${tabs.map((t,i)=>`<button class="tab-btn${curTab===t?' active':''}" onclick="showTab('${t}')">${labels[i]}</button>`).join('')}</div>
    <div class="tab-panels">${tabs.map(t=>`<div id="panel-${t}" class="tab-panel${curTab===t?' active':''}"></div>`).join('')}</div>`;
  fillAllPanels();
}

function fillAllPanels(){
  document.getElementById('panel-script').innerHTML=buildScript();
  document.getElementById('panel-vocab').innerHTML=buildVocab();
  document.getElementById('panel-grammar').innerHTML=buildGrammar();
  document.getElementById('panel-banmal').innerHTML=buildBanmal();
  document.getElementById('panel-usage').innerHTML=buildUsage();
  document.getElementById('panel-pron').innerHTML=buildPron();
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  document.getElementById('panel-reallife').innerHTML=buildRealLife();
  if(DATA.self_check&&DATA.self_check.length){
    const sc=document.getElementById('panel-selfcheck');
    if(sc)sc.innerHTML=buildSelfCheck();
  }
  requestAnimationFrame(initSceneViewer);
}

function showTab(name){
  curTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const idx=tabs.indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('panel-'+name);
  if(p)p.classList.add('active');
  if(name==='script')requestAnimationFrame(initSceneViewer);
  if(name==='quiz'){quizIdx=0;quizScore=0;const qp=document.getElementById('panel-quiz');if(qp)qp.innerHTML=buildQuiz();renderQuizQ();}
}

// ── SCRIPT / SCENE VIEWER ──────────────────────────────
function buildScript(){
  if(DATA.video) return buildVideoScript();
  return `<div class="scene-wrap"><div class="scene-col">
    <div class="scene-panel" id="scene-panel"><div class="scene-loc">${esc(DATA.scene)}</div><div class="clova-credit" id="clova-credit">클로바더빙의 AI 보이스가 사용되었습니다.</div><button class="speak-btn" id="speak-btn">🎤 말해보기</button></div>
    <div class="scene-caption" id="scene-caption"></div>
    <div class="scene-nav">
      <button class="nav-btn" id="nav-prev" onclick="moveScene(-1)">&#8249;</button>
      <div class="nav-progress"><div class="nav-steps" id="nav-steps"></div><div class="nav-count" id="nav-count"></div></div>
      <button class="nav-speak-btn" title="랜덤" onclick="randomScene()">🎲</button>
      <button class="nav-speak-btn" onclick="speakCurrent()">🔊</button>
      <button class="nav-btn" id="nav-next" onclick="moveScene(1)">&#8250;</button>
    </div>
    <button class="script-toggle-btn" onclick="toggleStrip()"><span id="strip-arrow">▶</span> 전체 스크립트 보기</button>
    <div class="script-strip" id="script-strip"></div>
  </div></div>`;
}

function buildVideoScript(){
  const charMap={};
  DATA.characters.forEach(c=>{charMap[c.id]=c;});
  const lines=DATA.script.map((line,i)=>{
    const ch=charMap[line.speaker]||{name:line.speaker,emoji:'💬',color:'#E0E0E0'};
    const tag=line.speech_type?`<span class="caption-tag ${line.speech_type==='반말'?'tag-banmal':'tag-jondaemal'}">${esc(line.speech_type)}</span>`:'';
    const ttsBtn=line.audio
      ?`<button class="video-script-tts" onclick="speak(${JSON.stringify(line.text)},${JSON.stringify(line.audio)})">🔊 듣기</button>`
      :`<button class="video-script-tts" onclick="speak(${JSON.stringify(line.text)})">🔊 듣기</button>`;
    return `<div class="video-script-line">
      <div class="caption-avatar" style="background:${esc(ch.color||'#E0E0E0')}">${esc(ch.emoji||'💬')}</div>
      <div class="video-script-body">
        <div class="video-script-name">${esc(ch.name)}</div>
        <div class="video-script-kr">${esc(line.text)}</div>
        <div class="video-script-en">${esc(line.en)}</div>
        ${tag}
        ${ttsBtn}
      </div>
    </div>`;
  }).join('');
  return `<div class="video-wrap">
    <video controls playsinline preload="metadata">
      <source src="${esc(DATA.video)}" type="video/mp4">
      브라우저가 동영상을 지원하지 않아요.
    </video>
    <div class="video-credit">음성: Clova Dubbing (NAVER Corp.)</div>
    <div class="video-script-panel">
      <div class="video-script-header">📝 대본 · Script</div>
      ${lines}
    </div>
  </div>`;
}

function initSceneViewer(){
  if(DATA.video) return;  // video mode: no slide viewer
  renderScene();
  const credit=document.getElementById('clova-credit');
  if(credit){credit.classList.remove('hidden');setTimeout(()=>credit.classList.add('hidden'),5000);}
}

function renderScene(){
  const panel=document.getElementById('scene-panel');
  if(!panel)return;
  const line=DATA.script[sceneIdx];
  const slideIdx=(line.slide!=null)?line.slide:sceneIdx;
  const src=DATA.slides&&DATA.slides[slideIdx]?DATA.slides[slideIdx]:(DATA.slides&&DATA.slides[0])||'';
  const encodedSrc=src?encodeURI(src):'';
  panel.style.backgroundImage=encodedSrc?`url('${encodedSrc}')`:'none';
  // Ensure panel refreshes once image is fully loaded (handles first-visit cache miss)
  if(encodedSrc){const _img=new Image();const _si=sceneIdx;_img.onload=()=>{if(sceneIdx===_si&&panel.isConnected)panel.style.backgroundImage=`url('${encodedSrc}')`;};_img.src=src;}
  const charMap={};DATA.characters.forEach(c=>{charMap[c.id]=c;});
  const ch=charMap[line.speaker]||{name:line.speaker};
  const cfg_def=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
  const cfg={bg:ch.color||cfg_def.bg,emoji:ch.emoji||cfg_def.emoji};
  const tagHtml=line.speech_type&&line.speech_type!=='narrator'?`<span class="caption-tag ${line.speech_type==='반말'?'tag-banmal':'tag-jondaemal'}">${line.speech_type}</span>`:'';
  document.getElementById('scene-caption').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="caption-avatar" style="background:${cfg.bg}">${cfg.emoji}</div>
      <div class="caption-name">${esc(ch.name)}</div>
    </div>
    <div class="caption-body" style="flex:1">
      <div class="caption-kr">${esc(line.text)}</div>
      <div class="caption-en">${esc(line.en)}</div>
      ${tagHtml}
      <div class="speak-result" id="speak-result">
        <div class="speak-said">들린 내용: <span id="speak-said-text"></span></div>
        <div class="speak-feedback" id="speak-feedback">분석 중...</div>
      </div>
    </div>
`;
  const total=DATA.script.length;
  document.getElementById('nav-steps').innerHTML=DATA.script.map((_,i)=>`<div class="nav-step${i<=sceneIdx?' done':''}"></div>`).join('');
  document.getElementById('nav-count').textContent=`${sceneIdx+1} / ${total}`;
  document.getElementById('nav-prev').disabled=sceneIdx===0;
  document.getElementById('nav-next').disabled=sceneIdx===total-1;
  const sb=document.getElementById('speak-btn');
  if(sb){sb.onclick=()=>startSpeak(line.text,line.en);sb.textContent='🎤 말해보기';sb.classList.remove('listening');sb.disabled=false;}
  updateStripHighlight();
}

function moveScene(dir){
  const next=sceneIdx+dir;
  if(next<0||next>=DATA.script.length)return;
  sceneIdx=next;renderScene();
}

function jumpScene(i){
  sceneIdx=i;renderScene();
}

function speakCurrent(){
  if(!DATA)return;
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function randomScene(){
  const total=DATA.script.length;
  let next;
  do{next=Math.floor(Math.random()*total);}while(next===sceneIdx&&total>1);
  sceneIdx=next;renderScene();
}

function toggleStrip(){
  const strip=document.getElementById('script-strip');
  const arrow=document.getElementById('strip-arrow');
  const isOpen=strip.classList.toggle('open');
  arrow.textContent=isOpen?'▼':'▶';
  if(isOpen&&!strip.innerHTML)buildStrip();
}

function buildStrip(){
  const strip=document.getElementById('script-strip');
  if(!strip)return;
  strip.innerHTML=DATA.script.map((line,i)=>{
    const cfg=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
    return `<div class="strip-row${i===sceneIdx?' current':''}" onclick="jumpScene(${i});updateStripHighlight()">
      <div class="strip-avatar">${cfg.emoji}</div>
      <div><div class="strip-kr">${esc(line.text)}</div><div class="strip-en">${esc(line.en)}</div></div>
    </div>`;
  }).join('');
}

function updateStripHighlight(){
  document.querySelectorAll('.strip-row').forEach((el,i)=>el.classList.toggle('current',i===sceneIdx));
}

// ── AUDIO ──────────────────────────────────────────────
function speak(text,audioSrc){
  if(audioSrc){
    if(_audio){_audio.pause();_audio=null;}
    _audio=new Audio(audioSrc);
    _audio.play().catch(()=>speakTTS(text));
  }else{
    speakTTS(text);
  }
}
function speakTTS(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.88;
  const go=()=>{const v=speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;});
}
function stopTTS(){ if(window.speechSynthesis) speechSynthesis.cancel(); }
function toggleRLScript(id){
  const el=document.getElementById('rlscript-'+id);
  const btn=document.getElementById('rlscript-btn-'+id);
  if(!el)return;
  const hidden=el.style.display==='none';
  el.style.display=hidden?'block':'none';
  if(btn)btn.textContent=hidden?'📄 스크립트 숨기기':'📄 스크립트 보기';
}

      <div class="vc-front">

        <div class="vc-kr">${esc(v.korean)}</div>
        <div class="vc-rom">[${esc(v.romanization)}]</div>
        <button class="vc-speak" onclick="event.stopPropagation();speakTTS('${escA(v.korean)}')">🔊</button>
        <div class="vc-hint">탭하면 뜻 보기</div>
      </div>
      <div class="vc-back">
        <div class="vc-emoji">${v.emoji||'📝'}</div>

function buildVocab(){

  if(isGrouped){
    return DATA.vocab.map(g=>{
      const noteHtml=g.note?`<div style="background:var(--teal-50);border-left:4px solid var(--teal);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:11px 15px;margin-bottom:12px;font-size:12.5px;color:var(--warm-900);line-height:1.8">
        ${g.note.ko?`<div style="font-weight:700;margin-bottom:3px">${esc(g.note.ko)}</div>`:''}
        ${g.note.en?`<div style="color:var(--warm-600);font-size:12px">${esc(g.note.en)}</div>`:''}
        ${g.note.examples?`<div style="margin-top:8px">${g.note.examples.map(ex=>`<div style="display:flex;gap:8px;margin-bottom:4px;font-size:12px"><span style="font-weight:700;color:var(--teal);min-width:90px">${esc(ex.ko)}</span><span style="color:var(--warm-500)">${esc(ex.en||'')}</span></div>`).join('')}</div>`:''}
        ${g.note.ref?`<div style="margin-top:8px;font-size:11.5px;color:var(--teal-md);font-weight:700">👉 ${esc(g.note.ref)}</div>`:''}

        ${noteHtml}
        <div class="vocab-grid">${g.items.map(v=>vocabCardHtml(v)).join('')}</div>
      </div>`;
    }).join('');
  }
  return `<div class="vocab-grid">${DATA.vocab.map(v=>vocabCardHtml(v)).join('')}</div>`;
}

// ── GRAMMAR ────────────────────────────────────────────
function buildGrammar(){
  if(!DATA.grammar||!DATA.grammar.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return DATA.grammar.map(g=>{
    // rule_boxes — color-coded rule cards (red=warning, blue=pattern, green=tip, amber=note)
    const ruleBoxHtml=(g.rule_boxes||[]).map(rb=>{
      const colors={red:'#FFF0F0',blue:'#F0F6FF',green:'#EDF7F2',amber:'#FFFBF0'};
      const borders={red:'#F4A0A0',blue:'#A0C4F4',green:'#A8D8B5',amber:'#F0C980'};
      const textColors={red:'#C0392B',blue:'#1A5C9E',green:'#2E7D52',amber:'#7A5500'};
      const t=rb.type||'blue';
      return`<div style="background:${colors[t]||colors.blue};border-left:4px solid ${borders[t]||borders.blue};border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-bottom:8px">
        ${rb.label?`<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:${textColors[t]||textColors.blue};letter-spacing:.05em;margin-bottom:4px">${esc(rb.label)}</div>`:''}
        <div style="font-size:13px;font-weight:700;color:${textColors[t]||textColors.blue};font-family:var(--font-serif)">${esc(rb.content||rb.rule||'')}</div>
        ${rb.note?`<div style="font-size:11px;color:var(--warm-500);margin-top:4px">${esc(rb.note)}</div>`:''}
      </div>`;
    }).join('');
    // examples with optional highlight
    const exHtml=(g.examples||[]).map(ex=>{
      const safeHl=ex.highlight?ex.highlight.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'):'';
      const koDisplay=ex.highlight
        ? ex.ko.replace(new RegExp(`(${safeHl})`,'g'),'<mark style="background:#FFF176;padding:0 2px;border-radius:2px">$1</mark>')
        : esc(ex.ko);
      return`<li class="gram-ex">
          <div class="gram-ko">${ex.highlight?koDisplay:esc(ex.ko)} <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></div>
          <div class="gram-en">${esc(ex.en)}</div>
        </li>`;
    }).join('');
    // pattern formula box
    const patternHtml=g.pattern?`<div class="gram-pattern">${esc(g.pattern)}</div>`:'';
    // table
    const tableHtml=g.table?`<div class="gram-table-wrap"><table class="gram-table"><thead><tr>${(g.table.columns||[]).map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${(g.table.rows||[]).map(r=>`<tr>${r.map(cell=>`<td>${esc(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:'';
    // fill in the blanks
    const fillId=`fill-${g.id}-${Math.random().toString(36).slice(2,6)}`;
    const imagesHtml=(g.images&&g.images.length)
      ?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 6px;">${
        (g.images||[]).map(src=>`<img src="${src}" alt="" style="width:100%;border-radius:8px;display:block;box-shadow:0 1px 6px rgba(0,0,0,.1);">`).join('')
      }</div>`:'';
    const fillHtml=g.fill_blanks&&g.fill_blanks.length?`<div class="gram-fill" id="${fillId}"><div class="gram-fill-title">✏️ Fill in the blanks</div>${g.fill_blanks.map((fb,i)=>{const parts=(fb.sentence||'').split('___');return`<div class="gram-fill-item">${i+1}.&nbsp;${esc(parts[0]||'')}<input class="gram-blank" data-answer="${escA(fb.answer)}" placeholder="___">${esc(parts[1]||'')}</div>`;}).join('')}<div class="gram-fill-actions"><button class="gram-fill-check" onclick="checkFill('${fillId}')">✅ Check</button><span class="gram-fill-result" id="${fillId}-res"></span></div></div>`:'';
    // qna — Q&A practice pairs
    const qnaHtml=(g.qna||[]).map(pair=>`
      <div style="background:#fff;border:1.5px solid var(--warm-300);border-radius:var(--radius-md);padding:12px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;gap:10px;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:var(--coral);min-width:18px;padding-top:1px">Q</span>
          <div>
            <div style="font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--warm-900)">${esc(pair.q)} <button onclick="speakTTS('${escA(pair.q)}')" style="background:none;border:none;cursor:pointer;font-size:11px;opacity:.5">🔊</button></div>
            ${pair.q_en?`<div style="font-size:11px;color:var(--warm-500)">${esc(pair.q_en)}</div>`:''}
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <span style="font-size:11px;font-weight:700;color:var(--teal);min-width:18px;padding-top:1px">A</span>
          <div>
            <div style="font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--blue-800)">${esc(pair.a)} <button onclick="speakTTS('${escA(pair.a)}')" style="background:none;border:none;cursor:pointer;font-size:11px;opacity:.5">🔊</button></div>
            ${pair.a_en?`<div style="font-size:11px;color:var(--warm-500)">${esc(pair.a_en)}</div>`:''}
          </div>
        </div>
      </div>`).join('');
    const tierBorder=g.tier==='core'?'2.5px solid #F0C040':g.tier==='preview'?'2.5px solid #5B9FD4':'';
    const tierBadge=g.tier==='core'?`<span style="display:inline-block;background:#FFF3C4;color:#7A5500;border:1.5px solid #F0C040;border-radius:20px;font-size:10.5px;font-weight:700;padding:2px 9px;margin-bottom:8px">🥇 핵심 문법</span>`:g.tier==='preview'?`<span style="display:inline-block;background:#EAF3FB;color:#1A5C9E;border:1.5px solid #5B9FD4;border-radius:20px;font-size:10.5px;font-weight:700;padding:2px 9px;margin-bottom:8px">💙 다음에 또 나와요</span>`:'';

      <div class="gram-exp">${esc(g.explanation_en)}</div>
      ${g.rule?`<div class="gram-rule">📐 ${esc(g.rule)}</div>`:''}
      ${patternHtml}
      ${ruleBoxHtml}
      ${tableHtml}
      ${exHtml?`<ul class="gram-ex-list">${exHtml}</ul>`:''}
      ${qnaHtml?`<div style="margin-top:10px"><div style="font-size:11.5px;font-weight:700;color:var(--warm-500);margin-bottom:6px">💬 연습해 봐요</div>${qnaHtml}</div>`:''}
      ${fillHtml}
      ${imagesHtml}
      ${g.verb_drill?`<div class="vd-wrap" id="vd-${g.id}"><div class="vd-header"><div class="vd-header-title">${esc(g.verb_drill.title)}</div><div class="vd-header-sub">${esc(g.verb_drill.intro)}</div></div><div class="vd-body" id="vd-body-${g.id}"><p style="font-size:13px;color:var(--warm-500);text-align:center;margin-bottom:12px;">10개 동사 · 3가지 시제 · 랜덤 10문제<br><em>10 verbs · 3 tenses · 10 random questions</em></p><button class="vd-start-btn" onclick="vdInit('${g.id}')">▶ 드릴 시작 · Start Drill</button></div></div>`:''}

// ── FILL IN THE BLANKS CHECK ───────────────────────────
function checkFill(id){
  const container=document.getElementById(id);
  if(!container)return;
  const inputs=container.querySelectorAll('.gram-blank');
  let correct=0;
  inputs.forEach(inp=>{
    const ans=(inp.dataset.answer||'').trim();
    const val=inp.value.trim();
    if(val===ans){inp.style.borderBottomColor='#16A34A';inp.style.color='#16A34A';correct++;}
    else{inp.style.borderBottomColor='#E74C3C';inp.style.color='#E74C3C';}
  });
  const res=document.getElementById(id+'-res');
  if(res){
    res.textContent=correct===inputs.length?`${correct}/${inputs.length} 🎉 완벽해요!`:`${correct}/${inputs.length} 다시 해봐요 😊`;
    res.className='gram-fill-result '+(correct===inputs.length?'ok':'ng');
  }
}

// ── QUIZ ───────────────────────────────────────────────
function buildQuiz(){
  if(!DATA.quiz||!DATA.quiz.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return`<div style="max-width:580px">
    <div id="quiz-content"></div>
  </div>`;
}
function renderQuizQ(){
  const total=DATA.quiz.length;
  const qi=quizIdx;
  if(qi>=total){renderQuizScore();return;}
  const q=DATA.quiz[qi];
  const dots=Array.from({length:total},(_,i)=>`<div class="quiz-prog-dot${i<qi?' done':i===qi?' current':''}"></div>`).join('');

  // 각 문항의 type 자동 판별:
  // - audio_text 있음 → 듣기 형식 (🔊 버튼 + 선택지)
  // - audio_text 없음 → 일반 객관식 (질문 + 영어 + 선택지)
  const isListen = !!q.audio_text;

  const opts=(q.options||q.choices||[]).map((opt,oi)=>`
    <button class="quiz-opt" id="qopt-${oi}" onclick="answerMC(${oi},${qi})">
      <span style="font-weight:700;color:var(--teal-md);margin-right:7px">${oi+1}.</span>${esc(opt)}
    </button>`).join('');

  let inner='';
  if(isListen){
    inner=`<div class="quiz-listen-wrap" style="margin-bottom:18px;">
        <div style="font-size:12px;color:var(--teal);margin-bottom:10px">🔊 음성을 듣고 맞는 답을 고르세요 · Listen and choose</div>
        <button class="quiz-listen-btn" onclick="speakTTS('${escA(q.audio_text)}')">🔊 듣기</button>
      </div>
      <div class="quiz-opts">${opts}</div>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  } else {
    inner=`<div class="quiz-opts">${opts}</div>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  }

  // 질문 표시: listen은 지시문 작게 (음성 듣기가 메인), mc는 질문 메인
  const qTextStyle = isListen ? 'font-size:12px;color:var(--warm-400);margin-bottom:4px;' : 'margin-bottom:4px;';
  const qEnHtml = (!isListen && q.question_en)
    ? `<div class="quiz-q-en">${esc(q.question_en)}</div>` : '';

  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-progress">
      <div class="quiz-prog-dots">${dots}</div>
      <div style="font-size:11.5px;color:var(--warm-500);margin-left:4px">${qi+1} / ${total}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-q-num">문제 ${qi+1}</div>
      <div class="quiz-q-text" style="${qTextStyle}">${esc(q.question_ko||q.question||'')}</div>
      ${qEnHtml}
      ${inner}
    </div>`;
}
function answerMC(chosen,qi){
  const q=DATA.quiz[qi];
  const correct=q.answer;
  const hint=q.explanation||'';
  for(let i=0;i<10;i++){
    const el=document.getElementById(`qopt-${i}`);
    if(!el)break;
    el.classList.add('locked');
    if(i===correct)el.classList.add('correct');
    else if(i===chosen)el.classList.add('wrong');
  }
  if(chosen===correct)quizScore++;
  showQuizExp(hint);
}
function checkWriteAnswer(qi){
  const q=DATA.quiz[qi];
  const correctText=q.audio_text||(q.options||[])[q.answer]||'';
  const hint=q.explanation||'';
  const input=document.getElementById('quiz-write-input');
  if(!input)return;
  const val=(input.value||'').trim().replace(/\s+/g,' ');
  const exp=correctText.trim().replace(/\s+/g,' ');
  const ok=val===exp||(val&&exp&&exp.includes(val))||val.toLowerCase()===exp.toLowerCase();
  input.disabled=true;
  input.style.borderColor=ok?'var(--teal-md)':'var(--coral)';
  input.style.background=ok?'#EDF7F2':'#FFF0F0';
  if(ok)quizScore++;
  const fullHint=(ok?'✅ 정답! ':'❌ 오답. 정답: '+correctText+'\n')+hint;
  showQuizExp(fullHint);
}
function showQuizExp(hint){
  const exp=document.getElementById('quiz-exp');
  const btn=document.getElementById('quiz-next');
  if(exp&&hint){exp.textContent='💡 '+hint;exp.classList.add('show');}
  if(btn)btn.classList.add('show');
}
function nextQuizQ(){
  quizIdx++;
  renderQuizQ();
}
function renderQuizScore(){
  const total=DATA.quiz.length;
  const pct=Math.round(quizScore/total*100);
  const msg=pct===100?'🏆 완벽해요!':pct>=80?'🌟 잘했어요!':pct>=60?'👍 좋아요!':'💪 다시 도전!';
  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-score-wrap">
      <div class="quiz-score-num">${quizScore}<span style="font-size:24px;color:var(--warm-500)">/${total}</span></div>
      <div class="quiz-score-lbl">${msg}</div>
      <div style="font-size:13px;color:var(--warm-500);margin-top:8px">${pct}% 정답</div>
      <button class="quiz-retry-btn" onclick="resetQuiz()">↺ 다시 풀기</button>
    </div>`;
}
function setQuizMode(mode){
  quizMode=mode;
  quizIdx=0;quizScore=0;
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  renderQuizQ();
}
function resetQuiz(){
  quizIdx=0;quizScore=0;
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  renderQuizQ();
}

// ── PRONUNCIATION ─────────────────────────────────────
function buildPron(){
  let _pron=DATA.pronunciation;
  if(_pron&&!Array.isArray(_pron)&&_pron.items){_pron=(_pron.items||[]).map(p=>({title:p.word||'',rule:p.actual||'',tip:p.note||''}));}
  const items=Array.isArray(_pron)?_pron:[];
  if(!items.length){
    // 문법에서 발음·불규칙 관련 자동 추출
    const keywords=['불규칙','발음','pronunciation','irregular','받침','연음','liaison'];
    const auto=(DATA.grammar||[]).filter(g=>{
      const txt=((g.title||'')+(g.explanation_en||'')).toLowerCase();
      return keywords.some(k=>txt.includes(k));
    });
    if(!auto.length)return`<div style="text-align:center;padding:40px;color:var(--warm-500)">
      <div style="font-size:36px;margin-bottom:10px">🔤</div>
      <div style="font-size:13px">이 에피소드의 발음 내용은 준비 중이에요.<br>JSON에 <code>pronunciation</code> 배열을 추가하면 표시됩니다.</div></div>`;
    return`<div style="font-size:12px;color:var(--warm-500);margin-bottom:12px">📌 문법에서 발음·불규칙 관련 항목을 자동으로 가져왔어요</div>`+
      auto.map(g=>`<div class="gram-card">
        <div class="gram-title">${esc(g.title)}</div>
        <div class="gram-exp">${esc(g.explanation_en)}</div>
        ${g.rule?`<div class="gram-rule">📐 ${esc(g.rule)}</div>`:''}
        <ul class="gram-ex-list">${(g.examples||[]).slice(0,3).map(ex=>`<li class="gram-ex">
          <div class="gram-ko">${esc(ex.ko)} <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5">🔊</button></div>
          <div class="gram-en">${esc(ex.en)}</div></li>`).join('')}</ul>
      </div>`).join('');
  }
  return items.map(item=>{
    // 세종 스타일 테이블 (선택적)
    const pronTableHtml=item.table?`<div class="gram-table-wrap" style="margin-top:10px"><table class="gram-table">
      <thead><tr>${(item.table.columns||[]).map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${(item.table.rows||[]).map(r=>`<tr>${r.map((cell,ci)=>
        ci===1
          ? `<td><span style="font-family:var(--font-serif);font-weight:700;color:var(--coral)">${esc(cell)}</span> <button onclick="speakTTS('${escA(cell.replace(/[\[\]]/g,''))}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5">🔊</button></td>`
          : ci===2
            ? `<td style="color:var(--blue);font-weight:600">${esc(cell)}</td>`
            : `<td style="font-family:var(--font-serif);font-weight:700">${esc(cell)}</td>`
      ).join('')}</tr>`).join('')}</tbody>
    </table></div>`:'';
    // 기존 before→after 예문 (선택적)
    const pronExHtml=(item.examples||[]).map(ex=>`<div class="pron-ex">
      <div class="pron-before">${esc(ex.before||ex.ko||'')}</div>
      <div class="pron-arrow">→</div>
      <div class="pron-after">${esc(ex.after||'')} <button onclick="speakTTS('${escA(ex.after||'')}')" style="background:none;border:none;font-size:12px;cursor:pointer;opacity:.5">🔊</button></div>
      <div class="pron-note">${esc(ex.note||ex.en||'')}</div>
    </div>`).join('');
    return`<div class="pron-card">
      <div class="pron-title">${esc(item.title||'')} ${item.icon||''}</div>
      <div class="pron-rule">${esc(item.rule||'')}</div>
      ${pronTableHtml}
      ${pronExHtml}
      ${item.tip?`<div style="margin-top:12px;background:var(--amber-lt);border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:var(--warm-700)">💡 ${esc(item.tip)}</div>`:''}
    </div>`;
  }).join('');
}

function buildUsage(){

  if(!usage||!usage.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return usage.map(sec=>{
    if(sec.type==='tip')return`<div style="background:var(--amber-lt);border:1.5px solid #F0C980;border-radius:var(--radius-md);padding:13px 17px;font-size:13px;color:var(--warm-900);line-height:1.75;margin-bottom:14px"><strong>${esc(sec.section||sec.title||'')}</strong><br>${esc(sec.content_ko||sec.content||'')}<div style="font-size:11px;color:var(--warm-500);margin-top:6px">${esc(sec.content_en||'')}</div></div>`;
    if(sec.title&&sec.explanation_en){
      const exHtml=(sec.examples||[]).map(ex=>`
        <div style="background:#fff;border-radius:var(--radius-sm);border:1px solid var(--warm-300);padding:10px 14px;margin-bottom:6px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow-sm)">
          <div style="flex:1"><div style="font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--warm-900)">${esc(ex.ko)}</div><div style="font-size:11px;color:var(--warm-500);margin-top:2px">${esc(ex.en)}</div></div>
          <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;font-size:15px;cursor:pointer;opacity:.5">🔊</button>
        </div>`).join('');
      return`<div style="margin-bottom:22px">
        <div style="font-size:12.5px;font-weight:700;color:var(--teal);margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid var(--teal-lt)">${esc(sec.title)}</div>
        <div style="font-size:12px;color:var(--warm-700);line-height:1.7;margin-bottom:10px">${esc(sec.explanation_en)}</div>
        ${exHtml}
      </div>`;
    }
    // old format: section + items[] — supports ko/en OR korean/english fields
    const itemHtml=(sec.items||[]).map(it=>{
      const kr=it.ko||it.korean||'';
      const en=it.en||it.english||'';
      const ctx=it.context_ko||'';
      return`<div style="background:#fff;border-radius:var(--radius-sm);border:1px solid var(--warm-300);padding:10px 14px;margin-bottom:6px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow-sm)">
        <div style="flex:1">
          ${ctx?`<div style="font-size:10.5px;color:var(--teal-md);font-weight:700;margin-bottom:3px">${esc(ctx)}</div>`:''}
          <div style="font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--warm-900)">${esc(kr)}</div>
          <div style="font-size:11px;color:var(--warm-500);margin-top:2px">${esc(en)}</div>
        </div>
        <button onclick="speakTTS('${escA(kr)}')" style="background:none;border:none;font-size:15px;cursor:pointer;opacity:.5">🔊</button>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:22px">
      <div style="font-size:12.5px;font-weight:700;color:var(--teal);margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid var(--teal-lt)">${esc(sec.section||sec.title||'')}</div>
      ${itemHtml}
    </div>`;
  }).join('');
}

function buildRealLife(){
  const rl=DATA.real_life;
  if(!rl||!rl.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return rl.map(item=>{
    // tip card
    if(item.type==='tip')return`<div style="background:var(--amber-lt);border:1.5px solid #F0C980;border-radius:var(--radius-md);padding:13px 17px;font-size:13px;color:var(--warm-900);line-height:1.75;margin-bottom:14px"><strong>${esc(item.title||'')}</strong><br>${esc(item.content_ko||item.content||'')}<div style="font-size:11px;color:var(--warm-500);margin-top:6px">${esc(item.content_en||'')}</div></div>`;
    // listening type: 듣기 활동 — 텍스트 숨김! Play/Stop + 스크립트 토글 (Sejong 스타일)
    if(item.type==='listening'){
      const sid=item.id||'rl_listen';
      const qHtml=buildRLQuiz(item.questions||[],sid);
      const playSrc=item.audio_text||(item.script&&item.script.map(l=>l.text).join(' '))||'';

        ? `<div id="rlscript-${sid}" style="display:none;margin-top:10px;background:var(--warm-50);border-radius:var(--radius-sm);padding:12px 14px">${item.script.map(l=>`<div style="display:flex;gap:10px;margin-bottom:6px;font-size:12.5px"><span style="font-weight:700;color:var(--teal);min-width:60px">${esc(l.speaker)}</span><span style="color:var(--warm-900)">${esc(l.text)}</span></div>`).join('')}</div>`

        <div style="font-size:11.5px;color:var(--warm-500);margin-bottom:12px">${esc(item.title_en||'')}</div>

    }
    // reading type: 지문 + Play/Stop + questions (지문은 읽기라 표시 유지)
    if(item.type==='reading'){
      const sid=item.id||'rl_read';

        <div style="font-size:11.5px;color:var(--warm-500);margin-bottom:12px">${esc(item.title_en||'')}</div>

            ${m.en?`<div style="font-size:11px;color:#888;margin-top:3px">${esc(m.en)}</div>`:''}

      }).join('');
      return`<div style="background:#B2C7D9;border-radius:var(--radius-md);padding:16px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:12px;text-align:center">${esc(item.title||'💬 카카오톡')}</div>

      ${lineHtml}
    </div>`;
  }).join('');
}

// Real Life comprehension quiz helper
const rlAnswered={};
function buildRLQuiz(questions,prefix){
  if(!questions||!questions.length)return'';
  return`<div style="margin-top:12px">${questions.map((q,i)=>{
    const key=`${prefix}_${i}`;
    const opts=(q.options||[]).map((opt,oi)=>`
      <li id="rlopt-${key}-${oi}" onclick="answerRL('${key}',${i},${oi},${q.answer},'${escA(q.explanation||'')}','${prefix}')"
          style="list-style:none;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--warm-300);margin-bottom:5px;cursor:pointer;font-size:12.5px;transition:background .15s">
        <span style="font-weight:700;color:var(--teal-md);margin-right:6px">${oi+1}.</span>${esc(opt)}
      </li>`).join('');
    return`<div style="margin-bottom:14px">
      <div style="font-size:12.5px;font-weight:700;color:var(--warm-900);margin-bottom:6px">${i+1}. ${esc(q.question_ko||q.question||'')}</div>
      ${q.question_en?`<div style="font-size:11px;color:var(--warm-500);margin-bottom:6px">${esc(q.question_en)}</div>`:''}
      <ul style="padding:0;margin:0">${opts}</ul>
      <div id="rlexp-${key}" style="font-size:12px;color:var(--sage);padding:8px 12px;background:#EDF7F2;border-radius:var(--radius-sm);display:none"></div>
    </div>`;
  }).join('')}</div>`;
}
function answerRL(key,qi,chosen,correct,hint,prefix){
  if(rlAnswered[`${key}`])return;
  rlAnswered[`${key}`]=true;
  for(let i=0;i<10;i++){
    const el=document.getElementById(`rlopt-${key}-${i}`);
    if(!el)break;
    if(i===correct)el.style.background='#EDF7F2';
    else if(i===chosen)el.style.background='#FFF0F0';
  }
  const exp=document.getElementById(`rlexp-${key}`);
  if(exp&&hint){exp.textContent='💡 '+hint;exp.style.display='block';}
}

async function loadEpAndTab(epId, tabName){
  closeIndex();
  await loadEp(epId);
  showTab(tabName);
}

function getEpLabel(epId){
  const ep=EPISODE_DATA[epId];
  const lvl=ep?ep.level||'':'초급';
  const num=(epId||'').replace('ep','');
  const lvlMap={'초급':'Level 1','중급':'Level 2','고급':'Level 3','기초':'Basics'};
  return (lvlMap[lvl]||lvl)+' · ep'+num;
}

// ── 색인 모달 ───────────────────────────────────────────
let idxTab='vocab';

async function openIndex(){
  document.getElementById('idx-overlay').classList.add('open');
  document.getElementById('idx-search-input').value='';
  // Pre-fetch any episodes not yet in cache
  const body=document.getElementById('idx-body');
  if(body) body.innerHTML='<div style="padding:20px;text-align:center">로딩 중…</div>';
  await Promise.all(EPISODES.map(async ep=>{
    if(!EPISODE_DATA[ep.id]){
      try{
        const r=await fetch(`data/nhs/L1/${ep.id}.json`);
        if(r.ok) EPISODE_DATA[ep.id]=await r.json();
      }catch(e){}
    }
  }));
  renderIdxBody();
}
function closeIndex(){
  document.getElementById('idx-overlay').classList.remove('open');
}
// ── 국어사전 정렬 (Unicode 코드포인트 기반, 한글 블록이 ㄱㄴㄷ 순으로 배열됨) ──
function _koCompare(a,b){
  for(let i=0;i<Math.min(a.length,b.length);i++){const d=a.charCodeAt(i)-b.charCodeAt(i);if(d!==0)return d;}
  return a.length-b.length;
}
// ── 초성(받침없는 자음) 추출 ──
function getOnset(ch){
  const c=(ch||'').charCodeAt(0);
  if(c<0xAC00||c>0xD7A3) return (ch||'#').toUpperCase();
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor((c-0xAC00)/588)];
}
let _idxPage=0; const _IDX_PG=30; let _idxFiltered=[];
function _idxGoPage(pg, onset){
  _idxPage=pg;
  _renderIdxVocabPage();
  // scroll to onset section after render
  if(onset){
    const body=document.getElementById('idx-body');
    if(!body)return;
    const hdrs=body.querySelectorAll('.idx-section-hdr');
    for(const h of hdrs){if(h.textContent.trim()===onset){h.scrollIntoView({block:'start'});body.scrollTop=body.scrollTop-8;break;}}
  }
}
function _renderIdxVocabPage(){
  const words=_idxFiltered;
  const total=words.length;
  const totalPg=Math.max(1,Math.ceil(total/_IDX_PG));
  _idxPage=Math.max(0,Math.min(_idxPage,totalPg-1));
  const slice=words.slice(_idxPage*_IDX_PG,(_idxPage+1)*_IDX_PG);
  // 초성별 섹션 헤더 + 단어
  let html='';
  let cur=null;
  slice.forEach(v=>{
    const o=getOnset((v.korean||'')[0]||'');
    if(o!==cur){cur=o;html+=`<div class="idx-section-hdr">${esc(o)}</div>`;}
    html+=`<div class="idx-vocab-row">
      <div class="idx-vocab-kr">${esc(v.korean||'')} ${v.emoji||''}</div>
      <div style="font-size:11px;color:var(--warm-500);min-width:90px">${esc(v.romanization||'')}</div>
      <div class="idx-vocab-en">${esc(v.english||v.en||'')}</div>
      <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(v.ep||'')}','vocab')">${esc(getEpLabel(v.ep||''))}</span>
      <button onclick="speakTTS('${escA(v.korean||'')}')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:.4">🔊</button>
    </div>`;
  });
  document.getElementById('idx-body').innerHTML=html||'<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';
  // 페이지 컨트롤 업데이트
  const pc=document.getElementById('idx-page-ctrl');
  if(pc){
    pc.style.display=totalPg>1?'flex':'none';
    pc.innerHTML=`<button class="idx-page-btn" onclick="_idxGoPage(${_idxPage-1})" ${_idxPage===0?'disabled':''}>◀</button>
      <span class="idx-page-info">${_idxPage+1} / ${totalPg}</span>
      <button class="idx-page-btn" onclick="_idxGoPage(${_idxPage+1})" ${_idxPage===totalPg-1?'disabled':''}>▶</button>`;
  }
}

function switchIdxTab(tab){
  idxTab=tab;
  document.querySelectorAll('.idx-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('idx-tab-'+tab).classList.add('active');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}

function renderIdxBody(){
  const q=(document.getElementById('idx-search-input').value||'').toLowerCase();
  const body=document.getElementById('idx-body');
  if(!body)return;

  // 전체 에피소드 데이터 수집
  const allEps=Object.values(EPISODE_DATA).filter(ep=>ep&&ep.id);

  if(idxTab==='vocab'){
    // 전체 단어 수집
    let allWords=[];
    allEps.forEach(ep=>{
      const vocab=ep.vocab||[];
      const isGrouped=vocab.length>0&&vocab[0].items;
      if(isGrouped){
        vocab.forEach(g=>g.items.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title})));
      } else {
        vocab.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title}));
      }
    });
    // 검색 필터 + 정렬
    if(q) allWords=allWords.filter(v=>(v.korean||'').toLowerCase().includes(q)||(v.english||v.en||'').toLowerCase().includes(q));
    allWords.sort((a,b)=>_koCompare(a.korean||'',b.korean||''));
    _idxFiltered=allWords;
    _idxPage=0;
    // 초성 점프바 구성
    const onsetPage={};
    allWords.forEach((w,i)=>{
      const o=getOnset((w.korean||'')[0]||'');
      if(!(o in onsetPage)) onsetPage[o]=Math.floor(i/_IDX_PG);
    });
    const jbar=document.getElementById('idx-jump-bar');
    if(jbar) jbar.innerHTML=Object.entries(onsetPage).map(([o,pg])=>
      `<button class="idx-jump-btn" onclick="_idxGoPage(${pg},'${o}')">${o}</button>`).join('');
    _renderIdxVocabPage();

  } else if(idxTab==='grammar'){
    let allGram=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>allGram.push({...g,ep:ep.id,epTitle:ep.title}));
    });
    if(q) allGram=allGram.filter(g=>(g.title||'').toLowerCase().includes(q)||(g.explanation_en||'').toLowerCase().includes(q));
    let html='';
    if(!allGram.length){html='<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';}
    else{
      // 에피소드별 그룹
      const byEp={};
      allGram.forEach(g=>{
        if(!byEp[g.ep])byEp[g.ep]=[];
        byEp[g.ep].push(g);
      });
      Object.keys(byEp).sort().forEach(epId=>{
        const ep=allEps.find(e=>e.id===epId);

  } else if(idxTab==='pron'){
    // 발음 — grammar 중 발음 관련 항목 + 불규칙 동사 패턴 자동 추출
    const pronKeywords=['불규칙','발음','pronunciation','irregular','받침','연음','liaison','sound'];
    let allPron=[];
    allEps.forEach(ep=>{

        const txt=((g.title||'')+(g.explanation_en||'')).toLowerCase();

      </div>`;
    } else {
      html=allPron.map(g=>`
        <div class="idx-pron-row">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <span style="font-size:18px">${esc(g.icon||'🔤')}</span>
            <div>
              <div class="idx-pron-word">${esc(g.title||'')} <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(g.ep||'')}','pron')">${esc(getEpLabel(g.ep||''))}</span></div>
              ${g.rule?`<div class="idx-pron-note">📐 ${esc(g.rule)}</div>`:''}
              ${(g.examples||[]).slice(0,2).map(ex=>`<div style="font-size:12px;color:var(--warm-700);margin-top:3px">${esc(ex.ko)} <span style="color:var(--warm-500)">— ${esc(ex.en)}</span></div>`).join('')}
            </div>
          </div>
        </div>`).join('');
    }
    body.innerHTML=html;
  }
}

function combineSyl(onset,nucleus,coda){
  const onsets=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const nuclei=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const codas=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const oi=onsets.indexOf(onset),ni=nuclei.indexOf(nucleus),ci=codas.indexOf(coda||'');
  if(oi<0||ni<0||ci<0)return null;
  return String.fromCharCode(0xAC00+oi*21*28+ni*28+ci);
}

function initWritingCanvas(){
  wCanvas=document.getElementById('writing-canvas');
  if(!wCanvas)return;
  wCtx=wCanvas.getContext('2d');
  wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;wCtx.lineCap='round';wCtx.lineJoin='round';
  drawGridLines();
  wCanvas.addEventListener('mousedown',e=>{const r=wCanvas.getBoundingClientRect();wDrawing=true;wLX=e.clientX-r.left;wLY=e.clientY-r.top;});
  wCanvas.addEventListener('mousemove',e=>{if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;});
  wCanvas.addEventListener('mouseup',()=>wDrawing=false);
  wCanvas.addEventListener('mouseleave',()=>wDrawing=false);
  wCanvas.addEventListener('touchstart',e=>{e.preventDefault();const r=wCanvas.getBoundingClientRect();const t=e.touches[0];wDrawing=true;wLX=t.clientX-r.left;wLY=t.clientY-r.top;},{passive:false});
  wCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const t=e.touches[0];const x=t.clientX-r.left,y=t.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;},{passive:false});
  wCanvas.addEventListener('touchend',()=>wDrawing=false);
}
function drawGridLines(){
  if(!wCtx||!wCanvas)return;
  const w=wCanvas.width,h=wCanvas.height;
  wCtx.clearRect(0,0,w,h);
  wCtx.save();wCtx.strokeStyle='#e8e8e8';wCtx.lineWidth=1;
  wCtx.beginPath();wCtx.moveTo(w/2,0);wCtx.lineTo(w/2,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,h/2);wCtx.lineTo(w,h/2);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,0);wCtx.lineTo(w,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(w,0);wCtx.lineTo(0,h);wCtx.stroke();
  wCtx.strokeStyle='#cccccc';wCtx.lineWidth=1.5;wCtx.strokeRect(2,2,w-4,h-4);
  wCtx.restore();wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;
}
function clearCanvas(){if(!wCtx||!wCanvas)return;drawGridLines();}

function setLevel(btn){
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curLevel=btn.textContent.trim();
  const hdr=document.querySelector('.sidebar-hdr,.sidebar-hdr-amber');
  if(curLevel==='Basics'){
    if(hdr){hdr.className='sidebar-hdr-amber';hdr.innerHTML='🌱 기초반 · Basics';}
    buildBasicsSidebar();
    loadBasics(curBasicsTopic);
  }else{
    if(hdr){hdr.className='sidebar-hdr';hdr.innerHTML='📺 Episodes';}
    buildSidebar();
    loadEp('ep01');
  }
}

function buildBasicsSidebar(){
  const list=document.getElementById('ep-list');
  list.innerHTML=BASICS_TOPICS.map(t=>
    '<div class="basics-topic-item'+(t.id===curBasicsTopic?' active':'')+'" id="bt-'+t.id+'" onclick="loadBasics(\''+t.id+'\')">'
    +'<div class="basics-topic-icon">'+t.icon+'</div>'
    +'<div class="basics-topic-name">'+t.label+'<span class="basics-topic-name-en">'+t.en+'</span></div>'
    +'</div>').join('');
}

function loadBasics(topicId){
  curBasicsTopic=topicId;
  document.querySelectorAll('.basics-topic-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('bt-'+topicId);
  if(item)item.classList.add('active');
  const topic=BASICS_TOPICS.find(t=>t.id===topicId);
  if(!topic)return;
  document.getElementById('content-area').innerHTML=
    '<div style="max-width:860px;margin:0 auto;padding:24px;">'
    +'<div class="basics-header"><div class="basics-icon-big">'+topic.icon+'</div>'
    +'<div><div class="basics-title-kr">'+topic.label+'</div><div class="basics-title-en">'+topic.en+'</div></div></div>'
    +'<div id="basics-body"></div></div>';
  const body=document.getElementById('basics-body');
  if(topicId==='hangul')    body.innerHTML=buildHangul();
  if(topicId==='structure') body.innerHTML=buildStructure();
  if(topicId==='greetings') body.innerHTML=buildGreetings();
  if(topicId==='numbers')   body.innerHTML=buildNumbers();
  if(topicId==='writing')   body.innerHTML=buildWriting();
  if(topicId==='verbs')     body.innerHTML=buildVerbs();
  if(topicId==='speaking')  body.innerHTML=buildSpeaking();
  if(topicId==='hangul')  requestAnimationFrame(()=>updateSylResult());
  if(topicId==='writing') requestAnimationFrame(()=>initWritingCanvas());
  if(topicId==='verbs')   requestAnimationFrame(()=>renderVerbGame());
}

function switchBtab(pfx,tabId){
  document.querySelectorAll('[id^="'+pfx+'-"]').forEach(p=>{if(p.classList.contains('btab-panel'))p.classList.remove('active');});
  document.querySelectorAll('[data-btab-group="'+pfx+'"]').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById(pfx+'-'+tabId);if(p)p.classList.add('active');
  document.querySelectorAll('[data-btab-group="'+pfx+'"][data-tab="'+tabId+'"]').forEach(b=>b.classList.add('active'));
}

function buildHangul(){
  const tabs=[['cons','자음 Consonants'],['vowels','모음 Vowels'],['batchim','받침 Batchim'],['syllable','음절 Syllables']];
  return '<div class="basics-intro">한글(Hangul)은 1443년 세종대왕이 만든 소리 문자예요. 자음 19개 + 모음 21개로 이루어져 있어요.<br><em>Hangul is a phonetic alphabet invented by King Sejong in 1443.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-hangul" data-tab="'+id+'" onclick="switchBtab(\'bp-hangul\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-hangul-cons" class="btab-panel active">'+buildConsPanel()+'</div>'
    +'<div id="bp-hangul-vowels" class="btab-panel">'+buildVowPanel()+'</div>'
    +'<div id="bp-hangul-batchim" class="btab-panel">'+buildBatchimPanel()+'</div>'
    +'<div id="bp-hangul-syllable" class="btab-panel">'+buildSylPanel()+'</div>';
}
function hcHtml(item){
  return '<div class="hcard" onclick="speakTTS(\''+item.kr+'\')">'
    +'<div class="hcard-kr">'+item.kr+'</div>'
    +(item.name?'<div class="hcard-name">'+item.name+'</div>':'')
    +'<div class="hcard-rom">'+item.rom+'</div>'
    +'<div class="hcard-ex">'+item.ex+'</div></div>';
}
function buildConsPanel(){
  return '<div class="hangul-section-title">기본 자음 · Basic Consonants (14)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(0,14).map(hcHtml).join('')+'</div>'
    +'<div class="hangul-section-title">쌍자음 · Double Consonants (5)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(14).map(hcHtml).join('')+'</div>'
    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Consonants need a vowel to be voiced!</strong> They cannot stand alone as a syllable.<br>'
    +'자음은 홀로 발음될 수 없어요 — 반드시 모음과 함께 써야 해요.<br><br>'
    +'⚠️ The same consonant can sound different as an <strong>initial (첫소리)</strong> vs. <strong>final consonant (받침소리)</strong>.<br>'
    +'예: ㄱ → initial: <em>g</em> (가) / final: <em>k</em> (국) · Final consonants are always one of 7 representative sounds.</div>';
}
function buildVowPanel(){
  return '<div class="hangul-section-title">기본 모음 · Simple Vowels (10)</div>'
    +'<div class="hangul-grid">'+VOWELS.slice(0,10).map(hcHtml).join('')+'</div>'
    +'<div class="hangul-section-title">복합 모음 · Compound Vowels (11)</div>'
    +'<div class="hangul-grid">'+VOWELS.slice(10).map(hcHtml).join('')+'</div>'
    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Vowel placement depends on shape:</strong><br>'
    +'세로 모음 (ㅏ ㅑ ㅓ ㅕ ㅣ) — consonant is on the <strong>left</strong>, vowel on the <strong>right</strong>: 가 나 다<br>'
    +'가로 모음 (ㅗ ㅛ ㅜ ㅠ ㅡ) — consonant is on <strong>top</strong>, vowel <strong>below</strong>: 고 노 도</div>';
}

    +'<button class="syl-clear-btn" onclick="clearSyl()">↺ 초기화</button>'
    +'</div>';
}
function buildBatchimPanel(){
  // 7대표음 그룹 — 같은 소리로 발음되는 받침들
  const groups=[
    {sound:'ㄱ',rom:'k  (윽)',tts:'윽',ex:'국 (soup)',members:[{kr:'ㄱ',ex:'국'},{kr:'ㅋ',ex:'부엌'},{kr:'ㄲ',ex:'닭'}]},
    {sound:'ㄴ',rom:'n  (은)',tts:'은',ex:'산 (mountain)',members:[{kr:'ㄴ',ex:'산'}]},
    {sound:'ㄷ',rom:'t  (읃)',tts:'읃',ex:'곧 (straight)',members:[{kr:'ㄷ',ex:'곧'},{kr:'ㅅ',ex:'옷'},{kr:'ㅆ',ex:'있다'},{kr:'ㅈ',ex:'낮'},{kr:'ㅊ',ex:'꽃'},{kr:'ㅌ',ex:'끝'},{kr:'ㅎ',ex:'좋다'}]},
    {sound:'ㄹ',rom:'l  (을)',tts:'을',ex:'말 (horse)',members:[{kr:'ㄹ',ex:'말'}]},
    {sound:'ㅁ',rom:'m  (음)',tts:'음',ex:'봄 (spring)',members:[{kr:'ㅁ',ex:'봄'}]},
    {sound:'ㅂ',rom:'p  (읍)',tts:'읍',ex:'밥 (rice)',members:[{kr:'ㅂ',ex:'밥'},{kr:'ㅍ',ex:'앞'}]},
    {sound:'ㅇ',rom:'ng (응)',tts:'응',ex:'강 (river)',members:[{kr:'ㅇ',ex:'강'}]},
  ];
  const grpHtml=groups.map(g=>{
    const mems=g.members.map(m=>'<div class="batchim-member"><div class="batchim-member-kr">'+m.kr+'</div><div class="batchim-member-ex">'+m.ex+'</div></div>').join('');
    return '<div class="batchim-group">'
      +'<div class="batchim-group-hdr">'
      +'<div class="batchim-group-sound">'+g.sound+'</div>'
      +'<div class="batchim-group-rom">'+g.rom+'</div>'
      +'<div class="batchim-group-ex">'+g.ex+'</div>'
      +'<button class="batchim-group-tts" onclick="speakTTS(\''+g.tts+'\')">🔊 '+g.tts+'</button>'
      +'</div>'
      +'<div class="batchim-members">'+mems+'</div>'
      +'</div>';
  }).join('');
  return '<div class="basics-intro" style="margin-bottom:16px;"><strong>받침</strong>은 음절 아래에 오는 자음이에요. 어떤 자음이 와도 <strong>7가지 소리</strong>로만 발음돼요!<br><em>Batchim = final consonant. No matter which consonant, only 7 sounds are used.</em></div>'
    +'<div class="batchim-groups">'+grpHtml+'</div>'
    +'<div class="structure-note">💡 받침 뒤에 모음이 오면 연음이 돼요! <em>국어 → [구거], 음악 → [으막]</em><br><em>When batchim is followed by a vowel, the sound carries over!</em></div>';
}

    +'<tr><td style="cursor:pointer" onclick="speakTTS(\'어디에 가요?\')"><strong>어디</strong>에 가요? 🔊</td><td>Where are you going?</td></tr>'
    +'<tr><td style="cursor:pointer" onclick="speakTTS(\'언제 와요?\')"><strong>언제</strong> 와요? 🔊</td><td>When are you coming?</td></tr>'
    +'<tr><td style="cursor:pointer" onclick="speakTTS(\'이거 얼마예요?\')">이거 <strong>얼마</strong>예요? 🔊</td><td>How much is this?</td></tr>'

    +'</div>';

  return '<div class="btab-bar">'

}

function buildGreetings(){
  // 기본 인사 / 작별 인사 카드 (emoji + usage 컨텍스트 포함)
  function gCards(list){
    return list.map(g=>'<div class="greet-card" onclick="speakTTS(\''+g.kr+'\')">'
      +'<div class="greet-emoji">'+g.emoji+'</div>'
      +'<div class="greet-body"><div class="greet-kr">'+g.kr+' <span class="greet-speak-icon">🔊</span></div><div class="greet-rom">'+g.rom+'</div><div class="greet-en">'+g.en+'</div></div>'
      +'<div class="greet-usage">'+g.usage+'</div></div>').join('');
  }
  // 교실 표현 카드 (텍스트 중심)
  function cCards(list){
    return list.map(c=>'<div class="class-card" onclick="speakTTS(\''+c.kr+'\')">'
      +'<div class="class-kr">'+c.kr+' <span class="greet-speak-icon">🔊</span></div>'
      +'<div class="class-rom">'+c.rom+'</div>'
      +'<div class="class-en">'+c.en+'</div></div>').join('');
  }
  const tabs=[['basic','👋 기본 인사'],['classroom','🏫 교실 표현'],['farewell','👋 작별 인사']];
  return '<div class="basics-intro">클릭하면 발음을 들을 수 있어요! 선생님 앞에서는 항상 존댓말을 써요.<br><em>Click any card to hear it. Always use formal speech with your teacher.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-greet" data-tab="'+id+'" onclick="switchBtab(\'bp-greet\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-greet-basic" class="btab-panel active">'+gCards(GREETINGS.basic)+'</div>'
    +'<div id="bp-greet-classroom" class="btab-panel">'
      +'<div class="class-cols">'
        +'<div class="class-col">'
          +'<div class="class-col-hdr teacher-hdr">🎓 선생님이 말해요<br><em>Teacher says</em></div>'
          +cCards(CLASSROOM_TEACHER)
        +'</div>'
        +'<div class="class-col">'
          +'<div class="class-col-hdr student-hdr">🙋 학생이 말해요<br><em>Student says</em></div>'
          +cCards(CLASSROOM_STUDENT)
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div id="bp-greet-farewell" class="btab-panel">'
      +'<div class="farewell-tip">💡 한국어에는 작별 인사가 두 가지예요 — 떠나는 사람과 남는 사람이 달라요!<br><em>Korean has two goodbyes — one for who leaves, one for who stays!</em></div>'
      +gCards(GREETINGS.farewell)
    +'</div>';
}

      +'</div>'
      +'<div class="bignum-key-card purple">'
        +'<div class="bignum-key-num">100,000,000</div>'
        +'<div class="bignum-key-kr" onclick="speakTTS(\'억\')">억 🔊</div>'
        +'<div class="bignum-key-en">KEY UNIT 2️⃣</div>'

    +'<div id="bp-num-native" class="btab-panel"><div class="basics-intro">물건 세기, 나이, 시간(시), 회수에 사용해요.<br><em>Used for counting objects, age, hours, how many times.</em></div>'+nCards(NATIVE_NUMS)+'</div>'

function buildVerbs(){
  // ── 개요 탭 ──
  const tabOverview =
    '<div class="basics-intro">한국어 동사는 항상 <strong>-다</strong>로 끝나요(사전형). 어간(Stem)에 어미(Ending)를 붙여서 시제·존댓말을 표현해요!<br><em>Korean verbs end in -다. Attach endings to the stem to express tense and speech level.</em></div>'
    +'<img src="data/basics/Korean_verb_conjugation.png" alt="Korean Verb Conjugation Overview" class="vconj-overview-img">'
    +'<div class="vconj-section-title">⚙️ 핵심 공식 · The Formula</div>'
    +'<div class="vconj-concept-grid">'
    +'<div class="vconj-concept-card"><div class="vconj-concept-icon">🧱</div><div class="vconj-concept-label">어간 Stem<span class="vconj-concept-label-en">The unchanged base</span></div><div class="vconj-concept-desc">기본형에서 <strong>-다</strong>를 제거한 부분이에요.<br><em>Remove -다 from the dictionary form.</em><br><br>가다 → <strong style="color:var(--teal-dark)">가-</strong> &nbsp;|&nbsp; 먹다 → <strong style="color:var(--teal-dark)">먹-</strong></div></div>'
    +'<div class="vconj-concept-card"><div class="vconj-concept-icon">🔧</div><div class="vconj-concept-label">어미 Ending<span class="vconj-concept-label-en">The changing part</span></div><div class="vconj-concept-desc">시제·존댓말·반말을 나타내요.<br><em>Expresses tense, formality, and more.</em><br><br>현재: <strong style="color:var(--teal-dark)">-아/어요</strong> (formal) / <strong style="color:var(--coral)">-아/어</strong> (casual)</div></div>'
    +'</div>'
    +'<div class="vconj-formula">기본형 − 다 = 어간(Stem) &nbsp;+&nbsp; 어미(Ending) = 활용형 ✅</div>'
    +'<div class="vconj-section-title">📋 해요체 만드는 4가지 규칙 · 4 Rules for Polite Form</div>'
    +'<table class="structure-ex-table"><tr><th>규칙 Rule</th><th>조건 Condition</th><th>어미 Ending</th><th>예 Example</th></tr>'
    +'<tr><td><strong>Rule 1</strong></td><td>어간 마지막 모음 = ㅏ/ㅗ<br><em>Last vowel = ㅏ/ㅗ</em></td><td style="color:var(--teal-dark);font-weight:700">-아요</td><td onclick="speakTTS(\'가요\')" style="cursor:pointer">가다 → <strong>가요</strong> 🔊</td></tr>'

function getApiKey(){return localStorage.getItem('nhs_api_key')||'';}
function openApiKey(){
  document.getElementById('apikey-input').value=getApiKey();
  document.getElementById('apikey-overlay').classList.add('open');
}
function closeApiKey(){document.getElementById('apikey-overlay').classList.remove('open');}
function saveApiKey(){
  const v=document.getElementById('apikey-input').value.trim();
  if(!v)return;
  localStorage.setItem('nhs_api_key',v);
  closeApiKey();
  updateApiKeyBtn();
  alert('✅ API 키 저장됐어요! 이제 스피킹 기능을 사용할 수 있어요.');
}
function updateApiKeyBtn(){
  const btn=document.getElementById('apikey-status-btn');
  if(!btn)return;
  btn.textContent=getApiKey()?'⚙️ AI ✓':'⚙️ AI';
  btn.style.color=getApiKey()?'var(--teal)':'var(--gray-500)';
  btn.style.borderColor=getApiKey()?'var(--teal)':'var(--gray-200)';
}

// ── 큰 숫자 변환기 ──────────────────────────────────────
function convertBigNum(){
  const el=document.getElementById('bignum-input');
  const res=document.getElementById('bignum-result');
  if(!el||!res)return;
  const raw=el.value.replace(/,/g,'').trim();
  const n=parseInt(raw,10);
  if(!raw||isNaN(n)||n<0){res.innerHTML='<span style="color:var(--warm-400);font-size:13px">숫자를 입력하면 변환돼요 · Enter a number above</span>';return;}

  const sino=['','일','이','삼','사','오','육','칠','팔','구'];
  const units=['','십','백','천'];
  function group4(num){
    if(num===0)return '';
    let s='';
    const d=[Math.floor(num/1000)%10,Math.floor(num/100)%10,Math.floor(num/10)%10,num%10];
    for(let i=0;i<4;i++){
      if(!d[i])continue;
      s+=(d[i]===1&&i<3)?units[3-i]:sino[d[i]]+units[3-i];
    }
    return s;
  }
  function toKorean(num){
    if(num===0)return '영';
    const jo=Math.floor(num/1000000000000);
    const eok=Math.floor(num/100000000)%10000;
    const man=Math.floor(num/10000)%10000;
    const rest=num%10000;
    let s='';
    if(jo) s+=group4(jo)+'조 ';
    if(eok)s+=group4(eok)+'억 ';
    if(man)s+=group4(man)+'만 ';
    if(rest)s+=group4(rest);
    return s.trim()||'영';
  }

  // 영어 3자리 grouping
  const enGrouped=n.toLocaleString('en-US');
  // 한국어 4자리 grouping
  const s=String(n);
  let krGrouped='';
  for(let i=0;i<s.length;i++){
    const fromRight=s.length-1-i;
    krGrouped+=s[i];
    if(fromRight>0&&fromRight%4===0)krGrouped+=',';
  }
  const krRead=toKorean(n);
  const safeRead=krRead.replace(/'/g,'&#39;');

  res.innerHTML=
    '<div class="bignum-result-row"><span class="bignum-result-label">🇺🇸 영어</span><span class="bignum-result-val" style="color:#3b4cc0">'+enGrouped+'</span></div>'
   +'<div class="bignum-result-row"><span class="bignum-result-label">읽기 단위 분석</span><span class="bignum-result-val" style="color:var(--teal-dark)">'+krGrouped+'</span></div>'
   +'<div class="bignum-result-row"><span class="bignum-result-label">🔊 읽는 법</span><span class="bignum-result-kr" style="cursor:pointer" onclick="speakTTS(\''+safeRead+'\')">'+krRead+' &nbsp;<span style="font-size:16px">🔊</span></span></div>';
}

let _recog=null;
function _initRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  _recog=new SR();
  _recog.lang='ko-KR';
  _recog.continuous=false;
  _recog.interimResults=false;
  return true;
}

async function startSpeak(targetKr, targetEn, btnEl){
  if(!getApiKey()){openApiKey();return;}
  if(!_recog&&!_initRecog()){
    alert('음성 인식은 Chrome 브라우저에서만 지원돼요!');return;
  }
  // Find result panel next to this button
  const card=btnEl.closest('.speak-card');
  const result=card.querySelector('.speak-result');
  const saidEl=card.querySelector('.speak-said-text');
  const fbEl=card.querySelector('.speak-feedback');
  btnEl.textContent='🔴 듣는 중...';
  btnEl.classList.add('listening');
  btnEl.disabled=true;
  result.style.display='none';

  _recog.onresult=async(e)=>{
    const said=e.results[0][0].transcript;
    saidEl.textContent=said;
    fbEl.textContent='분석 중...';
    result.style.display='block';
    btnEl.textContent='⏳ 분석 중...';
    btnEl.classList.remove('listening');
    const fb=await _callClaude(targetKr,targetEn,said);
    fbEl.textContent=fb;
    btnEl.textContent='🎤 다시 말해보기';
    btnEl.disabled=false;
  };
  _recog.onerror=(e)=>{
    btnEl.textContent='🎤 말해보기';
    btnEl.classList.remove('listening');
    btnEl.disabled=false;
  };
  _recog.onend=()=>{
    if(btnEl.disabled&&btnEl.textContent==='🔴 듣는 중...'){
      btnEl.textContent='🎤 말해보기';
      btnEl.classList.remove('listening');
      btnEl.disabled=false;
    }
  };
  try{ _recog.start(); }catch(e){ _recog=null; _initRecog(); _recog.start(); }
}

// ═══════════════════════════ VERB DRILL GAME ═══════════════════════════
let vdState = {};

function vdInit(gramId) {
  const g = (DATA.grammar||[]).find(function(x){return x.id===gramId;});
  if(!g||!g.verb_drill) return;
  const drillCfg = g.verb_drill;
  const verbs = drillCfg.verbs||[];
  const tenses = ['present','past','future'];
  const tenseLabels = {present:'현재형 Present',past:'과거형 Past',future:'미래형 Future'};
  let allQ = [];
  verbs.forEach(function(v){
    tenses.forEach(function(t){
      allQ.push({verb:v, tense:t, tenseLabel:tenseLabels[t],
        correct:v[t], exp:v['exp_'+t]||''});
    });
  });
  allQ = allQ.sort(function(){return Math.random()-.5;}).slice(0, drillCfg.rounds||10);
  vdState[gramId] = {questions:allQ, idx:0, score:0, verbs:verbs};
  vdRender(gramId);
}

function vdBuildOpts(gramId, qIdx) {
  const st = vdState[gramId];
  const q = st.questions[qIdx];
  const correct = q.correct;
  const pool = st.verbs.map(function(v){return v[q.tense];}).filter(function(v){return v!==correct;});
  const shuffled = pool.sort(function(){return Math.random()-.5;});
  const opts = [correct, shuffled[0], shuffled[1]].sort(function(){return Math.random()-.5;});
  return opts;
}

function vdRender(gramId) {
  const st = vdState[gramId];
  const body = document.getElementById('vd-body-'+gramId);
  if(!body) return;
  if(st.idx >= st.questions.length) { vdRenderScore(gramId); return; }
  const q = st.questions[st.idx];
  const opts = vdBuildOpts(gramId, st.idx);
  const pct = Math.round(st.idx/st.questions.length*100);
  const isLast = st.idx === st.questions.length-1;
  const optHtml = opts.map(function(o,i){
    const oSafe = o.replace(/'/g,"\\'");
    const cSafe = q.correct.replace(/'/g,"\\'");
    return '<button class="vd-opt" onclick="vdAnswer(\''+gramId+'\','+i+',this,\''+oSafe+'\',\''+cSafe+'\')"><span class="vd-opt-lbl">○</span><span>'+o+'</span><button onclick="speakTTS(\''+oSafe+'\');event.stopPropagation();" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;margin-left:auto" tabindex="-1">🔊</button></button>';
  }).join('');
  body.innerHTML =
    '<div class="vd-prog-bar"><div class="vd-prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="vd-prog-label">'+st.idx+' / '+st.questions.length+'</div>'+
    '<div class="vd-q-box">'+
      '<div style="font-size:1.8rem">'+q.verb.emoji+'</div>'+
      '<div class="vd-verb">'+q.verb.dict+'</div>'+
      '<div class="vd-tense-badge">→ '+q.tenseLabel+'?</div>'+
      '<div class="vd-tag">'+q.verb.tag+'</div>'+
    '</div>'+
    '<div class="vd-opts" id="vd-opts-'+gramId+'">'+optHtml+'</div>'+
    '<div class="vd-exp" id="vd-exp-'+gramId+'">💡 '+q.exp+'</div>'+
    '<button class="vd-next-btn" id="vd-next-'+gramId+'" onclick="vdNext(\''+gramId+'\')">'+
      (isLast?'📊 결과 보기':'다음 →')+'</button>';
}

function vdAnswer(gramId, i, btn, chosen, correct) {
  const container = document.getElementById('vd-opts-'+gramId);
  if(!container) return;
  container.querySelectorAll('.vd-opt').forEach(function(b){
    b.disabled = true;
    const lbl = b.querySelector('.vd-opt-lbl');
    const txt = b.querySelector('span:nth-child(2)');
    const val = txt ? txt.textContent.trim() : '';
    if(val === correct){ b.classList.add('correct'); if(lbl)lbl.textContent='✓'; }
    else if(b===btn && chosen!==correct){ b.classList.add('wrong'); if(lbl)lbl.textContent='✗'; }
  });
  if(chosen===correct) vdState[gramId].score++;
  const exp = document.getElementById('vd-exp-'+gramId);
  if(exp) exp.classList.add('show');
  const nxt = document.getElementById('vd-next-'+gramId);
  if(nxt) nxt.classList.add('show');
  vdState[gramId].idx++;
}

function vdNext(gramId){ vdRender(gramId); }

function vdRenderScore(gramId) {
  const st = vdState[gramId];
  const body = document.getElementById('vd-body-'+gramId);
  if(!body) return;
  const total = st.questions.length;
  const pct = Math.round(st.score/total*100);
  var grade, gradeLabel, gradeColor;
  if(pct>=90){grade='🏆';gradeLabel='완벽해요! Perfect!';gradeColor='var(--teal)';}
  else if(pct>=70){grade='🌟';gradeLabel='잘했어요! Great job!';gradeColor='var(--blue)';}
  else if(pct>=50){grade='👍';gradeLabel='좋아요! Keep going!';gradeColor='#B45309';}
  else{grade='🌱';gradeLabel='다시 해봐요! Try again!';gradeColor='var(--coral)';}
  body.innerHTML =
    '<div class="vd-score-wrap">'+
      '<div class="vd-grade">'+grade+'</div>'+
      '<div class="vd-score-num" style="color:'+gradeColor+'">'+st.score+' <span style="font-size:1.2rem;color:var(--warm-500)">/ '+total+'</span></div>'+
      '<div class="vd-grade-label" style="color:'+gradeColor+'">'+gradeLabel+'</div>'+
      '<div class="vd-score-label">'+pct+'% 정답 · accuracy</div>'+
    '</div>'+
    '<button class="vd-restart-btn" onclick="vdInit(\''+gramId+'\')">↺ 다시 도전 / Play Again</button>';
}
