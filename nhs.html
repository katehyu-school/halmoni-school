async function loadEpAndTab(epId, tabName){
  closeIndex();
  await loadEp(epId);
  showTab(tabName);
}

function getEpLabel(epId){
  const ep=EPISODE_DATA[epId];
  if(!ep)return epId;
  const lvl=ep.level||'';
  const num=(epId||'').replace('ep','');
  const lvlMap={'초급':'Beginner','중급':'Intermediate','고급':'Advanced','기초':'Starter'};
  return (lvlMap[lvl]||lvl)+' · ep'+num;
}

// ── 색인 모달 ───────────────────────────────────────────
let idxTab='vocab';

function openIndex(){
  document.getElementById('idx-overlay').classList.add('open');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}
function closeIndex(){
  document.getElementById('idx-overlay').classList.remove('open');
}
// ── 국어사전 정렬 (Unicode 코드포인트 기반, 한글 블록이 ㄱㄴㄷ 순으로 배열됨) ──
function _koCompare(a,b){
  for(let i=0;i<Math.min(a.length,b.length);i++){const d=a.charCodeAt(i)-b.charCodeAt(i);if(d!==0)return d;}
  return a.length-b.length;
}
// ── 초성(받침없는 자음) 추출 ──
function getOnset(ch){
  const c=(ch||'').charCodeAt(0);
  if(c<0xAC00||c>0xD7A3) return (ch||'#').toUpperCase();
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor((c-0xAC00)/588)];
}
let _idxPage=0; const _IDX_PG=30; let _idxFiltered=[];
function _idxGoPage(pg, onset){
  _idxPage=pg;
  _renderIdxVocabPage();
  // scroll to onset section after render
  if(onset){
    const body=document.getElementById('idx-body');
    if(!body)return;
    const hdrs=body.querySelectorAll('.idx-section-hdr');
    for(const h of hdrs){if(h.textContent.trim()===onset){h.scrollIntoView({block:'start'});body.scrollTop=body.scrollTop-8;break;}}
  }
}
function _renderIdxVocabPage(){
  const words=_idxFiltered;
  const total=words.length;
  const totalPg=Math.max(1,Math.ceil(total/_IDX_PG));
  _idxPage=Math.max(0,Math.min(_idxPage,totalPg-1));
  const slice=words.slice(_idxPage*_IDX_PG,(_idxPage+1)*_IDX_PG);
  // 초성별 섹션 헤더 + 단어
  let html='';
  let cur=null;
  slice.forEach(v=>{
    const o=getOnset((v.korean||'')[0]||'');
    if(o!==cur){cur=o;html+=`<div class="idx-section-hdr">${esc(o)}</div>`;}
    html+=`<div class="idx-vocab-row">
      <div class="idx-vocab-kr">${esc(v.korean||'')} ${v.emoji||''}</div>
      <div style="font-size:11px;color:var(--warm-500);min-width:90px">${esc(v.romanization||'')}</div>
      <div class="idx-vocab-en">${esc(v.english||v.en||'')}</div>
      <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(v.ep||'')}','vocab')">${esc(getEpLabel(v.ep||''))}</span>
      <button onclick="speakTTS('${escA(v.korean||'')}')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:.4">🔊</button>
    </div>`;
  });
  document.getElementById('idx-body').innerHTML=html||'<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';
  // 페이지 컨트롤 업데이트
  const pc=document.getElementById('idx-page-ctrl');
  if(pc){
    pc.style.display=totalPg>1?'flex':'none';
    pc.innerHTML=`<button class="idx-page-btn" onclick="_idxGoPage(${_idxPage-1})" ${_idxPage===0?'disabled':''}>◀</button>
      <span class="idx-page-info">${_idxPage+1} / ${totalPg}</span>
      <button class="idx-page-btn" onclick="_idxGoPage(${_idxPage+1})" ${_idxPage===totalPg-1?'disabled':''}>▶</button>`;
  }
}

function switchIdxTab(tab){
  idxTab=tab;
  document.querySelectorAll('.idx-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('idx-tab-'+tab).classList.add('active');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}

function renderIdxBody(){
  const q=(document.getElementById('idx-search-input').value||'').toLowerCase();
  const body=document.getElementById('idx-body');
  if(!body)return;

  // 전체 에피소드 데이터 수집
  const allEps=Object.values(EPISODE_DATA).filter(ep=>ep&&ep.id);

  if(idxTab==='vocab'){
    // 전체 단어 수집
    let allWords=[];
    allEps.forEach(ep=>{
      const vocab=ep.vocab||[];
      const isGrouped=vocab.length>0&&vocab[0].items;
      if(isGrouped){
        vocab.forEach(g=>g.items.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title})));
      } else {
        vocab.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title}));
      }
    });
    // 검색 필터 + 정렬
    if(q) allWords=allWords.filter(v=>(v.korean||'').toLowerCase().includes(q)||(v.english||v.en||'').toLowerCase().includes(q));
    allWords.sort((a,b)=>_koCompare(a.korean||'',b.korean||''));
    _idxFiltered=allWords;
    _idxPage=0;
    // 초성 점프바 구성
    const onsetPage={};
    allWords.forEach((w,i)=>{
      const o=getOnset((w.korean||'')[0]||'');
      if(!(o in onsetPage)) onsetPage[o]=Math.floor(i/_IDX_PG);
    });
    const jbar=document.getElementById('idx-jump-bar');
    if(jbar) jbar.innerHTML=Object.entries(onsetPage).map(([o,pg])=>
      `<button class="idx-jump-btn" onclick="_idxGoPage(${pg},'${o}')">${o}</button>`).join('');
    _renderIdxVocabPage();

  } else if(idxTab==='grammar'){
    let allGram=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>allGram.push({...g,ep:ep.id,epTitle:ep.title}));
    });
    if(q) allGram=allGram.filter(g=>(g.title||'').toLowerCase().includes(q)||(g.explanation_en||'').toLowerCase().includes(q));
    let html='';
    if(!allGram.length){html='<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';}
    else{
      // 에피소드별 그룹
      const byEp={};
      allGram.forEach(g=>{
        if(!byEp[g.ep])byEp[g.ep]=[];
        byEp[g.ep].push(g);
      });
      Object.keys(byEp).sort().forEach(epId=>{
        const ep=allEps.find(e=>e.id===epId);
        html+=`<div class="idx-section-hdr">EP.${esc(epId.replace('ep',''))} · ${esc(ep?ep.title:'')}</div>`;
        html+=byEp[epId].map(g=>`
          <div class="idx-gram-row">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">${esc(g.icon||'📌')}</span>
              <div>
                <div class="idx-gram-title">${esc(g.title||'')} <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(g.ep||'')}','grammar')">${esc(getEpLabel(g.ep||''))}</span></div>

    } else {
      html=allPron.map(g=>`
        <div class="idx-pron-row">
          <div style="display:flex;align-items:flex-start;gap:10px">

    }
    body.innerHTML=html;
  }
}

function combineSyl(onset,nucleus,coda){
  const onsets=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const nuclei=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const codas=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const oi=onsets.indexOf(onset),ni=nuclei.indexOf(nucleus),ci=codas.indexOf(coda||'');
  if(oi<0||ni<0||ci<0)return null;
  return String.fromCharCode(0xAC00+oi*21*28+ni*28+ci);
}

  if(verbGameAnswered)return;

  document.querySelectorAll('.verb-choice').forEach(b=>{

function initWritingCanvas(){
  wCanvas=document.getElementById('writing-canvas');
  if(!wCanvas)return;
  wCtx=wCanvas.getContext('2d');
  wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;wCtx.lineCap='round';wCtx.lineJoin='round';
  drawGridLines();
  wCanvas.addEventListener('mousedown',e=>{const r=wCanvas.getBoundingClientRect();wDrawing=true;wLX=e.clientX-r.left;wLY=e.clientY-r.top;});
  wCanvas.addEventListener('mousemove',e=>{if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;});
  wCanvas.addEventListener('mouseup',()=>wDrawing=false);
  wCanvas.addEventListener('mouseleave',()=>wDrawing=false);
  wCanvas.addEventListener('touchstart',e=>{e.preventDefault();const r=wCanvas.getBoundingClientRect();const t=e.touches[0];wDrawing=true;wLX=t.clientX-r.left;wLY=t.clientY-r.top;},{passive:false});
  wCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const t=e.touches[0];const x=t.clientX-r.left,y=t.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;},{passive:false});
  wCanvas.addEventListener('touchend',()=>wDrawing=false);
}
function drawGridLines(){
  if(!wCtx||!wCanvas)return;
  const w=wCanvas.width,h=wCanvas.height;
  wCtx.clearRect(0,0,w,h);
  wCtx.save();wCtx.strokeStyle='#e8e8e8';wCtx.lineWidth=1;
  wCtx.beginPath();wCtx.moveTo(w/2,0);wCtx.lineTo(w/2,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,h/2);wCtx.lineTo(w,h/2);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,0);wCtx.lineTo(w,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(w,0);wCtx.lineTo(0,h);wCtx.stroke();
  wCtx.strokeStyle='#cccccc';wCtx.lineWidth=1.5;wCtx.strokeRect(2,2,w-4,h-4);
  wCtx.restore();wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;
}
function clearCanvas(){if(!wCtx||!wCanvas)return;drawGridLines();}

function setLevel(btn){
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curLevel=btn.textContent.trim();
  const hdr=document.querySelector('.sidebar-hdr,.sidebar-hdr-amber');
  if(curLevel==='Basics'){
    if(hdr){hdr.className='sidebar-hdr-amber';hdr.innerHTML='🌱 기초반 · Basics';}
    buildBasicsSidebar();
    loadBasics(curBasicsTopic);
  }else{
    if(hdr){hdr.className='sidebar-hdr';hdr.innerHTML='📺 Episodes';}
    buildSidebar();
    loadEp('ep01');
  }
}

function buildBasicsSidebar(){
  const list=document.getElementById('ep-list');
  list.innerHTML=BASICS_TOPICS.map(t=>
    '<div class="basics-topic-item'+(t.id===curBasicsTopic?' active':'')+'" id="bt-'+t.id+'" onclick="loadBasics(\''+t.id+'\')">'
    +'<div class="basics-topic-icon">'+t.icon+'</div>'
    +'<div class="basics-topic-name">'+t.label+'<span class="basics-topic-name-en">'+t.en+'</span></div>'
    +'</div>').join('');
}

function loadBasics(topicId){
  curBasicsTopic=topicId;
  document.querySelectorAll('.basics-topic-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('bt-'+topicId);
  if(item)item.classList.add('active');
  const topic=BASICS_TOPICS.find(t=>t.id===topicId);
  if(!topic)return;
  document.getElementById('content-area').innerHTML=
    '<div style="max-width:860px;margin:0 auto;padding:24px;">'
    +'<div class="basics-header"><div class="basics-icon-big">'+topic.icon+'</div>'
    +'<div><div class="basics-title-kr">'+topic.label+'</div><div class="basics-title-en">'+topic.en+'</div></div></div>'
    +'<div id="basics-body"></div></div>';
  const body=document.getElementById('basics-body');
  if(topicId==='hangul')    body.innerHTML=buildHangul();
  if(topicId==='structure') body.innerHTML=buildStructure();
  if(topicId==='greetings') body.innerHTML=buildGreetings();
  if(topicId==='numbers')   body.innerHTML=buildNumbers();
  if(topicId==='writing')   body.innerHTML=buildWriting();
  if(topicId==='verbs')     body.innerHTML=buildVerbs();
  if(topicId==='speaking')  body.innerHTML=buildSpeaking();
  if(topicId==='hangul')  requestAnimationFrame(()=>updateSylResult());
  if(topicId==='writing') requestAnimationFrame(()=>initWritingCanvas());
  if(topicId==='verbs')   requestAnimationFrame(()=>renderVerbGame());
}

function switchBtab(pfx,tabId){
  document.querySelectorAll('[id^="'+pfx+'-"]').forEach(p=>{if(p.classList.contains('btab-panel'))p.classList.remove('active');});
  document.querySelectorAll('[data-btab-group="'+pfx+'"]').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById(pfx+'-'+tabId);if(p)p.classList.add('active');
  document.querySelectorAll('[data-btab-group="'+pfx+'"][data-tab="'+tabId+'"]').forEach(b=>b.classList.add('active'));
}

function buildHangul(){
  const tabs=[['cons','자음 Consonants'],['vowels','모음 Vowels'],['batchim','받침 Batchim'],['syllable','음절 Syllables']];
  return '<div class="basics-intro">한글(Hangul)은 1443년 세종대왕이 만든 소리 문자예요. 자음 19개 + 모음 21개로 이루어져 있어요.<br><em>Hangul is a phonetic alphabet invented by King Sejong in 1443.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-hangul" data-tab="'+id+'" onclick="switchBtab(\'bp-hangul\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-hangul-cons" class="btab-panel active">'+buildConsPanel()+'</div>'
    +'<div id="bp-hangul-vowels" class="btab-panel">'+buildVowPanel()+'</div>'
    +'<div id="bp-hangul-batchim" class="btab-panel">'+buildBatchimPanel()+'</div>'
    +'<div id="bp-hangul-syllable" class="btab-panel">'+buildSylPanel()+'</div>';
}
function hcHtml(item){
  return '<div class="hcard" onclick="speakTTS(\''+item.kr+'\')">'
    +'<div class="hcard-kr">'+item.kr+'</div>'
    +(item.name?'<div class="hcard-name">'+item.name+'</div>':'')
    +'<div class="hcard-rom">'+item.rom+'</div>'
    +'<div class="hcard-ex">'+item.ex+'</div></div>';
}
function buildConsPanel(){
  return '<div class="hangul-section-title">기본 자음 · Basic Consonants (14)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(0,14).map(hcHtml).join('')+'</div>'
    +'<div class="hangul-section-title">쌍자음 · Double Consonants (5)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(14).map(hcHtml).join('')+'</div>'
    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Consonants need a vowel to be voiced!</strong> They cannot stand alone as a syllable.<br>'
    +'자음은 홀로 발음될 수 없어요 — 반드시 모음과 함께 써야 해요.<br><br>'
    +'⚠️ The same consonant can sound different as an <strong>initial (첫소리)</strong> vs. <strong>final consonant (받침소리)</strong>.<br>'
    +'예: ㄱ → initial: <em>g</em> (가) / final: <em>k</em> (국) · Final consonants are always one of 7 representative sounds.</div>';
}
function buildVowPanel(){
  return '<div class="hangul-section-title">기본 모음 · Simple Vowels (10)</div>'
    +'<div class="hangul-grid">'+VOWELS.slice(0,10).map(hcHtml).join('')+'</div>'
    +'<div class="hangul-section-title">복합 모음 · Compound Vowels (11)</div>'
    +'<div class="hangul-grid">'+VOWELS.slice(10).map(hcHtml).join('')+'</div>'
    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Vowel placement depends on shape:</strong><br>'
    +'세로 모음 (ㅏ ㅑ ㅓ ㅕ ㅣ) — consonant is on the <strong>left</strong>, vowel on the <strong>right</strong>: 가 나 다<br>'
    +'가로 모음 (ㅗ ㅛ ㅜ ㅠ ㅡ) — consonant is on <strong>top</strong>, vowel <strong>below</strong>: 고 노 도</div>';
}

    +'<button class="syl-clear-btn" onclick="clearSyl()">↺ 초기화</button>'
    +'</div>';
}
function buildBatchimPanel(){
  // 7대표음 그룹 — 같은 소리로 발음되는 받침들
  const groups=[
    {sound:'ㄱ',rom:'k  (윽)',tts:'윽',ex:'국 (soup)',members:[{kr:'ㄱ',ex:'국'},{kr:'ㅋ',ex:'부엌'},{kr:'ㄲ',ex:'닭'}]},
    {sound:'ㄴ',rom:'n  (은)',tts:'은',ex:'산 (mountain)',members:[{kr:'ㄴ',ex:'산'}]},
    {sound:'ㄷ',rom:'t  (읃)',tts:'읃',ex:'곧 (straight)',members:[{kr:'ㄷ',ex:'곧'},{kr:'ㅅ',ex:'옷'},{kr:'ㅆ',ex:'있다'},{kr:'ㅈ',ex:'낮'},{kr:'ㅊ',ex:'꽃'},{kr:'ㅌ',ex:'끝'},{kr:'ㅎ',ex:'좋다'}]},
    {sound:'ㄹ',rom:'l  (을)',tts:'을',ex:'말 (horse)',members:[{kr:'ㄹ',ex:'말'}]},
    {sound:'ㅁ',rom:'m  (음)',tts:'음',ex:'봄 (spring)',members:[{kr:'ㅁ',ex:'봄'}]},
    {sound:'ㅂ',rom:'p  (읍)',tts:'읍',ex:'밥 (rice)',members:[{kr:'ㅂ',ex:'밥'},{kr:'ㅍ',ex:'앞'}]},
    {sound:'ㅇ',rom:'ng (응)',tts:'응',ex:'강 (river)',members:[{kr:'ㅇ',ex:'강'}]},
  ];
  const grpHtml=groups.map(g=>{
    const mems=g.members.map(m=>'<div class="batchim-member"><div class="batchim-member-kr">'+m.kr+'</div><div class="batchim-member-ex">'+m.ex+'</div></div>').join('');
    return '<div class="batchim-group">'
      +'<div class="batchim-group-hdr">'
      +'<div class="batchim-group-sound">'+g.sound+'</div>'
      +'<div class="batchim-group-rom">'+g.rom+'</div>'
      +'<div class="batchim-group-ex">'+g.ex+'</div>'
      +'<button class="batchim-group-tts" onclick="speakTTS(\''+g.tts+'\')">🔊 '+g.tts+'</button>'
      +'</div>'
      +'<div class="batchim-members">'+mems+'</div>'
      +'</div>';
  }).join('');
  return '<div class="basics-intro" style="margin-bottom:16px;"><strong>받침</strong>은 음절 아래에 오는 자음이에요. 어떤 자음이 와도 <strong>7가지 소리</strong>로만 발음돼요!<br><em>Batchim = final consonant. No matter which consonant, only 7 sounds are used.</em></div>'
    +'<div class="batchim-groups">'+grpHtml+'</div>'
    +'<div class="structure-note">💡 받침 뒤에 모음이 오면 연음이 돼요! <em>국어 → [구거], 음악 → [으막]</em><br><em>When batchim is followed by a vowel, the sound carries over!</em></div>';
}

function buildStructure(){
  const exs=[
    {en:'I eat kimchi.',ko:'저는 김치를 먹어요.'},
    {en:'She goes to school.',ko:'그녀는 학교에 가요.'},
    {en:'We study Korean every day.',ko:'우리는 매일 한국어를 공부해요.'},
    {en:"I don't know.",ko:'모르겠어요.'},
  ];
  return '<div class="basics-intro">한국어는 <strong>주어 + 목적어 + 동사 (SOV)</strong> 어순이에요. 영어는 SVO — 동사가 가운데에 있죠.<br><em>Korean word order: Subject → Object → Verb. English: Subject → Verb → Object.</em></div>'
    +'<div class="structure-compare">'
    +'<div class="structure-box english"><div class="structure-box-title">🇺🇸 English — S · V · O</div>'
    +'<div class="chunk-row"><div class="chunk c-subj">I<sub>Subject</sub></div><span class="chunk-arrow">→</span><div class="chunk c-verb">eat<sub>Verb</sub></div><span class="chunk-arrow">→</span><div class="chunk c-obj">kimchi<sub>Object</sub></div></div></div>'
    +'<div class="structure-box korean"><div class="structure-box-title">🇰🇷 Korean — S · O · V</div>'
    +'<div class="chunk-row"><div class="chunk c-subj">저는<sub>I</sub></div><span class="chunk-arrow">→</span><div class="chunk c-obj">김치를<sub>kimchi</sub></div><span class="chunk-arrow">→</span><div class="chunk c-verb">먹어요<sub>eat</sub></div></div></div>'
    +'</div>'
    +'<div class="structure-note">🔑 한국어에서 동사는 <strong>항상 마지막</strong>에 와요! 문장 끝까지 들어야 이해할 수 있어요.<br><em>The verb is ALWAYS at the end. You must hear the whole sentence to understand the action!</em></div>'
    +'<table class="structure-ex-table"><tr><th>한국어</th><th>English</th></tr>'
    +exs.map(e=>'<tr><td style="cursor:pointer" onclick="speakTTS(\''+e.ko+'\')">'+e.ko+' 🔊</td><td>'+e.en+'</td></tr>').join('')+'</table>'
    +'<div class="structure-note" style="background:var(--purple-lt,#eeebfb);border-color:var(--purple-lt,#eeebfb);color:var(--purple);">⭐ Korean also uses <strong>particles</strong> (은/는, 이/가, 을/를) to mark roles — so word order can be flexible! We will cover particles in Beginner level.</div>'
    +'<div class="structure-note" style="background:var(--teal-50);border-color:var(--teal-lt);color:var(--teal-dark);margin-top:14px;">📌 아래 다이어그램으로 한눈에 비교해 보세요! <em>Use the diagram below for a quick visual comparison!</em></div>'
    +'<div style="text-align:center;margin-top:12px;"><img src="data/basics/Korean_Sentence_Structure.png" alt="Korean vs English Sentence Structure" style="max-width:70%;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1.5px solid var(--gray-200);"></div>';
}

        +'<div class="bignum-key-kr" onclick="speakTTS(\'억\')">억 🔊</div>'

  return '<div class="btab-bar">'

    +'<div id="bp-num-native" class="btab-panel"><div class="basics-intro">물건 세기, 나이, 시간(시), 회수에 사용해요.<br><em>Used for counting objects, age, hours, how many times.</em></div>'+nCards(NATIVE_NUMS)+'</div>'

    +'<img src="data/basics/Korean_verb_conjugation.png" alt="Korean Verb Conjugation Overview" class="vconj-overview-img">'

    +'</div>'

    +'<div class="vconj-section-title">📋 해요체 만드는 4가지 규칙 · 4 Rules for Polite Form</div>'

  const tabRegular =
    '<div class="basics-intro">어간(stem)의 형태가 변하지 않고 어미(ending)만 붙는 동사예요.<br><em>Regular verbs — the stem stays the same; only the ending changes.</em></div>'
    +'<div class="vconj-concept-grid">'
    +'<div class="vconj-concept-card"><div class="vconj-concept-icon">📦</div><div class="vconj-concept-label">변하지 않는 부분: 어간 Stem<span class="vconj-concept-label-en">The unchanged base</span></div><div class="vconj-concept-desc">기본형에서 <strong>-다</strong>를 제거한 핵심 부분이에요.<br><em>Remove -다 from the dictionary form.</em><br><br><strong style="font-size:13px">기본형 − \'다\' = 어간(Stem)</strong></div></div>'

// ── 큰 숫자 변환기 ──────────────────────────────────────
function convertBigNum(){
  const el=document.getElementById('bignum-input');
  const res=document.getElementById('bignum-result');
  if(!el||!res)return;
  const raw=el.value.replace(/,/g,'').trim();
  const n=parseInt(raw,10);
  if(!raw||isNaN(n)||n<0){res.innerHTML='<span style="color:var(--warm-400);font-size:13px">숫자를 입력하면 변환돼요 · Enter a number above</span>';return;}

  const sino=['','일','이','삼','사','오','육','칠','팔','구'];
  const units=['','십','백','천'];
  function group4(num){
    if(num===0)return '';
    let s='';
    const d=[Math.floor(num/1000)%10,Math.floor(num/100)%10,Math.floor(num/10)%10,num%10];
    for(let i=0;i<4;i++){
      if(!d[i])continue;
      s+=(d[i]===1&&i<3)?units[3-i]:sino[d[i]]+units[3-i];
    }
    return s;
  }
  function toKorean(num){
    if(num===0)return '영';
    const jo=Math.floor(num/1000000000000);
    const eok=Math.floor(num/100000000)%10000;
    const man=Math.floor(num/10000)%10000;
    const rest=num%10000;
    let s='';
    if(jo) s+=group4(jo)+'조 ';
    if(eok)s+=group4(eok)+'억 ';
    if(man)s+=group4(man)+'만 ';
    if(rest)s+=group4(rest);
    return s.trim()||'영';
  }

  // 영어 3자리 grouping
  const enGrouped=n.toLocaleString('en-US');
  // 한국어 4자리 grouping
  const s=String(n);
  let krGrouped='';
  for(let i=0;i<s.length;i++){
    const fromRight=s.length-1-i;
    krGrouped+=s[i];
    if(fromRight>0&&fromRight%4===0)krGrouped+=',';
  }
  const krRead=toKorean(n);
  const safeRead=krRead.replace(/'/g,'&#39;');

  res.innerHTML=
    '<div class="bignum-result-row"><span class="bignum-result-label">🇺🇸 영어</span><span class="bignum-result-val" style="color:#3b4cc0">'+enGrouped+'</span></div>'
   +'<div class="bignum-result-row"><span class="bignum-result-label">읽기 단위 분석</span><span class="bignum-result-val" style="color:var(--teal-dark)">'+krGrouped+'</span></div>'
   +'<div class="bignum-result-row"><span class="bignum-result-label">🔊 읽는 법</span><span class="bignum-result-kr" style="cursor:pointer" onclick="speakTTS(\''+safeRead+'\')">'+krRead+' &nbsp;<span style="font-size:16px">🔊</span></span></div>';
}

let _recog=null;
function _initRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  _recog=new SR();
  _recog.lang='ko-KR';
  _recog.continuous=false;
  _recog.interimResults=false;
  return true;
}

async function startSpeak(targetKr, targetEn, btnEl){
  if(!getApiKey()){openApiKey();return;}
  if(!_recog&&!_initRecog()){
    alert('음성 인식은 Chrome 브라우저에서만 지원돼요!');return;
  }
  // Find result panel next to this button
  const card=btnEl.closest('.speak-card');
  const result=card.querySelector('.speak-result');
  const saidEl=card.querySelector('.speak-said-text');
  const fbEl=card.querySelector('.speak-feedback');
  btnEl.textContent='🔴 듣는 중...';
  btnEl.classList.add('listening');
  btnEl.disabled=true;
  result.style.display='none';

  _recog.onresult=async(e)=>{
    const said=e.results[0][0].transcript;
    saidEl.textContent=said;
    fbEl.textContent='분석 중...';
    result.style.display='block';
    btnEl.textContent='⏳ 분석 중...';
    btnEl.classList.remove('listening');
    const fb=await _callClaude(targetKr,targetEn,said);
    fbEl.textContent=fb;
    btnEl.textContent='🎤 다시 말해보기';
    btnEl.disabled=false;
  };
  _recog.onerror=(e)=>{
    btnEl.textContent='🎤 말해보기';
    btnEl.classList.remove('listening');
    btnEl.disabled=false;
  };
  _recog.onend=()=>{
    if(btnEl.disabled&&btnEl.textContent==='🔴 듣는 중...'){
      btnEl.textContent='🎤 말해보기';
      btnEl.classList.remove('listening');
      btnEl.disabled=false;
    }
  };
  try{ _recog.start(); }catch(e){ _recog=null; _initRecog(); _recog.start(); }
}

async function _callClaude(targetKr, targetEn, said){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':getApiKey(),
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:180,
        messages:[{role:'user',content:`You are a warm Korean language tutor for English-speaking students.
Target sentence: "${targetKr}" (${targetEn})
Student said: "${said}"
Give encouraging feedback in English, 2 sentences max. If correct or close, celebrate! If different, note 1 key thing to fix and give a quick tip. Be specific and kind.`}]
      })
    });
    const d=await res.json();
    return d.content?.[0]?.text||'피드백을 가져오지 못했어요.';
  }catch(e){
    return '❌ 오류가 발생했어요. API 키를 확인해주세요 (⚙️ AI 버튼)';
  }
}
</script>
