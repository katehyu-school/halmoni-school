<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새로운 한글 학교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --mint-900:#1A4A42;--mint-700:#2D7A6E;--mint-500:#4A9E8E;--mint-300:#8ECBC2;--mint-100:#D4EDE9;--mint-50:#EDF7F5;
  --cream-900:#3A3228;--cream-700:#6B5E4E;--cream-500:#9C8C7A;--cream-200:#E8E0D0;--cream-100:#F0EAE0;--cream-50:#FAF7F2;
  --amber-lt:#FEF3E4;--coral:#D95F50;--blue:#3E7EC4;--sage:#4A8A5E;
  --shadow-sm:0 1px 4px rgba(45,122,110,0.08);--shadow-md:0 3px 12px rgba(45,122,110,0.12);
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
  --font-kr:'Noto Sans KR',sans-serif;--font-serif:'Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:var(--font-kr);background:var(--cream-100);min-height:100vh;display:flex;flex-direction:column;color:var(--cream-900);}
.top-bar{background:var(--mint-700);display:flex;align-items:center;padding:0 20px;height:52px;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.level-tabs{display:flex;gap:3px;}
.level-btn{padding:5px 16px;border:none;border-radius:var(--radius-xl);font-size:12.5px;font-weight:700;font-family:var(--font-kr);cursor:pointer;color:rgba(255,255,255,0.7);background:transparent;transition:all .2s;letter-spacing:0.03em;}
.level-btn.active{background:rgba(255,255,255,0.2);color:#fff;}
.level-btn:hover:not(.active){color:#fff;}
.level-btn-basis{background:rgba(255,220,130,0.18)!important;color:rgba(255,240,180,0.85)!important;}
.level-btn-basis.active{background:rgba(255,210,80,0.28)!important;color:#FFE066!important;}
.school-title{flex:1;text-align:center;font-family:var(--font-serif);font-size:17px;font-weight:700;color:#fff;letter-spacing:0.08em;}
.index-btn{padding:6px 18px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-xl);font-size:12px;font-family:var(--font-kr);text-decoration:none;cursor:pointer;transition:all .2s;}
.index-btn:hover{background:rgba(255,255,255,0.28);color:#fff;}
.main-layout{display:flex;flex:1;min-height:0;}
.sidebar{width:220px;flex-shrink:0;background:var(--cream-50);border-right:1px solid var(--cream-200);padding:20px 14px;display:flex;flex-direction:column;gap:4px;}
.sidebar-hdr{font-size:10px;font-weight:700;color:var(--mint-500);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--mint-100);}
.ep-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;border:1px solid transparent;}
.ep-item:hover{background:var(--mint-50);border-color:var(--mint-100);}
.ep-item.active{background:var(--mint-100);border-color:var(--mint-300);}
.ep-num{font-size:10px;font-weight:700;color:#fff;background:var(--mint-300);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ep-item.active .ep-num{background:var(--mint-700);}
.ep-name{font-size:12.5px;color:var(--cream-700);line-height:1.35;}
.ep-item.active .ep-name{color:var(--mint-900);font-weight:700;}
.content-area{flex:1;min-width:0;padding:20px 22px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.ep-header{background:linear-gradient(135deg,var(--mint-700) 0%,var(--mint-500) 100%);border-radius:var(--radius-lg);padding:18px 22px;color:#fff;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-md);}
.ep-num-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:var(--radius-xl);padding:3px 12px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:0.04em;}
.ep-title-wrap{flex:1;}
.ep-title-kr{font-family:var(--font-serif);font-size:19px;font-weight:700;letter-spacing:0.02em;line-height:1.3;}
.ep-title-en{font-size:11px;opacity:0.75;margin-top:2px;}
.ep-scene-badge{background:rgba(255,255,255,0.15);border-radius:var(--radius-xl);padding:5px 14px;font-size:12px;white-space:nowrap;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--cream-200);flex-wrap:wrap;}
.tab-btn{padding:10px 16px;border:none;background:none;font-size:12.5px;font-weight:500;color:var(--cream-500);cursor:pointer;font-family:var(--font-kr);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--mint-700);}
.tab-btn.active{color:var(--mint-700);font-weight:700;border-bottom-color:var(--mint-700);}
.tab-panels{min-height:300px;padding-top:16px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.scene-wrap{display:flex;flex-direction:column;gap:14px;max-width:640px;}
.scene-col{display:flex;flex-direction:column;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-md);}
.scene-panel{background:#B8DDD5 center/cover no-repeat;height:380px;position:relative;flex-shrink:0;}
.scene-loc{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.75);border-radius:var(--radius-xl);padding:4px 12px;font-size:11px;color:var(--mint-900);font-weight:600;backdrop-filter:blur(4px);}
.scene-caption{background:#fff;border-top:2px solid var(--mint-100);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;animation:fadeUp .2s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.caption-avatar{width:40px;height:40px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid var(--cream-200);}
.caption-name{font-size:9px;font-weight:700;color:var(--cream-500);margin-top:2px;text-align:center;line-height:1;}
.caption-body{flex:1;}
.caption-kr{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--cream-900);line-height:1.55;}
.caption-en{font-size:11px;color:var(--cream-500);margin-top:3px;}
.caption-tag{display:inline-block;margin-top:6px;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:10px;}
.tag-banmal{background:#FFDAD5;color:var(--coral);}
.tag-jondaemal{background:#D5E4F8;color:var(--blue);}
.scene-nav{background:#fff;border-top:1px solid var(--cream-200);padding:10px 14px;display:flex;align-items:center;gap:8px;}
.nav-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--mint-700);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn:not(:disabled):hover{opacity:.82;}
.nav-progress{flex:1;}
.nav-steps{display:flex;gap:3px;align-items:center;}
.nav-step{height:3px;flex:1;background:var(--mint-100);border-radius:3px;transition:background .2s;}
.nav-step.done{background:var(--mint-700);}
.nav-count{font-size:10px;color:var(--cream-500);white-space:nowrap;margin-top:3px;text-align:center;}
.nav-speak-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--cream-200);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.nav-speak-btn:hover{background:var(--mint-50);}
.script-toggle-btn{width:100%;background:var(--cream-50);border:none;border-top:1px solid var(--cream-200);padding:7px 14px;font-size:11px;font-weight:700;color:var(--cream-500);cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:var(--font-kr);}
.script-toggle-btn:hover{background:var(--mint-50);color:var(--mint-700);}
.script-strip{display:none;max-height:160px;overflow-y:auto;background:var(--cream-50);border-top:1px solid var(--cream-100);}
.script-strip.open{display:block;}
.strip-row{display:flex;gap:8px;align-items:flex-start;padding:6px 14px;border-bottom:1px solid var(--cream-100);cursor:pointer;transition:background .1s;}
.strip-row:last-child{border:none;}
.strip-row:hover{background:var(--mint-50);}
.strip-row.current{background:var(--mint-100);}
.strip-avatar{font-size:13px;flex-shrink:0;margin-top:1px;}
.strip-kr{font-family:var(--font-serif);font-size:12px;font-weight:700;color:var(--cream-900);line-height:1.45;}
.strip-en{font-size:10px;color:var(--cream-500);margin-top:1px;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;}
.vocab-card{background:#fff;border-radius:var(--radius-md);border:1.5px solid var(--cream-200);padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.vocab-card:hover{border-color:var(--mint-300);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.vc-hint{font-size:9.5px;color:var(--cream-200);margin-top:7px;}
.vocab-card.flipped .vc-front{display:none;}
.vocab-card.flipped .vc-back{display:block;}
.vc-back{display:none;}
.vc-emoji{font-size:26px;margin-bottom:6px;line-height:1;}
.vc-kr{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--cream-900);}
.vc-rom{font-size:9.5px;color:var(--cream-500);margin-top:3px;}
.vc-en{font-size:12.5px;color:var(--mint-700);font-weight:700;margin-top:5px;}
.vc-speak{background:none;border:none;font-size:15px;cursor:pointer;margin-top:6px;opacity:.5;transition:opacity .15s;}
.vc-speak:hover{opacity:1;}
.gram-card{background:#fff;border-radius:var(--radius-md);border:1px solid var(--cream-200);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow-sm);border-top:3px solid var(--mint-500);}
.gram-title{font-family:var(--font-serif);font-size:16.5px;font-weight:700;color:var(--cream-900);margin-bottom:12px;}
.gram-exp{font-size:13px;line-height:1.85;color:var(--cream-700);margin-bottom:13px;}
.gram-rule{background:var(--mint-50);border:1px solid var(--mint-100);border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;font-weight:700;color:var(--mint-700);margin-bottom:14px;}
.gram-ex-list{list-style:none;margin-bottom:12px;}
.gram-ex{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--cream-100);align-items:flex-start;}
.gram-ex:last-child{border:none;}
.gram-ko{font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--cream-900);min-width:150px;flex-shrink:0;}
.gram-en{font-size:11.5px;color:var(--cream-500);line-height:1.55;}
.gram-tip{background:#EDF7F2;border:1.5px solid #A8D8B5;border-radius:var(--radius-md);padding:10px 14px;font-size:12.5px;color:var(--sage);font-weight:600;margin-bottom:12px;}
.gram-usage{display:flex;flex-direction:column;gap:6px;}
.gram-usage-row{background:var(--cream-50);border:1px solid var(--cream-200);border-radius:var(--radius-sm);padding:9px 13px;display:flex;gap:10px;align-items:center;}
.gram-usage-ctx{font-size:10.5px;color:var(--cream-500);min-width:80px;}
.gram-usage-text{flex:1;}
.gram-usage-kr{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--cream-900);}
.gram-usage-en{font-size:11px;color:var(--cream-500);margin-top:2px;}
.quiz-wrap{max-width:580px;}
.quiz-q{background:#fff;border-radius:var(--radius-md);border:1px solid var(--cream-200);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.q-num{font-size:10.5px;font-weight:700;color:var(--mint-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.q-text{font-family:var(--font-serif);font-size:14.5px;font-weight:700;color:var(--cream-900);margin-bottom:13px;line-height:1.5;}
.q-options{list-style:none;display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:10px 15px;background:var(--cream-50);border:1.5px solid var(--cream-200);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-family:var(--font-serif);color:var(--cream-700);transition:all .15s;text-align:left;}
.q-opt:hover{border-color:var(--mint-300);background:var(--mint-50);color:var(--mint-900);}
.q-opt.correct{background:#EDF7F2;border-color:var(--sage);color:var(--sage);font-weight:700;pointer-events:none;}
.q-opt.wrong{background:#FFF3F2;border-color:var(--coral);color:var(--coral);pointer-events:none;}
.q-exp{display:none;margin-top:11px;background:var(--mint-50);border-left:3px solid var(--mint-500);padding:9px 13px;font-size:12px;color:var(--mint-900);border-radius:0 var(--radius-sm) var(--radius-sm) 0;line-height:1.65;}
.q-exp.show{display:block;}
.quiz-reset{margin-top:4px;padding:11px 32px;background:var(--mint-700);color:#fff;border:none;border-radius:var(--radius-xl);font-size:13px;font-weight:700;font-family:var(--font-kr);cursor:pointer;transition:opacity .2s;box-shadow:var(--shadow-sm);}
.quiz-reset:hover{opacity:.85;}
.rl-card{background:#fff;border-radius:var(--radius-md);border:1px solid var(--cream-200);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.rl-title{font-size:14px;font-weight:700;color:var(--cream-900);margin-bottom:4px;}
.rl-setup{font-size:11.5px;color:var(--cream-500);margin-bottom:13px;line-height:1.5;}
.rl-dialogue{display:flex;flex-direction:column;gap:8px;}
.rl-line{display:flex;gap:10px;align-items:flex-start;}
.rl-spk{font-size:11px;font-weight:700;color:var(--mint-700);min-width:58px;padding-top:4px;}
.rl-bubble{flex:1;background:var(--cream-50);border:1px solid var(--cream-200);border-radius:4px 12px 12px 12px;padding:8px 13px;}
.rl-kr{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--cream-900);}
.rl-en{font-size:10.5px;color:var(--cream-500);margin-top:2px;}
.rl-speak{background:none;border:none;font-size:14px;cursor:pointer;opacity:.5;transition:opacity .15s;flex-shrink:0;}
.rl-speak:hover{opacity:1;}
.rl-tip{background:var(--amber-lt);border:1.5px solid #F0C980;border-radius:var(--radius-md);padding:15px 18px;font-size:13px;line-height:1.8;color:var(--cream-900);margin-bottom:14px;}
.rl-tip-body{font-size:13px;color:var(--cream-900);line-height:1.8;margin-top:6px;}
.loading{padding:50px;text-align:center;color:var(--cream-500);font-size:13px;}

.clova-credit{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.9);font-size:10px;padding:4px 10px;border-radius:20px;backdrop-filter:blur(4px);transition:opacity 1s;pointer-events:none;}
.clova-credit.hidden{opacity:0;}
</style>
</head>

<div class="top-bar">
  <div class="level-tabs">

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-hdr">Episodes</div>
    <div id="ep-list"></div>
  </div>
  <div class="content-area" id="content-area">
    <div class="loading">⏳ 로딩 중…</div>

</div>

let DATA=null,curTab='script',sceneIdx=0,qAnswered={},_audio=null;
const CHAR_CFG={jeongmin:{bg:'#B8D4F0',emoji:'👦'},mirae:{bg:'#F0B8D4',emoji:'👧'},mom:{bg:'#B8D4B8',emoji:'👩'},narrator:{bg:'#E0E0E0',emoji:'📢'}};
const EPISODES=[
  {id:'ep01',label:'안녕? 만나서 반가워!'},
  {id:'ep02',label:'coming soon',disabled:true},
  {id:'ep03',label:'',disabled:true},
  {id:'ep04',label:'',disabled:true}
];

function buildSidebar(){
  document.getElementById('ep-list').innerHTML=EPISODES.map((ep,i)=>ep.disabled
    ?`<div class="ep-item" onclick="alert('준비 중이에요 😊')"><div class="ep-num" style="background:var(--cream-200);color:var(--cream-500)">${i+1}</div><div class="ep-name" style="color:var(--cream-200)">${ep.label||'…'}</div></div>`
    :`<div class="ep-item${i===0?' active':''}" id="ep-item-${ep.id}" onclick="loadEp('${ep.id}')"><div class="ep-num">${i+1}</div><div class="ep-name">${ep.label}</div></div>`
  ).join('');
}

function loadEp(epId){
  document.querySelectorAll('.ep-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('ep-item-'+epId);
  if(item)item.classList.add('active');
  DATA=EPISODE_DATA[epId]||null;
  if(!DATA){
    document.getElementById('content-area').innerHTML='<div class="loading">⚠️ 에피소드 데이터가 없어요.</div>';
    return;
  }
  qAnswered={};curTab='script';sceneIdx=0;render();
  setTimeout(()=>{const line=DATA.script[0];speak(line.text,line.audio);},400);
}

function render(){
  const tabs=['script','vocab','grammar','banmal','usage','quiz','reallife'];
  const labels=['📽 영상·Script','새어휘 Vocab','문법 Grammar','반말/존댓말','Usage','Quiz','Real Life'];
  document.getElementById('content-area').innerHTML=`
    <div class="ep-header">
      <div class="ep-num-badge">EP.${DATA.episode} · ${esc(DATA.level)}</div>
      <div class="ep-title-wrap"><div class="ep-title-kr">${esc(DATA.title)}</div><div class="ep-title-en">${esc(DATA.title_en)}</div></div>
      <div class="ep-scene-badge">${esc(DATA.scene)}</div>
    </div>
    <div class="tab-bar">${tabs.map((t,i)=>`<button class="tab-btn${curTab===t?' active':''}" onclick="showTab('${t}')">${labels[i]}</button>`).join('')}</div>
    <div class="tab-panels">${tabs.map(t=>`<div id="panel-${t}" class="tab-panel${curTab===t?' active':''}"></div>`).join('')}</div>`;
  fillAllPanels();
}

function fillAllPanels(){
  document.getElementById('panel-script').innerHTML=buildScript();
  document.getElementById('panel-vocab').innerHTML=buildVocab();
  document.getElementById('panel-grammar').innerHTML=buildGrammar();
  document.getElementById('panel-banmal').innerHTML=buildBanmal();
  document.getElementById('panel-usage').innerHTML=buildUsage();
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  document.getElementById('panel-reallife').innerHTML=buildRealLife();
  requestAnimationFrame(initSceneViewer);
}

function showTab(name){
  curTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const tabs=['script','vocab','grammar','banmal','usage','quiz','reallife'];
  const idx=tabs.indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('panel-'+name);
  if(p)p.classList.add('active');
  if(name==='script')requestAnimationFrame(initSceneViewer);
}

// ── SCRIPT / SCENE VIEWER ──────────────────────────────
function buildScript(){
  return `<div class="scene-wrap"><div class="scene-col">
    <div class="scene-panel" id="scene-panel"><div class="scene-loc">${esc(DATA.scene)}</div><div class="clova-credit" id="clova-credit">클로바더빙의 AI 보이스가 사용되었습니다.</div></div>
    <div class="scene-caption" id="scene-caption"></div>
    <div class="scene-nav">
      <button class="nav-btn" id="nav-prev" onclick="moveScene(-1)">&#8249;</button>
      <div class="nav-progress"><div class="nav-steps" id="nav-steps"></div><div class="nav-count" id="nav-count"></div></div>
      <button class="nav-speak-btn" title="랜덤" onclick="randomScene()">🎲</button>
      <button class="nav-speak-btn" onclick="speakCurrent()">🔊</button>
      <button class="nav-btn" id="nav-next" onclick="moveScene(1)">&#8250;</button>
    </div>
    <button class="script-toggle-btn" onclick="toggleStrip()"><span id="strip-arrow">▶</span> 전체 스크립트 보기</button>
    <div class="script-strip" id="script-strip"></div>
  </div></div>`;
}

function initSceneViewer(){
  renderScene();
  const credit=document.getElementById('clova-credit');
  if(credit){credit.classList.remove('hidden');setTimeout(()=>credit.classList.add('hidden'),5000);}
}

function renderScene(){
  const panel=document.getElementById('scene-panel');
  if(!panel)return;
  const src=DATA.slides&&DATA.slides[sceneIdx]?DATA.slides[sceneIdx]:(DATA.slides&&DATA.slides[0])||'';
  if(src)panel.style.backgroundImage=`url('${src}')`;
  const line=DATA.script[sceneIdx];
  const cfg=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
  const charMap={};DATA.characters.forEach(c=>{charMap[c.id]=c;});
  const ch=charMap[line.speaker]||{name:line.speaker};
  const tagHtml=line.speech_type&&line.speech_type!=='narrator'?`<span class="caption-tag ${line.speech_type==='반말'?'tag-banmal':'tag-jondaemal'}">${line.speech_type}</span>`:'';
  document.getElementById('scene-caption').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="caption-avatar" style="background:${cfg.bg}">${cfg.emoji}</div>
      <div class="caption-name">${esc(ch.name)}</div>
    </div>
    <div class="caption-body">
      <div class="caption-kr">${esc(line.text)}</div>
      <div class="caption-en">${esc(line.en)}</div>
      ${tagHtml}
    </div>
    <button onclick="speakCurrent()" style="background:none;border:none;font-size:18px;cursor:pointer;opacity:.55;align-self:center;flex-shrink:0;">🔊</button>`;
  const total=DATA.script.length;
  document.getElementById('nav-steps').innerHTML=DATA.script.map((_,i)=>`<div class="nav-step${i<=sceneIdx?' done':''}"></div>`).join('');
  document.getElementById('nav-count').textContent=`${sceneIdx+1} / ${total}`;
  document.getElementById('nav-prev').disabled=sceneIdx===0;
  document.getElementById('nav-next').disabled=sceneIdx===total-1;
  updateStripHighlight();
}

function moveScene(dir){
  const next=sceneIdx+dir;
  if(next<0||next>=DATA.script.length)return;
  sceneIdx=next;renderScene();
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function jumpScene(i){
  sceneIdx=i;renderScene();
  const line=DATA.script[i];speak(line.text,line.audio);
}

function speakCurrent(){
  if(!DATA)return;
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function randomScene(){
  const total=DATA.script.length;
  let next;
  do{next=Math.floor(Math.random()*total);}while(next===sceneIdx&&total>1);
  sceneIdx=next;renderScene();
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function toggleStrip(){
  const strip=document.getElementById('script-strip');
  const arrow=document.getElementById('strip-arrow');
  const isOpen=strip.classList.toggle('open');
  arrow.textContent=isOpen?'▼':'▶';
  if(isOpen&&!strip.innerHTML)buildStrip();
}

function buildStrip(){
  const strip=document.getElementById('script-strip');
  if(!strip)return;
  strip.innerHTML=DATA.script.map((line,i)=>{
    const cfg=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
    return `<div class="strip-row${i===sceneIdx?' current':''}" onclick="jumpScene(${i});updateStripHighlight()">
      <div class="strip-avatar">${cfg.emoji}</div>
      <div><div class="strip-kr">${esc(line.text)}</div><div class="strip-en">${esc(line.en)}</div></div>
    </div>`;
  }).join('');
}

function updateStripHighlight(){
  document.querySelectorAll('.strip-row').forEach((el,i)=>el.classList.toggle('current',i===sceneIdx));
}

// ── AUDIO ──────────────────────────────────────────────
function speak(text,audioSrc){
  if(audioSrc){
    if(_audio){_audio.pause();_audio=null;}
    _audio=new Audio(audioSrc);
    _audio.play().catch(()=>speakTTS(text));
  }else{
    speakTTS(text);
  }
}
function speakTTS(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.88;
  const go=()=>{const v=speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;});
}

// ── VOCAB ──────────────────────────────────────────────
function buildVocab(){
  return `<div class="vocab-grid">${DATA.vocab.map(v=>`
    <div class="vocab-card" onclick="this.classList.toggle('flipped')">
      <div class="vc-front">
        <div class="vc-emoji">${v.emoji||'📝'}</div>
        <div class="vc-kr">${esc(v.korean)}</div>
        <div class="vc-rom">[${esc(v.romanization)}]</div>
        <button class="vc-speak" onclick="event.stopPropagation();speakTTS('${escA(v.korean)}')">🔊</button>
        <div class="vc-hint">탭하면 뜻 보기</div>
      </div>
      <div class="vc-back">
        <div class="vc-emoji">${v.emoji||'📝'}</div>
        <div class="vc-en">${esc(v.english)}</div>
        <div class="vc-kr" style="font-size:13px;margin-top:6px">${esc(v.korean)}</div>
        <div class="vc-rom">[${esc(v.romanization)}]</div>
      </div>
    </div>`).join('')}</div>`;
}

// ── GRAMMAR ────────────────────────────────────────────
function buildGrammar(){
  return DATA.grammar.map(g=>`
    <div class="gram-card">
      <div class="gram-title">${esc(g.title)}</div>
      <div class="gram-exp">${esc(g.explanation_en)}</div>
      <div class="gram-rule">📐 ${esc(g.rule)}</div>
      <ul class="gram-ex-list">${(g.examples||[]).map(ex=>`
        <li class="gram-ex">
          <div class="gram-ko">${esc(ex.ko)} <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></div>
          <div class="gram-en">${esc(ex.en)}</div>
        </li>`).join('')}
      </ul>
      ${g.tip?`<div class="gram-tip">💡 ${esc(g.tip)}</div>`:''}
      ${g.usage&&g.usage.length?`<div class="gram-usage">${g.usage.map(u=>`
        <div class="gram-usage-row">
          <div class="gram-usage-ctx">${esc(u.situation)}</div>
          <div class="gram-usage-text">
            <div class="gram-usage-kr">${esc(u.example)} <button onclick="speakTTS('${escA(u.example)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></div>
            <div class="gram-usage-en">${esc(u.en)}</div>
          </div>
        </div>`).join('')}</div>`:''}
    </div>`).join('');
}

// ── QUIZ ───────────────────────────────────────────────
function buildQuiz(){
  return`<div class="quiz-wrap">${DATA.quiz.map((q,qi)=>`
    <div class="quiz-q">
      <div class="q-num">문제 ${qi+1}</div>
      <div class="q-text">${esc(q.question_ko)}</div><div class="q-text-en">${esc(q.question_en)}</div>
      <ul class="q-options">${(q.options||[]).map((opt,oi)=>`
        <li class="q-opt" id="opt-${qi}-${oi}" onclick="answerQ(${qi},${oi},${q.answer},'${escA(q.explanation||'')}')">
          <span style="font-weight:700;color:var(--mint-500);margin-right:6px">${oi+1}.</span>${esc(opt)}
        </li>`).join('')}
      </ul>
      <div class="q-exp" id="exp-${qi}"></div>
    </div>`).join('')}
    <button class="quiz-reset" onclick="resetQuiz()">↺ 다시 풀기</button>
  </div>`;
}

function answerQ(qi,chosen,correct,hint){
  if(qAnswered[qi])return;
  qAnswered[qi]=true;
  DATA.quiz[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`opt-${qi}-${i}`);
    if(!el)return;
    if(i===correct)el.classList.add('correct');
    else if(i===chosen)el.classList.add('wrong');
  });
  const exp=document.getElementById(`exp-${qi}`);
  if(exp&&hint){exp.textContent='💡 '+hint;exp.classList.add('show');}
}
function resetQuiz(){qAnswered={};document.getElementById('panel-quiz').innerHTML=buildQuiz();}

// ── BANMAL / JONDAEMAL ─────────────────────────────────
function buildBanmal(){
  const bj=DATA.banmal_jondaemal;
  if(!bj)return'<div class="loading">데이터 준비 중이에요.</div>';
  const rows=bj.rows.map(r=>`<tr>
    <td style="padding:11px 20px">${esc(r.situation_ko)}<br><span style="font-size:10px;color:var(--cream-500)">${esc(r.situation_en)}</span></td>
    <td><span style="font-family:var(--font-serif);font-weight:700;color:var(--coral)">${esc(r.banmal)}</span> <button onclick="speakTTS('${escA(r.banmal)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></td>
    <td><span style="font-family:var(--font-serif);font-weight:700;color:var(--blue)">${esc(r.jondaemal)}</span> <button onclick="speakTTS('${escA(r.jondaemal)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></td>
  </tr>`).join('');
  return`<div style="background:var(--amber-lt);border:1.5px solid #F0C980;border-radius:var(--radius-md);padding:14px 18px;margin-bottom:16px;">
    <p style="font-size:13px;color:var(--cream-900);line-height:1.75">${esc(bj.intro_ko)}</p>
    <div style="font-size:11px;color:var(--cream-500);margin-top:4px">${esc(bj.intro_en)}</div>
  </div>
  <table style="width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);font-size:13px;margin-bottom:14px;">
    <thead><tr>
      <th style="padding:11px 20px;font-size:11.5px;font-weight:700;text-align:left;border-bottom:2px solid var(--cream-200);background:var(--cream-50);color:var(--cream-500)">상황</th>
      <th style="padding:11px 16px;font-size:11.5px;font-weight:700;text-align:center;border-bottom:2px solid var(--cream-200);background:#FFF4F3;color:var(--coral)">반말 👧👦</th>
      <th style="padding:11px 16px;font-size:11.5px;font-weight:700;text-align:center;border-bottom:2px solid var(--cream-200);background:#F0F6FF;color:var(--blue)">존댓말 🙇</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="background:#EDF7F2;border:1.5px solid #A8D8B5;border-radius:var(--radius-md);padding:12px 16px;font-size:13px;color:var(--sage);font-weight:600">${esc(bj.tip)}</div>`;
}

// ── USAGE ──────────────────────────────────────────────
function buildUsage(){
  const usage=DATA.usage;
  if(!usage)return'<div class="loading">데이터 준비 중이에요.</div>';
  return usage.map(sec=>{
    if(sec.type==='tip')return`<div style="background:var(--amber-lt);border:1.5px solid #F0C980;border-radius:var(--radius-md);padding:13px 17px;font-size:13px;color:var(--cream-900);line-height:1.75;margin-bottom:14px"><strong>${esc(sec.section)}</strong><br>${esc(sec.content_ko)}<div style="font-size:11px;color:var(--cream-500);margin-top:6px">${esc(sec.content_en)}</div></div>`;
    return`<div style="margin-bottom:20px">
      <div style="font-size:12.5px;font-weight:700;color:var(--mint-700);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--mint-100)">${esc(sec.section)}</div>
      ${sec.items.map(it=>`<div style="background:#fff;border-radius:var(--radius-sm);border:1px solid var(--cream-200);padding:11px 15px;margin-bottom:6px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow-sm)">
        <div style="font-size:10.5px;color:var(--cream-500);min-width:64px;line-height:1.4">${esc(it.context_ko)}</div>
        <div style="flex:1"><div style="font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--cream-900)">${esc(it.korean)}</div><div style="font-size:11px;color:var(--cream-500);margin-top:2px">${esc(it.english)}</div></div>
        <button onclick="speakTTS('${escA(it.korean)}')" style="background:none;border:none;font-size:15px;cursor:pointer;opacity:.5;transition:opacity .15s">🔊</button>
      </div>`).join('')}
    </div>`;
  }).join('');
}


// ── REAL LIFE ──────────────────────────────────────────
function buildRealLife(){
  return DATA.real_life.map(item=>{
    if(item.type==='tip')return`<div class="rl-tip"><strong>${esc(item.title)}</strong><div class="rl-tip-body">${esc(item.content)}</div></div>`;
    const lines=item.lines||[];
    return`<div class="rl-card">
      <div class="rl-title">${esc(item.title)}</div>
      ${item.setup_ko?`<div class="rl-setup">${esc(item.setup_ko)}<span style='color:var(--cream-500);font-size:10.5px;margin-left:6px'>${esc(item.setup_en||'')}</span></div>`:''}
      <div class="rl-dialogue">${lines.map(l=>`
        <div class="rl-line">
          <div class="rl-spk">${esc(l.speaker)}</div>
          <div class="rl-bubble"><div class="rl-kr">${esc(l.text)}</div><div class="rl-en">${esc(l.en)}</div></div>
          <button class="rl-speak" onclick="speakTTS('${escA(l.text)}')">🔊</button>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function setLevel(btn){document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

window.addEventListener('DOMContentLoaded',()=>{buildSidebar();loadEp('ep01');});
