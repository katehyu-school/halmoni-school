<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Quest · 한국어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0f7c6e;--teal-lt:#e0f5f2;--teal-md:#5bbfb0;
  --teal-dark:#0b5c52;--teal-600:#1a9485;--teal-300:#9fd4ce;--teal-50:#f2faf9;--teal-900:#0b5c52;
  --blue:#1a5fa8;--blue-lt:#e6f0fb;
  --amber:#c47a1a;--amber-lt:#fdf3e0;--amber-50:#fffbf0;--amber-600:#a85f10;
  --coral:#c74d36;--coral-lt:#fdeae6;
  --purple:#5a3fa0;--purple-lt:#eeebfb;
  --gray-900:#1a1a1a;--gray-700:#444;--gray-500:#888;--gray-200:#e8e8e8;--gray-100:#f5f5f3;
  --green-600:#16A34A;--green-100:#DCFCE7;
  --rose-500:#F43F5E;--rose-100:#FFE4E6;
  --warm-900:#1C1917;--warm-700:#44403C;--warm-500:#78716C;--warm-300:#D6D3D1;--warm-100:#F5F5F4;--warm-50:#FAFAF9;
  --white:#FFFFFF;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 8px 28px rgba(0,0,0,.13);
  --radius-sm:10px;--radius-md:14px;--radius-lg:18px;--radius-xl:28px;
  --font-kr:'Noto Sans KR',sans-serif;--font-serif:'Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:var(--font-kr);background:#f4f3ef;min-height:100vh;display:flex;flex-direction:column;color:var(--warm-900);}
.top-bar{background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 24px;height:56px;gap:12px;flex-shrink:0;box-shadow:var(--shadow-sm);}
.level-tabs{display:flex;gap:3px;}
.level-btn{padding:5px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xl);font-size:12px;font-weight:700;font-family:var(--font-kr);cursor:pointer;color:var(--gray-500);background:transparent;transition:all .2s;}
.level-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;}
.level-btn:hover:not(.active){border-color:var(--teal);color:var(--teal);}
.level-btn-basis{color:var(--amber)!important;border-color:var(--amber-lt)!important;}
.level-btn-basis.active{background:var(--amber)!important;border-color:var(--amber)!important;color:#fff!important;}
.school-title{flex:1;text-align:center;line-height:1;}
.kq-logo{font-family:Impact,'Arial Black',sans-serif;font-size:22px;font-weight:normal;letter-spacing:0.03em;}
.kq-logo .kq-k{color:var(--teal-dark);}
.kq-logo .kq-q{color:#5a8c3c;}
.index-btn{padding:6px 16px;background:var(--teal-lt);color:var(--teal);border:1px solid var(--teal-300);border-radius:var(--radius-xl);font-size:11.5px;font-family:var(--font-kr);text-decoration:none;cursor:pointer;transition:all .2s;}
.index-btn:hover{background:rgba(255,255,255,0.32);}
.main-layout{display:flex;flex:1;min-height:0;}
.sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--warm-300);padding:20px 12px;display:flex;flex-direction:column;gap:3px;box-shadow:2px 0 8px rgba(0,0,0,0.04);}
.sidebar-hdr{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--teal-lt);}
.ep-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;border:1.5px solid transparent;}
.ep-item:hover{background:var(--teal-50);border-color:var(--teal-lt);}
.ep-item.active{background:var(--teal-lt);border-color:var(--teal-300);}
.ep-num{font-size:10px;font-weight:800;color:#fff;background:var(--teal-md);width:22px;height:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ep-item.active .ep-num{background:var(--teal);}
.ep-name{font-size:12.5px;color:var(--warm-500);line-height:1.35;}
.ep-item.active .ep-name{color:var(--teal-900);font-weight:700;}
.content-area{flex:1;min-width:0;padding:22px 26px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.ep-header{background:var(--teal);border-radius:var(--radius-lg);padding:20px 24px;color:#fff;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-md);}
.ep-num-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);border-radius:var(--radius-xl);padding:4px 13px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:0.06em;}
.ep-title-wrap{flex:1;}
.ep-title-kr{font-family:var(--font-serif);font-size:20px;font-weight:700;letter-spacing:0.02em;line-height:1.3;}
.ep-title-en{font-size:11.5px;opacity:0.7;margin-top:3px;}
.ep-scene-badge{background:rgba(251,191,36,0.25);border:1px solid rgba(251,191,36,0.4);border-radius:var(--radius-xl);padding:6px 15px;font-size:12px;white-space:nowrap;color:#FDE68A;}
.tab-bar{display:flex;border-bottom:2px solid var(--warm-300);flex-wrap:wrap;background:#fff;border-radius:var(--radius-md) var(--radius-md) 0 0;padding:0 6px;}
.tab-btn{padding:11px 15px;border:none;background:none;font-size:12.5px;font-weight:500;color:var(--warm-500);cursor:pointer;font-family:var(--font-kr);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--teal-600);}
.tab-btn.active{color:var(--teal);font-weight:700;border-bottom-color:var(--amber);border-bottom-width:3px;}
.tab-panels{min-height:300px;background:#fff;border-radius:0 0 var(--radius-md) var(--radius-md);padding:18px 20px 22px;box-shadow:var(--shadow-sm);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.scene-wrap{display:flex;flex-direction:column;gap:14px;max-width:640px;}
.scene-col{display:flex;flex-direction:column;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-md);}
.scene-panel{background:#B8DDD5 center/cover no-repeat;height:380px;position:relative;flex-shrink:0;}
.scene-loc{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.8);border-radius:var(--radius-xl);padding:4px 12px;font-size:11px;color:var(--teal-900);font-weight:600;backdrop-filter:blur(6px);}
.scene-caption{background:#fff;border-top:2px solid var(--teal-lt);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;animation:fadeUp .2s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.caption-avatar{width:42px;height:42px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;border:2px solid var(--warm-300);}
.caption-name{font-size:9px;font-weight:700;color:var(--warm-500);margin-top:2px;text-align:center;line-height:1;}
.caption-body{flex:1;}
.caption-kr{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--warm-900);line-height:1.55;}
.caption-en{font-size:11px;color:var(--warm-500);margin-top:3px;}
.caption-tag{display:inline-block;margin-top:6px;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:10px;}
.tag-banmal{background:#FFE4E6;color:var(--rose-500);}
.tag-jondaemal{background:var(--teal-lt);color:var(--teal);}
.scene-nav{background:#fff;border-top:1px solid var(--warm-300);padding:10px 14px;display:flex;align-items:center;gap:8px;}
.nav-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--teal-md);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn:not(:disabled):hover{background:var(--teal);}
.nav-progress{flex:1;}
.nav-steps{display:flex;gap:3px;}
.nav-step{height:4px;flex:1;background:var(--warm-300);border-radius:4px;transition:background .2s;}
.nav-step.done{background:var(--amber);}
.nav-count{font-size:10px;color:var(--warm-500);white-space:nowrap;margin-top:3px;text-align:center;}
.nav-speak-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--warm-300);background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.nav-speak-btn:hover{background:var(--teal-50);border-color:var(--teal-300);}
.script-toggle-btn{width:100%;background:var(--warm-100);border:none;border-top:1px solid var(--warm-300);padding:7px 14px;font-size:11px;font-weight:700;color:var(--warm-500);cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:var(--font-kr);}
.script-toggle-btn:hover{background:var(--teal-50);color:var(--teal-600);}
.script-strip{display:none;max-height:160px;overflow-y:auto;background:var(--warm-50);border-top:1px solid var(--warm-300);}
.script-strip.open{display:block;}
.strip-row{display:flex;gap:8px;align-items:flex-start;padding:6px 14px;border-bottom:1px solid var(--warm-100);cursor:pointer;transition:background .1s;}
.strip-row:last-child{border:none;}
.strip-row:hover{background:var(--teal-50);}
.strip-row.current{background:var(--teal-lt);}
.strip-avatar{font-size:13px;flex-shrink:0;margin-top:1px;}
.strip-kr{font-family:var(--font-serif);font-size:12px;font-weight:700;color:var(--warm-900);line-height:1.45;}
.strip-en{font-size:10px;color:var(--warm-500);margin-top:1px;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.vocab-card{background:#fff;border-radius:var(--radius-md);border:2px solid var(--warm-300);padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);}
.vocab-card:hover{border-color:var(--teal-300);box-shadow:var(--shadow-md);transform:translateY(-3px);}
.vocab-group{margin-bottom:20px;}
.vocab-group-title{font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px 8px;border-bottom:2px solid var(--teal-lt);margin-bottom:10px;}
.vc-hint{font-size:9.5px;color:var(--warm-300);margin-top:7px;}
.vocab-card.flipped .vc-front{display:none;}
.vocab-card.flipped .vc-back{display:block;}
.vc-back{display:none;}
.vc-emoji{font-size:30px;margin-bottom:7px;line-height:1;}
.vc-kr{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--warm-900);}
.vc-rom{font-size:9.5px;color:var(--warm-500);margin-top:3px;}
.vc-en{font-size:12.5px;color:var(--teal-600);font-weight:700;margin-top:5px;}
.vc-speak{background:none;border:none;font-size:15px;cursor:pointer;margin-top:6px;opacity:.4;transition:opacity .15s;}
.vc-speak:hover{opacity:1;}
.gram-card{background:#fff;border-radius:var(--radius-md);border:1.5px solid var(--warm-300);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow-sm);border-top:4px solid var(--amber);}
.gram-title{font-family:var(--font-serif);font-size:16.5px;font-weight:700;color:var(--warm-900);margin-bottom:12px;}
.gram-exp{font-size:13px;line-height:1.85;color:var(--warm-700);margin-bottom:13px;}
.gram-rule{background:var(--amber-50);border:1.5px solid var(--amber-lt);border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;font-weight:700;color:var(--amber-600);margin-bottom:14px;}
.gram-ex-list{list-style:none;margin-bottom:12px;}
.gram-ex{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--warm-100);align-items:flex-start;}
.gram-ex:last-child{border:none;}
.gram-ko{font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--warm-900);min-width:150px;flex-shrink:0;}
.gram-en{font-size:11.5px;color:var(--warm-500);line-height:1.55;}
.gram-tip{background:var(--teal-50);border:1.5px solid var(--teal-lt);border-radius:var(--radius-md);padding:10px 14px;font-size:12.5px;color:var(--teal);font-weight:600;margin-bottom:12px;}
.gram-usage{display:flex;flex-direction:column;gap:6px;}
.gram-usage-row{background:var(--warm-50);border:1px solid var(--warm-300);border-radius:var(--radius-sm);padding:9px 13px;display:flex;gap:10px;align-items:center;}
.gram-usage-ctx{font-size:10.5px;color:var(--warm-500);min-width:80px;}
.gram-usage-text{flex:1;}
.gram-usage-kr{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--warm-900);}
.gram-usage-en{font-size:11px;color:var(--warm-500);margin-top:2px;}
.quiz-wrap{max-width:580px;}
.quiz-q{background:#fff;border-radius:var(--radius-md);border:1.5px solid var(--warm-300);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.q-num{font-size:10.5px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.q-text{font-family:var(--font-serif);font-size:14.5px;font-weight:700;color:var(--warm-900);margin-bottom:13px;line-height:1.5;}
.q-options{list-style:none;display:flex;flex-direction:column;gap:7px;}
.q-opt{padding:10px 15px;background:var(--warm-50);border:2px solid var(--warm-300);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-family:var(--font-serif);color:var(--warm-700);transition:all .15s;text-align:left;}
.q-opt:hover{border-color:var(--teal-300);background:var(--teal-50);color:var(--teal-900);}
.q-opt.correct{background:var(--green-100);border-color:var(--green-600);color:var(--green-600);font-weight:700;pointer-events:none;}
.q-opt.wrong{background:#FFE4E6;border-color:var(--rose-500);color:var(--rose-500);pointer-events:none;}
.q-exp{display:none;margin-top:11px;background:var(--teal-50);border-left:3px solid var(--teal-md);padding:9px 13px;font-size:12px;color:var(--teal-900);border-radius:0 var(--radius-sm) var(--radius-sm) 0;line-height:1.65;}
.q-exp.show{display:block;}
.quiz-reset{margin-top:4px;padding:11px 32px;background:var(--teal-md);color:#fff;border:none;border-radius:var(--radius-xl);font-size:13px;font-weight:700;font-family:var(--font-kr);cursor:pointer;transition:all .2s;box-shadow:var(--shadow-md);}
.quiz-reset:hover{background:var(--teal);}
.rl-card{background:#fff;border-radius:var(--radius-md);border:1.5px solid var(--warm-300);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.rl-title{font-size:14px;font-weight:700;color:var(--warm-900);margin-bottom:4px;}
.rl-setup{font-size:11.5px;color:var(--warm-500);margin-bottom:13px;line-height:1.5;}
.rl-dialogue{display:flex;flex-direction:column;gap:8px;}
.rl-line{display:flex;gap:10px;align-items:flex-start;}
.rl-spk{font-size:11px;font-weight:700;color:var(--teal-600);min-width:58px;padding-top:4px;}
.rl-bubble{flex:1;background:var(--warm-50);border:1px solid var(--warm-300);border-radius:4px 14px 14px 14px;padding:8px 13px;}
.rl-kr{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--warm-900);}
.rl-en{font-size:10.5px;color:var(--warm-500);margin-top:2px;}
.rl-speak{background:none;border:none;font-size:14px;cursor:pointer;opacity:.45;transition:opacity .15s;flex-shrink:0;}
.rl-speak:hover{opacity:1;}
.rl-tip{background:var(--amber-50);border:1.5px solid var(--amber-lt);border-radius:var(--radius-md);padding:15px 18px;font-size:13px;line-height:1.8;color:var(--amber-600);margin-bottom:14px;}
.rl-tip-body{font-size:13px;color:var(--amber-600);line-height:1.8;margin-top:6px;}
.loading{padding:50px;text-align:center;color:var(--warm-500);font-size:13px;}
.clova-credit{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.85);font-size:10px;padding:4px 10px;border-radius:20px;backdrop-filter:blur(4px);transition:opacity 1s;pointer-events:none;}
.clova-credit.hidden{opacity:0;}

/* ── 색인 모달 ─────────────────────────────────────────── */
.idx-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;}
.idx-overlay.open{display:flex;}
.idx-modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:760px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;}
.idx-header{background:var(--teal-md);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.idx-header h2{font-size:15px;font-weight:700;margin:0;}
.idx-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.idx-tabs{display:flex;border-bottom:2px solid var(--warm-300);flex-shrink:0;background:#fafafa;}
.idx-tab{padding:10px 20px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--warm-500);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.idx-tab.active{color:var(--teal-600);border-bottom-color:var(--teal-md);}
.idx-search{padding:10px 16px;border-bottom:1px solid var(--warm-300);flex-shrink:0;}
.idx-search input{width:100%;padding:8px 12px;border:1.5px solid var(--warm-300);border-radius:var(--radius-md);font-size:13px;font-family:var(--font-kr);outline:none;box-sizing:border-box;}
.idx-search input:focus{border-color:var(--teal-300);}
.idx-body{overflow-y:auto;padding:16px 20px;flex:1;}
.idx-section-hdr{font-size:10.5px;font-weight:700;color:var(--warm-500);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--warm-300);}
.idx-section-hdr:first-child{margin-top:0;}
.idx-vocab-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--warm-100);}
.idx-vocab-kr{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--warm-900);min-width:90px;}
.idx-vocab-en{font-size:12px;color:var(--warm-500);flex:1;}
.idx-ep-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--teal-lt);color:var(--teal-600);flex-shrink:0;}
.idx-gram-row{padding:9px 0;border-bottom:1px solid var(--warm-100);}
.idx-gram-title{font-size:13px;font-weight:700;color:var(--warm-900);}
.idx-gram-rule{font-size:11.5px;color:var(--teal);margin-top:2px;}
.idx-pron-row{padding:9px 0;border-bottom:1px solid var(--warm-100);}
.idx-pron-word{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--warm-900);}
.idx-pron-note{font-size:12px;color:var(--coral);margin-top:2px;}

/* ── 퀴즈 재설계 ───────────────────────────────────── */
.quiz-mode-bar{display:flex;gap:8px;margin-bottom:18px;}
.quiz-mode-btn{flex:1;padding:9px 0;border:2px solid var(--warm-300);border-radius:var(--radius-md);background:#fff;font-size:12.5px;font-weight:700;font-family:var(--font-kr);cursor:pointer;color:var(--warm-500);transition:all .2s;}
.quiz-mode-btn.active{border-color:var(--teal-md);background:var(--teal-md);color:#fff;}
.quiz-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.quiz-prog-dots{display:flex;gap:5px;}
.quiz-prog-dot{width:9px;height:9px;border-radius:50%;background:var(--warm-300);transition:all .3s;}
.quiz-prog-dot.done{background:var(--teal-md);}
.quiz-prog-dot.current{background:var(--teal-md);transform:scale(1.2);}
.quiz-card{background:#fff;border:2px solid var(--warm-300);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);}
.quiz-q-num{font-size:11px;font-weight:700;color:var(--teal-md);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.quiz-q-text{font-size:15px;font-weight:700;color:var(--warm-900);line-height:1.6;margin-bottom:4px;font-family:var(--font-serif);}
.quiz-q-en{font-size:11.5px;color:var(--warm-500);margin-bottom:14px;}
.quiz-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.quiz-opt{padding:11px 15px;background:var(--warm-50);border:2px solid var(--warm-300);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-family:var(--font-serif);color:var(--warm-700);transition:all .15s;text-align:left;}

let DATA=null,curTab='script',sceneIdx=0,qAnswered={},_audio=null;
let quizMode='mc',quizIdx=0,quizScore=0;
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return s==null?'':String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
const CHAR_CFG={jeongmin:{bg:'#B8D4F0',emoji:'👦'},mirae:{bg:'#F0B8D4',emoji:'👧'},mom:{bg:'#B8D4B8',emoji:'👩'},narrator:{bg:'#E0E0E0',emoji:'📢'}};
const EPISODES=[
  {id:'ep01',label:'안녕? 만나서 반가워!'},
  {id:'ep02',label:'저녁 식사'},
  {id:'ep03',label:'',disabled:true},
  {id:'ep04',label:'',disabled:true}
];

function buildSidebar(){
  document.getElementById('ep-list').innerHTML=EPISODES.map((ep,i)=>ep.disabled
    ?`<div class="ep-item" onclick="alert('준비 중이에요 😊')"><div class="ep-num" style="background:var(--warm-300);color:var(--warm-500)">${i+1}</div><div class="ep-name" style="color:var(--warm-300)">${ep.label||'…'}</div></div>`
    :`<div class="ep-item${i===0?' active':''}" id="ep-item-${ep.id}" onclick="loadEp('${ep.id}')"><div class="ep-num">${i+1}</div><div class="ep-name">${ep.label}</div></div>`
  ).join('');
}

async function loadEp(epId){
  document.querySelectorAll('.ep-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('ep-item-'+epId);
  if(item)item.classList.add('active');
  document.getElementById('content-area').innerHTML='<div class="loading">로딩 중…</div>';
  // Try fetching JSON file first (works on GitHub Pages); fall back to inline EPISODE_DATA (works locally)
  try{
    const res=await fetch(`data/nhs/${epId}.json`);
    if(res.ok) DATA=await res.json();
    else DATA=EPISODE_DATA[epId]||null;
  }catch(e){
    DATA=EPISODE_DATA[epId]||null;
  }
  if(!DATA){
    document.getElementById('content-area').innerHTML='<div class="loading">⚠️ 에피소드 데이터가 없어요.</div>';
    return;
  }
  qAnswered={};curTab='script';sceneIdx=0;render();
}

function render(){
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const baseLabels=['📽 영상·Script','새어휘 Vocab','문법 Grammar','발음 Pron','반말/존댓말','Usage','Quiz','Real Life'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const labels=DATA.self_check&&DATA.self_check.length?[...baseLabels,'✅ 자기점검']:[...baseLabels];
  document.getElementById('content-area').innerHTML=`
    <div class="ep-header">
      <div class="ep-num-badge">EP.${(DATA.id||'ep01').replace('ep','')} · ${esc(DATA.level)}</div>
      <div class="ep-title-wrap"><div class="ep-title-kr">${esc(DATA.title)}</div><div class="ep-title-en">${esc(DATA.title_en)}</div></div>
      <div class="ep-scene-badge">${esc(DATA.scene)}</div>
    </div>
    <div class="tab-bar">${tabs.map((t,i)=>`<button class="tab-btn${curTab===t?' active':''}" onclick="showTab('${t}')">${labels[i]}</button>`).join('')}</div>
    <div class="tab-panels">${tabs.map(t=>`<div id="panel-${t}" class="tab-panel${curTab===t?' active':''}"></div>`).join('')}</div>`;
  fillAllPanels();
}

function fillAllPanels(){
  document.getElementById('panel-script').innerHTML=buildScript();
  document.getElementById('panel-vocab').innerHTML=buildVocab();
  document.getElementById('panel-grammar').innerHTML=buildGrammar();
  document.getElementById('panel-banmal').innerHTML=buildBanmal();
  document.getElementById('panel-usage').innerHTML=buildUsage();
  document.getElementById('panel-pron').innerHTML=buildPron();
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  document.getElementById('panel-reallife').innerHTML=buildRealLife();
  if(DATA.self_check&&DATA.self_check.length){
    const sc=document.getElementById('panel-selfcheck');
    if(sc)sc.innerHTML=buildSelfCheck();
  }
  requestAnimationFrame(initSceneViewer);
}

function showTab(name){
  curTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const idx=tabs.indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('panel-'+name);
  if(p)p.classList.add('active');
  if(name==='script')requestAnimationFrame(initSceneViewer);
  if(name==='quiz'){quizIdx=0;quizScore=0;const qp=document.getElementById('panel-quiz');if(qp)qp.innerHTML=buildQuiz();renderQuizQ();}
}

function initSceneViewer(){
  renderScene();

}

function renderScene(){
  const panel=document.getElementById('scene-panel');
  if(!panel)return;
  const line=DATA.script[sceneIdx];
  const slideIdx=(line.slide!==undefined)?line.slide:sceneIdx;
  const src=DATA.slides&&DATA.slides[slideIdx]?DATA.slides[slideIdx]:(DATA.slides&&DATA.slides[0])||'';
  if(src)panel.style.backgroundImage=`url('${encodeURI(src)}')`;
  const charMap={};DATA.characters.forEach(c=>{charMap[c.id]=c;});
  const ch=charMap[line.speaker]||{name:line.speaker};
  const cfg_def=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
  const cfg={bg:ch.color||cfg_def.bg,emoji:ch.emoji||cfg_def.emoji};
  const tagHtml=line.speech_type&&line.speech_type!=='narrator'?`<span class="caption-tag ${line.speech_type==='반말'?'tag-banmal':'tag-jondaemal'}">${line.speech_type}</span>`:'';
  document.getElementById('scene-caption').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="caption-avatar" style="background:${cfg.bg}">${cfg.emoji}</div>
      <div class="caption-name">${esc(ch.name)}</div>
    </div>
    <div class="caption-body" style="flex:1">
      <div class="caption-kr">${esc(line.text)}</div>
      <div class="caption-en">${esc(line.en)}</div>
      ${tagHtml}
      <div class="speak-result" id="speak-result">
        <div class="speak-said">들린 내용: <span id="speak-said-text"></span></div>
        <div class="speak-feedback" id="speak-feedback">분석 중...</div>
      </div>
    </div>
`;
  const total=DATA.script.length;
  document.getElementById('nav-steps').innerHTML=DATA.script.map((_,i)=>`<div class="nav-step${i<=sceneIdx?' done':''}"></div>`).join('');
  document.getElementById('nav-count').textContent=`${sceneIdx+1} / ${total}`;
  document.getElementById('nav-prev').disabled=sceneIdx===0;
  document.getElementById('nav-next').disabled=sceneIdx===total-1;
  const sb=document.getElementById('speak-btn');
  if(sb){sb.onclick=()=>startSpeak(line.text,line.en);sb.textContent='🎤 말해보기';sb.classList.remove('listening');sb.disabled=false;}
  updateStripHighlight();
}

function moveScene(dir){
  const next=sceneIdx+dir;
  if(next<0||next>=DATA.script.length)return;
  sceneIdx=next;renderScene();
}

function jumpScene(i){
  sceneIdx=i;renderScene();
}

function speakCurrent(){
  if(!DATA)return;
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function randomScene(){
  const total=DATA.script.length;
  let next;
  do{next=Math.floor(Math.random()*total);}while(next===sceneIdx&&total>1);
  sceneIdx=next;renderScene();
}

function toggleStrip(){
  const strip=document.getElementById('script-strip');
  const arrow=document.getElementById('strip-arrow');
  const isOpen=strip.classList.toggle('open');
  arrow.textContent=isOpen?'▼':'▶';
  if(isOpen&&!strip.innerHTML)buildStrip();
}

function buildStrip(){
  const strip=document.getElementById('script-strip');
  if(!strip)return;
  strip.innerHTML=DATA.script.map((line,i)=>{
    const cfg=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
    return `<div class="strip-row${i===sceneIdx?' current':''}" onclick="jumpScene(${i});updateStripHighlight()">
      <div class="strip-avatar">${cfg.emoji}</div>
      <div><div class="strip-kr">${esc(line.text)}</div><div class="strip-en">${esc(line.en)}</div></div>
    </div>`;
  }).join('');
}

function updateStripHighlight(){
  document.querySelectorAll('.strip-row').forEach((el,i)=>el.classList.toggle('current',i===sceneIdx));
}

// ── AUDIO ──────────────────────────────────────────────
function speak(text,audioSrc){
  if(audioSrc){
    if(_audio){_audio.pause();_audio=null;}
    _audio=new Audio(audioSrc);
    _audio.play().catch(()=>speakTTS(text));
  }else{
    speakTTS(text);
  }
}
function speakTTS(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.88;
  const go=()=>{const v=speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;});
}

// ── GRAMMAR ────────────────────────────────────────────
function buildGrammar(){
  if(!DATA.grammar||!DATA.grammar.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return DATA.grammar.map(g=>{
    // rule_boxes — color-coded rule cards (red=warning, blue=pattern, green=tip, amber=note)
    const ruleBoxHtml=(g.rule_boxes||[]).map(rb=>{
      const colors={red:'#FFF0F0',blue:'#F0F6FF',green:'#EDF7F2',amber:'#FFFBF0'};
      const borders={red:'#F4A0A0',blue:'#A0C4F4',green:'#A8D8B5',amber:'#F0C980'};
      const textColors={red:'#C0392B',blue:'#1A5C9E',green:'#2E7D52',amber:'#7A5500'};
      const t=rb.type||'blue';
      return`<div style="background:${colors[t]||colors.blue};border-left:4px solid ${borders[t]||borders.blue};border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-bottom:8px">
        ${rb.label?`<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:${textColors[t]||textColors.blue};letter-spacing:.05em;margin-bottom:4px">${esc(rb.label)}</div>`:''}
        <div style="font-size:13px;font-weight:700;color:${textColors[t]||textColors.blue};font-family:var(--font-serif)">${esc(rb.content||rb.rule||'')}</div>
        ${rb.note?`<div style="font-size:11px;color:var(--warm-500);margin-top:4px">${esc(rb.note)}</div>`:''}
      </div>`;
    }).join('');
    // examples with optional highlight
    const exHtml=(g.examples||[]).map(ex=>{
      const safeHl=ex.highlight?ex.highlight.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'):'';
      const koDisplay=ex.highlight
        ? ex.ko.replace(new RegExp(`(${safeHl})`,'g'),'<mark style="background:#FFF176;padding:0 2px;border-radius:2px">$1</mark>')
        : esc(ex.ko);
      return`<li class="gram-ex">
          <div class="gram-ko">${ex.highlight?koDisplay:esc(ex.ko)} <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></div>
          <div class="gram-en">${esc(ex.en)}</div>
        </li>`;
    }).join('');
    // qna — Q&A practice pairs
    const qnaHtml=(g.qna||[]).map(pair=>`
      <div style="background:#fff;border:1.5px solid var(--warm-300);border-radius:var(--radius-md);padding:12px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;gap:10px;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:var(--coral);min-width:18px;padding-top:1px">Q</span>
          <div>
            <div style="font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--warm-900)">${esc(pair.q)} <button onclick="speakTTS('${escA(pair.q)}')" style="background:none;border:none;cursor:pointer;font-size:11px;opacity:.5">🔊</button></div>
            ${pair.q_en?`<div style="font-size:11px;color:var(--warm-500)">${esc(pair.q_en)}</div>`:''}
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <span style="font-size:11px;font-weight:700;color:var(--teal);min-width:18px;padding-top:1px">A</span>
          <div>
            <div style="font-family:var(--font-serif);font-size:13.5px;font-weight:700;color:var(--blue-800)">${esc(pair.a)} <button onclick="speakTTS('${escA(pair.a)}')" style="background:none;border:none;cursor:pointer;font-size:11px;opacity:.5">🔊</button></div>
            ${pair.a_en?`<div style="font-size:11px;color:var(--warm-500)">${esc(pair.a_en)}</div>`:''}
          </div>
        </div>
      </div>`).join('');
    return`<div class="gram-card">
      <div class="gram-title">${esc(g.title)}</div>
      ${g.title_en?`<div style="font-size:11px;color:var(--warm-500);margin-top:-4px;margin-bottom:8px">${esc(g.title_en)}</div>`:''}
      <div class="gram-exp">${esc(g.explanation_en)}</div>
      ${g.rule?`<div class="gram-rule">📐 ${esc(g.rule)}</div>`:''}
      ${ruleBoxHtml}
      ${exHtml?`<ul class="gram-ex-list">${exHtml}</ul>`:''}
      ${qnaHtml?`<div style="margin-top:10px"><div style="font-size:11.5px;font-weight:700;color:var(--warm-500);margin-bottom:6px">💬 연습해 봐요</div>${qnaHtml}</div>`:''}
      ${g.tip?`<div class="gram-tip">💡 ${esc(g.tip)}</div>`:''}
      ${g.usage&&g.usage.length?`<div class="gram-usage">${g.usage.map(u=>`
        <div class="gram-usage-row">
          <div class="gram-usage-ctx">${esc(u.situation)}</div>
          <div class="gram-usage-text">
            <div class="gram-usage-kr">${esc(u.example)} <button onclick="speakTTS('${escA(u.example)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;">🔊</button></div>
            <div class="gram-usage-en">${esc(u.en)}</div>
          </div>
        </div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

// ── QUIZ ───────────────────────────────────────────────
function buildQuiz(){
  if(!DATA.quiz||!DATA.quiz.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return`<div style="max-width:580px">
    <div class="quiz-mode-bar">
      <button class="quiz-mode-btn${quizMode==='mc'?' active':''}" onclick="setQuizMode('mc')">📝 객관식</button>
      <button class="quiz-mode-btn${quizMode==='listen'?' active':''}" onclick="setQuizMode('listen')">🎧 듣기·쓰기</button>
    </div>
    <div id="quiz-content"></div>
  </div>`;
}
function renderQuizQ(){
  const total=DATA.quiz.length;
  const qi=quizIdx;
  if(qi>=total){renderQuizScore();return;}
  const q=DATA.quiz[qi];
  const dots=Array.from({length:total},(_,i)=>`<div class="quiz-prog-dot${i<qi?' done':i===qi?' current':''}"></div>`).join('');
  let inner='';
  if(quizMode==='mc'){
    const opts=(q.options||[]).map((opt,oi)=>`
      <button class="quiz-opt" id="qopt-${oi}" onclick="answerMC(${oi},${qi})">
        <span style="font-weight:700;color:var(--teal-md);margin-right:7px">${oi+1}.</span>${esc(opt)}
      </button>`).join('');
    inner=`<div class="quiz-opts">${opts}</div>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  } else {
    inner=`<div class="quiz-listen-wrap">
        <div style="font-size:12px;color:var(--teal);margin-bottom:10px">🔊 버튼을 눌러 문제를 들어보세요</div>
        <button class="quiz-listen-btn" onclick="speakTTS('${escA(q.question_ko)}')">🔊 문제 듣기</button>
      </div>
      <input class="quiz-write-input" id="quiz-write-input" placeholder="정답을 한국어로 써보세요..." autocomplete="off">
      <button class="quiz-check-btn" onclick="checkWriteAnswer(${qi})">✅ 확인</button>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  }
  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-progress">
      <div class="quiz-prog-dots">${dots}</div>
      <div style="font-size:11.5px;color:var(--warm-500);margin-left:4px">${qi+1} / ${total}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-q-num">문제 ${qi+1}</div>
      <div class="quiz-q-text">${esc(q.question_ko)}</div>
      <div class="quiz-q-en">${esc(q.question_en||'')}</div>
      ${inner}
    </div>`;
}
function answerMC(chosen,qi){
  const q=DATA.quiz[qi];
  const correct=q.answer;
  const hint=q.explanation||'';
  for(let i=0;i<10;i++){
    const el=document.getElementById(`qopt-${i}`);
    if(!el)break;
    el.classList.add('locked');
    if(i===correct)el.classList.add('correct');
    else if(i===chosen)el.classList.add('wrong');
  }
  if(chosen===correct)quizScore++;
  showQuizExp(hint);
}
function checkWriteAnswer(qi){
  const q=DATA.quiz[qi];
  const correctText=(q.options||[])[q.answer]||'';
  const hint=q.explanation||'';
  const input=document.getElementById('quiz-write-input');
  if(!input)return;
  const val=(input.value||'').trim().replace(/\s+/g,' ');
  const exp=correctText.trim().replace(/\s+/g,' ');
  const ok=val===exp||(val&&exp&&exp.includes(val))||val.toLowerCase()===exp.toLowerCase();
  input.disabled=true;
  input.style.borderColor=ok?'var(--teal-md)':'var(--coral)';
  input.style.background=ok?'#EDF7F2':'#FFF0F0';
  if(ok)quizScore++;
  const fullHint=(ok?'✅ 정답! ':'❌ 오답. 정답: '+correctText+'\n')+hint;
  showQuizExp(fullHint);
}
function showQuizExp(hint){
  const exp=document.getElementById('quiz-exp');
  const btn=document.getElementById('quiz-next');
  if(exp&&hint){exp.textContent='💡 '+hint;exp.classList.add('show');}
  if(btn)btn.classList.add('show');
}
function nextQuizQ(){
  quizIdx++;
  renderQuizQ();
}
function renderQuizScore(){
  const total=DATA.quiz.length;
  const pct=Math.round(quizScore/total*100);
  const msg=pct===100?'🏆 완벽해요!':pct>=80?'🌟 잘했어요!':pct>=60?'👍 좋아요!':'💪 다시 도전!';
  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-score-wrap">
      <div class="quiz-score-num">${quizScore}<span style="font-size:24px;color:var(--warm-500)">/${total}</span></div>
      <div class="quiz-score-lbl">${msg}</div>
      <div style="font-size:13px;color:var(--warm-500);margin-top:8px">${pct}% 정답</div>
      <button class="quiz-retry-btn" onclick="resetQuiz()">↺ 다시 풀기</button>
    </div>`;
}
function setQuizMode(mode){
  quizMode=mode;
  quizIdx=0;quizScore=0;
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  renderQuizQ();
}
function resetQuiz(){
  quizIdx=0;quizScore=0;
  document.getElementById('panel-quiz').innerHTML=buildQuiz();
  renderQuizQ();
}

// Real Life comprehension quiz helper
const rlAnswered={};
function buildRLQuiz(questions,prefix){
  if(!questions||!questions.length)return'';
  return`<div style="margin-top:12px">${questions.map((q,i)=>{
    const key=`${prefix}_${i}`;
    const opts=(q.options||[]).map((opt,oi)=>`
      <li id="rlopt-${key}-${oi}" onclick="answerRL('${key}',${i},${oi},${q.answer},'${escA(q.explanation||'')}','${prefix}')"
          style="list-style:none;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--warm-300);margin-bottom:5px;cursor:pointer;font-size:12.5px;transition:background .15s">
        <span style="font-weight:700;color:var(--teal-md);margin-right:6px">${oi+1}.</span>${esc(opt)}
      </li>`).join('');
    return`<div style="margin-bottom:14px">
      <div style="font-size:12.5px;font-weight:700;color:var(--warm-900);margin-bottom:6px">${i+1}. ${esc(q.question_ko||q.question||'')}</div>
      ${q.question_en?`<div style="font-size:11px;color:var(--warm-500);margin-bottom:6px">${esc(q.question_en)}</div>`:''}
      <ul style="padding:0;margin:0">${opts}</ul>
      <div id="rlexp-${key}" style="font-size:12px;color:var(--sage);padding:8px 12px;background:#EDF7F2;border-radius:var(--radius-sm);display:none"></div>
    </div>`;
  }).join('')}</div>`;
}
function answerRL(key,qi,chosen,correct,hint,prefix){
  if(rlAnswered[`${key}`])return;
  rlAnswered[`${key}`]=true;
  for(let i=0;i<10;i++){
    const el=document.getElementById(`rlopt-${key}-${i}`);
    if(!el)break;
    if(i===correct)el.style.background='#EDF7F2';
    else if(i===chosen)el.style.background='#FFF0F0';
  }
  const exp=document.getElementById(`rlexp-${key}`);
  if(exp&&hint){exp.textContent='💡 '+hint;exp.style.display='block';}
}

async function loadEpAndTab(epId, tabName){
  closeIndex();
  await loadEp(epId);
  showTab(tabName);
}

function getEpLabel(epId){
  const ep=EPISODE_DATA[epId];
  if(!ep)return epId;
  const lvl=ep.level||'';
  const num=(epId||'').replace('ep','');
  const lvlMap={'초급':'Beginner','중급':'Intermediate','고급':'Advanced','기초':'Starter'};
  return (lvlMap[lvl]||lvl)+' · ep'+num;
}

// ── 색인 모달 ───────────────────────────────────────────
let idxTab='vocab';

function openIndex(){
  document.getElementById('idx-overlay').classList.add('open');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}
function closeIndex(){
  document.getElementById('idx-overlay').classList.remove('open');
}
function switchIdxTab(tab){
  idxTab=tab;
  document.querySelectorAll('.idx-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('idx-tab-'+tab).classList.add('active');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}

function renderIdxBody(){
  const q=(document.getElementById('idx-search-input').value||'').toLowerCase();
  const body=document.getElementById('idx-body');
  if(!body)return;

  // 전체 에피소드 데이터 수집
  const allEps=Object.values(EPISODE_DATA).filter(ep=>ep&&ep.id);

  if(idxTab==='vocab'){
    // 전체 단어 수집 → 가나다 정렬
    let allWords=[];
    allEps.forEach(ep=>{
      const vocab=ep.vocab||[];
      const isGrouped=vocab.length>0&&vocab[0].items;
      if(isGrouped){
        vocab.forEach(g=>g.items.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title})));
      } else {
        vocab.forEach(v=>allWords.push({...v,ep:ep.id,epTitle:ep.title}));
      }
    });
    // 검색 필터
    if(q) allWords=allWords.filter(v=>(v.korean||'').toLowerCase().includes(q)||(v.english||v.en||'').toLowerCase().includes(q));
    // 정렬
    allWords.sort((a,b)=>(a.korean||'').localeCompare(b.korean||'','ko'));
    // 초성 그룹핑
    const groups={};
    allWords.forEach(v=>{
      const first=(v.korean||'')[0]||'#';
      if(!groups[first])groups[first]=[];
      groups[first].push(v);
    });
    let html='';
    if(!allWords.length){html='<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';}
    else{
      Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ko')).forEach(ch=>{
        html+=`<div class="idx-section-hdr">${esc(ch)}</div>`;
        html+=groups[ch].map(v=>`
          <div class="idx-vocab-row">
            <div class="idx-vocab-kr">${esc(v.korean||'')} ${v.emoji||''}</div>
            <div style="font-size:11px;color:var(--warm-500);min-width:80px">${esc(v.romanization||'')}</div>
            <div class="idx-vocab-en">${esc(v.english||v.en||'')}</div>
            <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(v.ep||'')}','vocab')">${esc(getEpLabel(v.ep||''))}</span>
            <button onclick="speakTTS('${escA(v.korean||'')}')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:.4">🔊</button>
          </div>`).join('');
      });
    }
    body.innerHTML=html;

  } else if(idxTab==='grammar'){
    let allGram=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>allGram.push({...g,ep:ep.id,epTitle:ep.title}));
    });
    if(q) allGram=allGram.filter(g=>(g.title||'').toLowerCase().includes(q)||(g.explanation_en||'').toLowerCase().includes(q));
    let html='';
    if(!allGram.length){html='<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';}
    else{
      // 에피소드별 그룹
      const byEp={};
      allGram.forEach(g=>{
        if(!byEp[g.ep])byEp[g.ep]=[];
        byEp[g.ep].push(g);
      });
      Object.keys(byEp).sort().forEach(epId=>{
        const ep=allEps.find(e=>e.id===epId);
        html+=`<div class="idx-section-hdr">EP.${esc(epId.replace('ep',''))} · ${esc(ep?ep.title:'')}</div>`;

          <div class="idx-gram-row">

              </div>
            </div>
          </div>`).join('');
      });
    }
    body.innerHTML=html;

  } else if(idxTab==='pron'){
    // 발음 — grammar 중 발음 관련 항목 + 불규칙 동사 패턴 자동 추출
    const pronKeywords=['불규칙','발음','pronunciation','irregular','받침','연음','liaison','sound'];
    let allPron=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>{
        const txt=((g.title||'')+(g.explanation_en||'')).toLowerCase();
        if(pronKeywords.some(k=>txt.includes(k))){
          allPron.push({...g,ep:ep.id});
        }
      });
    });
    if(q) allPron=allPron.filter(g=>(g.title||'').toLowerCase().includes(q));
    let html='';
    if(!allPron.length){
      html=`<div style="text-align:center;padding:30px;color:var(--warm-500)">
        <div style="font-size:32px;margin-bottom:10px">🔤</div>
        <div style="font-size:13px">발음·불규칙 관련 문법 항목이 자동으로 표시돼요.<br>아직 해당 항목이 없거나 검색 결과가 없어요.</div>
      </div>`;
    } else {
      html=allPron.map(g=>`
        <div class="idx-pron-row">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <span style="font-size:18px">${esc(g.icon||'🔤')}</span>
            <div>
              <div class="idx-pron-word">${esc(g.title||'')} <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(g.ep||'')}','pron')">${esc(getEpLabel(g.ep||''))}</span></div>
              ${g.rule?`<div class="idx-pron-note">📐 ${esc(g.rule)}</div>`:''}
              ${(g.examples||[]).slice(0,2).map(ex=>`<div style="font-size:12px;color:var(--warm-700);margin-top:3px">${esc(ex.ko)} <span style="color:var(--warm-500)">— ${esc(ex.en)}</span></div>`).join('')}
            </div>
          </div>
        </div>`).join('');
    }
    body.innerHTML=html;
  }
}

function combineSyl(onset,nucleus,coda){
  const onsets=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const nuclei=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const codas=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const oi=onsets.indexOf(onset),ni=nuclei.indexOf(nucleus),ci=codas.indexOf(coda||'');
  if(oi<0||ni<0||ci<0)return null;
  return String.fromCharCode(0xAC00+oi*21*28+ni*28+ci);
}

function renderVerbGame(){

function answerVerb(chosen){
  if(verbGameAnswered)return;

  document.querySelectorAll('.verb-choice').forEach(b=>{

}

function initWritingCanvas(){
  wCanvas=document.getElementById('writing-canvas');

  wCtx=wCanvas.getContext('2d');
  wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;wCtx.lineCap='round';wCtx.lineJoin='round';
  drawGridLines();
  wCanvas.addEventListener('mousedown',e=>{const r=wCanvas.getBoundingClientRect();wDrawing=true;wLX=e.clientX-r.left;wLY=e.clientY-r.top;});
  wCanvas.addEventListener('mousemove',e=>{if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;});
  wCanvas.addEventListener('mouseup',()=>wDrawing=false);
  wCanvas.addEventListener('mouseleave',()=>wDrawing=false);
  wCanvas.addEventListener('touchstart',e=>{e.preventDefault();const r=wCanvas.getBoundingClientRect();const t=e.touches[0];wDrawing=true;wLX=t.clientX-r.left;wLY=t.clientY-r.top;},{passive:false});
  wCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const t=e.touches[0];const x=t.clientX-r.left,y=t.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;},{passive:false});
  wCanvas.addEventListener('touchend',()=>wDrawing=false);
}
function drawGridLines(){
  if(!wCtx||!wCanvas)return;
  const w=wCanvas.width,h=wCanvas.height;
  wCtx.clearRect(0,0,w,h);
  wCtx.save();wCtx.strokeStyle='#e8e8e8';wCtx.lineWidth=1;
  wCtx.beginPath();wCtx.moveTo(w/2,0);wCtx.lineTo(w/2,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,h/2);wCtx.lineTo(w,h/2);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,0);wCtx.lineTo(w,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(w,0);wCtx.lineTo(0,h);wCtx.stroke();
  wCtx.strokeStyle='#cccccc';wCtx.lineWidth=1.5;wCtx.strokeRect(2,2,w-4,h-4);
  wCtx.restore();wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;
}
function clearCanvas(){if(!wCtx||!wCanvas)return;drawGridLines();}

function setLevel(btn){
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curLevel=btn.textContent.trim();
  const hdr=document.querySelector('.sidebar-hdr,.sidebar-hdr-amber');
  if(curLevel==='Basics'){
    if(hdr){hdr.className='sidebar-hdr-amber';hdr.innerHTML='🌱 기초반 · Basics';}
    buildBasicsSidebar();
    loadBasics(curBasicsTopic);
  }else{
    if(hdr){hdr.className='sidebar-hdr';hdr.innerHTML='📺 Episodes';}
    buildSidebar();
    loadEp('ep01');
  }
}

function buildBasicsSidebar(){
  const list=document.getElementById('ep-list');
  list.innerHTML=BASICS_TOPICS.map(t=>
    '<div class="basics-topic-item'+(t.id===curBasicsTopic?' active':'')+'" id="bt-'+t.id+'" onclick="loadBasics(\''+t.id+'\')">'
    +'<div class="basics-topic-icon">'+t.icon+'</div>'
    +'<div class="basics-topic-name">'+t.label+'<span class="basics-topic-name-en">'+t.en+'</span></div>'
    +'</div>').join('');
}

function loadBasics(topicId){
  curBasicsTopic=topicId;
  document.querySelectorAll('.basics-topic-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('bt-'+topicId);
  if(item)item.classList.add('active');
  const topic=BASICS_TOPICS.find(t=>t.id===topicId);
  if(!topic)return;
  document.getElementById('content-area').innerHTML=
    '<div style="max-width:860px;margin:0 auto;padding:24px;">'
    +'<div class="basics-header"><div class="basics-icon-big">'+topic.icon+'</div>'
    +'<div><div class="basics-title-kr">'+topic.label+'</div><div class="basics-title-en">'+topic.en+'</div></div></div>'
    +'<div id="basics-body"></div></div>';
  const body=document.getElementById('basics-body');
  if(topicId==='hangul')    body.innerHTML=buildHangul();
  if(topicId==='structure') body.innerHTML=buildStructure();
  if(topicId==='greetings') body.innerHTML=buildGreetings();
  if(topicId==='numbers')   body.innerHTML=buildNumbers();
  if(topicId==='writing')   body.innerHTML=buildWriting();
  if(topicId==='verbs')     body.innerHTML=buildVerbs();
  if(topicId==='speaking')  body.innerHTML=buildSpeaking();
  if(topicId==='hangul')  requestAnimationFrame(()=>updateSylResult());
  if(topicId==='writing') requestAnimationFrame(()=>initWritingCanvas());
  if(topicId==='verbs')   requestAnimationFrame(()=>renderVerbGame());
}

function switchBtab(pfx,tabId){
  document.querySelectorAll('[id^="'+pfx+'-"]').forEach(p=>{if(p.classList.contains('btab-panel'))p.classList.remove('active');});
  document.querySelectorAll('[data-btab-group="'+pfx+'"]').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById(pfx+'-'+tabId);if(p)p.classList.add('active');
  document.querySelectorAll('[data-btab-group="'+pfx+'"][data-tab="'+tabId+'"]').forEach(b=>b.classList.add('active'));
}

  return '<div class="basics-intro">한글(Hangul)은 1443년 세종대왕이 만든 소리 문자예요. 자음 19개 + 모음 21개로 이루어져 있어요.<br><em>Hangul is a phonetic alphabet invented by King Sejong in 1443.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-hangul" data-tab="'+id+'" onclick="switchBtab(\'bp-hangul\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-hangul-cons" class="btab-panel active">'+buildConsPanel()+'</div>'

    +'<div id="bp-hangul-batchim" class="btab-panel">'+buildBatchimPanel()+'</div>';
}

function buildBatchimPanel(){
  const b7=[
    {kr:'ㄱ',rom:'k',ex:'국(soup)'},{kr:'ㄴ',rom:'n',ex:'산(mountain)'},
    {kr:'ㄷ',rom:'t',ex:'곧(soon)'},{kr:'ㄹ',rom:'l',ex:'말(horse)'},
    {kr:'ㅁ',rom:'m',ex:'봄(spring)'},{kr:'ㅂ',rom:'p',ex:'밥(rice/meal)'},
    {kr:'ㅇ',rom:'ng',ex:'강(river)'},
  ];
  return '<div class="basics-intro" style="margin-bottom:16px;"><strong>받침</strong>은 음절 맨 아래에 오는 자음. 7가지 소리로 발음돼요.<br><em>Batchim = final consonant in a syllable. All pronounced as one of 7 sounds.</em></div>'
    +'<div class="hangul-grid">'+b7.map(x=>'<div class="hcard" onclick="speakTTS(\''+x.ex.split('(')[0]+'\')">'
    +'<div class="hcard-kr">'+x.kr+'</div><div class="hcard-rom">-'+x.rom+'</div><div class="hcard-ex">'+x.ex+'</div></div>').join('')+'</div>'
    +'<div class="structure-note">💡 받침 뒤에 모음이 오면 연음(연결 발음)이 돼요!<br><em>When batchim is followed by a vowel syllable, it links over: 국어 → [구거]</em></div>';
}

function buildStructure(){
  const exs=[
    {en:'I eat kimchi.',ko:'저는 김치를 먹어요.'},
    {en:'She goes to school.',ko:'그녀는 학교에 가요.'},
    {en:'We study Korean every day.',ko:'우리는 매일 한국어를 공부해요.'},
    {en:"I don't know.",ko:'모르겠어요.'},
  ];
  return '<div class="basics-intro">한국어는 <strong>주어 + 목적어 + 동사 (SOV)</strong> 어순이에요. 영어는 SVO — 동사가 가운데에 있죠.<br><em>Korean word order: Subject → Object → Verb. English: Subject → Verb → Object.</em></div>'
    +'<div class="structure-compare">'
    +'<div class="structure-box english"><div class="structure-box-title">🇺🇸 English — S · V · O</div>'
    +'<div class="chunk-row"><div class="chunk c-subj">I<sub>Subject</sub></div><span class="chunk-arrow">→</span><div class="chunk c-verb">eat<sub>Verb</sub></div><span class="chunk-arrow">→</span><div class="chunk c-obj">kimchi<sub>Object</sub></div></div></div>'
    +'<div class="structure-box korean"><div class="structure-box-title">🇰🇷 Korean — S · O · V</div>'
    +'<div class="chunk-row"><div class="chunk c-subj">저는<sub>I</sub></div><span class="chunk-arrow">→</span><div class="chunk c-obj">김치를<sub>kimchi</sub></div><span class="chunk-arrow">→</span><div class="chunk c-verb">먹어요<sub>eat</sub></div></div></div>'
    +'</div>'
    +'<div class="structure-note">🔑 한국어에서 동사는 <strong>항상 마지막</strong>에 와요! 문장 끝까지 들어야 이해할 수 있어요.<br><em>The verb is ALWAYS at the end. You must hear the whole sentence to understand the action!</em></div>'
    +'<table class="structure-ex-table"><tr><th>한국어</th><th>English</th></tr>'
    +exs.map(e=>'<tr><td style="cursor:pointer" onclick="speakTTS(\''+e.ko+'\')">'+e.ko+' 🔊</td><td>'+e.en+'</td></tr>').join('')+'</table>'
    +'<div class="structure-note" style="background:var(--purple-lt,#eeebfb);border-color:var(--purple-lt,#eeebfb);color:var(--purple);">⭐ Korean also uses <strong>particles</strong> (은/는, 이/가, 을/를) to mark roles — so word order can be flexible! We will cover particles in Beginner level.</div>';
}

    +'<button class="btab" data-btab-group="bp-verb" data-tab="rule" onclick="switchBtab(\'bp-verb\',\'rule\')">📌 활용 규칙</button>'
    +'</div>'
    +'<div id="bp-verb-cards" class="btab-panel active"><div class="verb-cards-grid">'

      +'<div class="verb-dict">'+v.dict+'</div><div class="verb-dict-rom">'+v.rom+'</div>'
      +'<div class="verb-mean">'+v.mean+'</div>'
      +'<div class="verb-forms">'
      +'<div class="verb-form-box"><div class="verb-form-label">해요체</div><div class="verb-form-kr">'+v.haeyo+'</div><div class="verb-form-rom">'+v.haeyoRom+'</div></div>'
      +'<div class="verb-form-box" style="background:var(--coral-lt);border-color:var(--coral-lt)"><div class="verb-form-label" style="color:var(--coral)">부정</div><div class="verb-form-kr" style="color:var(--coral)">'+v.neg+'</div><div class="verb-form-rom">'+v.negRom+'</div></div>'
      +'</div></div>').join('')
    +'</div></div>'
    +'<div id="bp-verb-game" class="btab-panel"><div class="verb-game-box" id="verb-game-box"></div></div>'

    +'<div style="background:var(--amber-50);border:1.5px solid var(--amber-lt);border-radius:var(--radius-sm);padding:10px 14px;font-size:12.5px;color:var(--amber-600);margin-bottom:16px;">'
    +'⚙️ AI 피드백을 사용하려면 우측 상단 <strong>⚙️ AI</strong> 버튼에서 API 키를 입력하세요.</div>'
    +SPEAK_CARDS.map((c,i)=>'<div class="speak-card">'
      +'<div class="speak-card-kr">'+c.kr+'</div>'
      +'<div class="speak-card-rom">'+c.rom+'</div>'
      +'<div class="speak-card-en">'+c.en+'</div>'
      +'<div class="speak-card-btns">'
      +'<button class="speak-tts-btn" onclick="speakTTS(\''+c.kr+'\')">🔊 듣기</button>'
      +'<button class="speak-ai-btn" onclick="startSpeak(\''+c.kr+'\',\''+c.en+'\')">🎤 말해보기</button>'

// ── INIT ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{
  updateApiKeyBtn();
  buildSidebar();
  loadEp('ep01');
});


// ── SPEAKING PRACTICE ────────────────────────────────────
function getApiKey(){return localStorage.getItem('nhs_api_key')||'';}
function openApiKey(){
  document.getElementById('apikey-input').value=getApiKey();
  document.getElementById('apikey-overlay').classList.add('open');
}
function closeApiKey(){document.getElementById('apikey-overlay').classList.remove('open');}
function saveApiKey(){
  const v=document.getElementById('apikey-input').value.trim();
  if(!v)return;
  localStorage.setItem('nhs_api_key',v);
  closeApiKey();
  updateApiKeyBtn();
  alert('✅ API 키 저장됐어요! 이제 스피킹 기능을 사용할 수 있어요.');
}
function updateApiKeyBtn(){
  const btn=document.getElementById('apikey-status-btn');
  if(!btn)return;
  btn.textContent=getApiKey()?'⚙️ AI ✓':'⚙️ AI';
  btn.style.color=getApiKey()?'var(--teal)':'var(--gray-500)';
  btn.style.borderColor=getApiKey()?'var(--teal)':'var(--gray-200)';
}

let _recog=null;
function _initRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  _recog=new SR();
  _recog.lang='ko-KR';
  _recog.continuous=false;
  _recog.interimResults=false;
  return true;
}

async function startSpeak(targetKr, targetEn){
  if(!getApiKey()){openApiKey();return;}
  if(!_recog&&!_initRecog()){
    alert('음성 인식은 Chrome 브라우저에서만 지원돼요!');return;
  }
  const btn=document.getElementById('speak-btn');
  const result=document.getElementById('speak-result');
  const saidEl=document.getElementById('speak-said-text');
  const fbEl=document.getElementById('speak-feedback');
  btn.textContent='🔴 듣는 중...';
  btn.classList.add('listening');
  btn.disabled=true;
  result.classList.remove('show');

  _recog.onresult=async(e)=>{
    const said=e.results[0][0].transcript;
    saidEl.textContent=said;
    fbEl.textContent='분석 중...';
    result.classList.add('show');
    btn.textContent='⏳ 분석 중...';
    btn.classList.remove('listening');
    const fb=await _callClaude(targetKr,targetEn,said);
    fbEl.textContent=fb;
    btn.textContent='🎤 다시 말해보기';
    btn.disabled=false;
  };
  _recog.onerror=()=>{
    btn.textContent='🎤 말해보기';
    btn.classList.remove('listening');
    btn.disabled=false;
  };
  _recog.onend=()=>{
    if(btn.disabled&&btn.textContent==='🔴 듣는 중...'){
      btn.textContent='🎤 말해보기';
      btn.classList.remove('listening');
      btn.disabled=false;
    }
  };
  _recog.start();
}

async function _callClaude(targetKr, targetEn, said){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':getApiKey(),
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:180,
        messages:[{role:'user',content:`You are a warm Korean language tutor for English-speaking students.
Target sentence: "${targetKr}" (${targetEn})
Student said: "${said}"
Give encouraging feedback in English, 2 sentences max. If correct or close, celebrate! If different, note 1 key thing to fix and give a quick tip. Be specific and kind.`}]
      })
    });
    const d=await res.json();
    return d.content?.[0]?.text||'피드백을 가져오지 못했어요.';
  }catch(e){
    return '❌ 오류가 발생했어요. API 키를 확인해주세요 (⚙️ AI 버튼).';
  }
}
