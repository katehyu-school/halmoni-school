  <div class="idx-modal">

    </div>
    <div class="idx-search"><input id="idx-search-input" placeholder="검색..." oninput="renderIdxBody()"></div>
    <div id="idx-jump-bar" class="idx-jump-bar"></div>

  <div class="wu-modal" id="wu-modal"></div>
</div>
<div class="fc-overlay" id="fc-overlay">
  <div class="fc-modal" id="fc-modal"></div>
</div>
<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-hdr">📺 Episodes</div>
    <div id="ep-list"></div>
    <div style="padding:4px 2px 2px;">
      <button class="fc-sidebar-btn" onclick="openFlashcards()">🃏 복습 플래시카드</button>
    </div>
  </div>
  <div class="content-area" id="content-area">
    <div class="loading">⏳ 로딩 중…</div>
  </div>
</div>
<script>
const EPISODE_DATA = {};

function toggleMobileSidebar(){ document.body.classList.toggle('mobile-sidebar-open'); }
function closeMobileSidebar(){ document.body.classList.remove('mobile-sidebar-open'); }
document.addEventListener('click', function(e){
  if(!document.body.classList.contains('mobile-sidebar-open')) return;
  if(e.target.closest('.ep-item') || e.target.closest('.lt-item')) closeMobileSidebar();
});

let DATA=null,curTab='script',sceneIdx=0,qAnswered={},_audio=null;
let quizMode='mc',quizIdx=0,quizScore=0;
let _nhsRec={stream:null,recorder:null,chunks:[],blobURL:null,recording:false};
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return s==null?'':String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/[\r\n]+/g,' ');}
const CHAR_CFG={jeongmin:{bg:'#B8D4F0',emoji:'👦'},mirae:{bg:'#F0B8D4',emoji:'👧'},mom:{bg:'#B8D4B8',emoji:'👩'},narrator:{bg:'#E0E0E0',emoji:'📢'},jungmin:{bg:'#A8D8EA',emoji:'👦'},mina:{bg:'#FFB7C5',emoji:'👧'},staff:{bg:'#D4E8D0',emoji:'🎫'}};
// ── TRIAL ACCOUNTS ── ?trial URL param (set by index.html for role='trial' members) → 지정된 에피소드만 열람 가능
// localStorage에 플래그를 저장해서, start.html 등 쿼리스트링 없는 내부 링크를 거쳐도 잠금이 풀리지 않게 함
(function(){
  const _p = new URLSearchParams(location.search);
  if (_p.has('trial')) { try{ localStorage.setItem('nhs_trial','1'); }catch(e){} }
  else if (_p.has('name')) { try{ localStorage.removeItem('nhs_trial'); }catch(e){} } // 일반 로그인은 체험 플래그 해제
})();
const NHS_IS_TRIAL = new URLSearchParams(location.search).has('trial') || (function(){ try{ return localStorage.getItem('nhs_trial')==='1'; }catch(e){ return false; } })();
const NHS_TRIAL_EPS = ['ep01','ep05','ep07'];
let L1_EPISODES=[], L2_EPISODES=[], L3_EPISODES=[], L4_EPISODES=[], L5_EPISODES=[];
const EPISODES=L1_EPISODES; // 하위호환 — 같은 배열 참조를 유지해야 하므로 재할당(=) 대신 아래에서 push()로 채움
// 에피소드 사이드바 목록은 data/nhs/episodes_index.json에서 fetch — 새 에피소드 추가 시 nhs.html을 건드리지 않아도 됨 (2026-07-04)
const _epIdxReady = fetch('data/nhs/episodes_index.json').then(r=>r.json()).then(d=>{
  L1_EPISODES.push(...(d.L1||[]));
  L2_EPISODES.push(...(d.L2||[]));
  L3_EPISODES.push(...(d.L3||[]));
  L4_EPISODES.push(...(d.L4||[]));
  L5_EPISODES.push(...(d.L5||[]));
}).catch(e=>{});

function buildSidebar(lv){
  lv=lv||'L1';
  const _done=_epDoneSet();
  const mkItem=(ep,i,level)=>ep.disabled
    ?`<div class="ep-item" style="cursor:default"><div class="ep-num" style="background:var(--warm-300);color:var(--warm-500)">${i+1}</div><div class="ep-name" style="color:var(--warm-300)">${ep.label||'…'}${ep.locked?' 🔒':''}</div></div>`
    :`<div class="ep-item" id="ep-item-${level}-${ep.id}" data-epkey="${level}_${ep.id}" onclick="loadEp('${ep.id}','${level}')"><div class="ep-num">${i+1}</div><div class="ep-name">${ep.label}</div><span class="ep-done" style="opacity:${_done.has(level+'_'+ep.id)?1:0}">✅</span></div>`;
  const trialLock=(list)=>NHS_IS_TRIAL?list.map(ep=>NHS_TRIAL_EPS.includes(ep.id)?ep:{...ep,disabled:true,locked:true}):list;
  let html='';
  if(lv==='L1'){
    html=trialLock(L1_EPISODES).map((ep,i)=>mkItem(ep,i,'L1')).join('');
    html+=NHS_IS_TRIAL
      ?'<div class="lt-item" style="opacity:.4;cursor:default" title="체험판에서는 이용할 수 없어요"><div class="lt-num">🔒</div><div class="lt-name">Level 1 마감 테스트</div></div>'
      :'<div class="lt-item" id="lt-sidebar-item" onclick="loadLevelTest()"><div class="lt-num">🏆</div><div class="lt-name">Level 1 마감 테스트</div></div>';
  }else if(lv==='L2'){
    html=L2_EPISODES.map((ep,i)=>mkItem(ep,i,'L2')).join('')
      +'<div class="lt-item" id="l2t-sidebar-item" onclick="loadL2Test()"><div class="lt-num">🏆</div><div class="lt-name">Level 2 마감 테스트</div></div>';
  }else if(lv==='L3'){
    html=L3_EPISODES.map((ep,i)=>mkItem(ep,i,'L3')).join('')
      +'<div class="lt-item" id="l3t-sidebar-item" onclick="loadL3Test()"><div class="lt-num">🏆</div><div class="lt-name">Level 3 마감 테스트</div></div>';
  }else if(lv==='L4'){
    html=L4_EPISODES.map((ep,i)=>mkItem(ep,i,'L4')).join('')
      +'<div class="lt-item" id="l4t-sidebar-item" onclick="loadL4Test()"><div class="lt-num">🏆</div><div class="lt-name">Level 4 마감 테스트</div></div>';
  }else if(lv==='L5'){
    html=L5_EPISODES.map((ep,i)=>mkItem(ep,i,'L5')).join('');
  }
  document.getElementById('ep-list').innerHTML=html;
}

// ══════════════════════════════════════════════════════
// ── LEVEL 1 TEST ───────────────────────────────────────
// ══════════════════════════════════════════════════════
let L1Q=[]; const _l1qReady = fetch('data/nhs/L1/closing_test.json').then(r=>r.json()).then(d=>{L1Q=d;}).catch(e=>{});

let ltIdx=0,ltScore=0,ltAnswered=false;

async function loadLevelTest(){
  await _l1qReady;
  document.querySelectorAll('.ep-item,.lt-item').forEach(el=>el.classList.remove('active'));
  const si=document.getElementById('lt-sidebar-item');
  if(si)si.classList.add('active');
  ltIdx=0;ltScore=0;ltAnswered=false;
  document.getElementById('content-area').innerHTML=renderLTPage();
  renderLT();
}
function renderLTPage(){
  return`<div class="lt-page">`
    +`<div class="lt-header">`
      +`<div class="lt-title">🏆 Level 1 마감 테스트</div>`
      +`<div class="lt-subtitle">ep01~ep12 · 전체 복습 · 22문제</div>`
      +`<div class="lt-prog-bar"><div class="lt-prog-fill" id="lt-prog-fill" style="width:0%"></div></div>`
      +`<div class="lt-prog-label" id="lt-prog-label">0 / 20</div>`
    +`</div>`
    +`<div id="lt-q-area"></div>`
  +`</div>`;
}
function renderLT(){
  const q=L1Q[ltIdx];
  const progPct=Math.round(ltIdx/L1Q.length*100);
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width=progPct+'%';
  if(pl)pl.textContent=ltIdx+' / '+L1Q.length;
  ltAnswered=false;
  const area=document.getElementById('lt-q-area');
  if(!area)return;
  const listenBtn=q.type==='listen'
    ?`<button class="lt-listen-btn" onclick="speakTTS('${q.audio.replace(/'/g,"\'")}')">🔊 듣기</button><br>`
    :'';
  area.innerHTML=
    `<div class="lt-ep-badge">${q.ep.toUpperCase()} · ${q.ep==='ep01'?'자기소개':q.ep==='ep02'?'식사':q.ep==='ep03'?'쇼핑':q.ep==='ep04'?'주문':q.ep==='ep05'?'버스타기':q.ep==='ep06'?'약속':q.ep==='ep07'?'위치':q.ep==='ep08'?'시장':q.ep==='ep09'?'소풍':q.ep==='ep10'?'손님 초대':'TOPIK 1급'}</div>`
    +`<div class="lt-q-text">${ltIdx+1}. ${q.q}</div>`
    +`<div class="lt-q-en">${q.en}</div>`
    +listenBtn
    +`<div class="lt-opts">`
    +q.opts.map((o,i)=>`<button class="lt-opt" id="lt-opt-${i}" onclick="ltChoose(${i})">${o}</button>`).join('')
    +`</div><div id="lt-exp-area"></div>`;
}
function ltChoose(idx){
  if(ltAnswered)return;
  ltAnswered=true;
  const q=L1Q[ltIdx];
  const correct=q.ans===idx;
  if(correct)ltScore++;
  q.opts.forEach((_,i)=>{
    const el=document.getElementById('lt-opt-'+i);
    if(!el)return;
    el.disabled=true;
    if(i===q.ans)el.classList.add('correct');
    else if(i===idx&&!correct)el.classList.add('wrong');
  });
  document.getElementById('lt-exp-area').innerHTML=
    `<div class="lt-exp">${correct?'✅':'❌'} ${q.exp}</div>`
    +`<button class="lt-next-btn" onclick="ltNext()">${ltIdx===L1Q.length-1?'📊 결과 보기':'다음 →'}</button>`;
}
function ltNext(){
  ltIdx++;
  if(ltIdx>=L1Q.length){renderLTScore();return;}
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width=Math.round(ltIdx/L1Q.length*100)+'%';
  if(pl)pl.textContent=ltIdx+' / '+L1Q.length;
  renderLT();
}
function renderLTScore(){
  const total=L1Q.length;
  const pct=Math.round(ltScore/total*100);
  const pf=document.getElementById('lt-prog-fill');
  const pl=document.getElementById('lt-prog-label');
  if(pf)pf.style.width='100%';
  if(pl)pl.textContent=total+' / '+total;
  let grade,color,msg,next;
  if(pct>=90){grade='A';color='#2e7d50';msg='🏆 완벽해요!';next='Level 2로 갈 준비 됐어요! 🚀';}
  else if(pct>=80){grade='B';color='var(--teal-dark)';msg='🌟 잘했어요!';next='조금만 더 연습하면 Level 2 도전할 수 있어요!';}
  else if(pct>=70){grade='C';color='var(--amber-600)';msg='👍 괜찮아요!';next='헷갈린 에피소드를 복습하고 다시 도전해봐요!';}
  else{grade='D';color='#c0392b';msg='💪 더 연습해요!';next='Level 1 에피소드를 다시 복습하고 재도전해봐요!';}
  document.getElementById('lt-q-area').innerHTML=
    `<div class="lt-score-wrap">`
    +`<div class="lt-grade" style="color:${color}">${grade}</div>`
    +`<div class="lt-grade-lbl" style="color:${color}">${msg}</div>`
    +`<div class="lt-score-detail">`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${ltScore}/${total}</div><div class="lt-score-box-lbl">정답</div></div>`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${pct}%</div><div class="lt-score-box-lbl">정확도</div></div>`
      +`<div class="lt-score-box"><div class="lt-score-box-num">${total-ltScore}</div><div class="lt-score-box-lbl">오답</div></div>`
    +`</div>`
    +`<div style="font-size:13px;color:var(--warm-600);margin:12px 0 20px;line-height:1.6;">${next}</div>`
    +`<button class="lt-retry-btn" onclick="ltRetry()">↺ 다시 풀기</button>`
    +`</div>`;
}
function ltRetry(){
  ltIdx=0;ltScore=0;ltAnswered=false;
  document.getElementById('content-area').innerHTML=renderLTPage();
  renderLT();
}


// ─────────────────────────────────────────────────────────────────────────────
// LEVEL 2 마감 테스트
// ─────────────────────────────────────────────────────────────────────────────
let L2Q=[]; const _l2qReady = fetch('data/nhs/L2/closing_test.json').then(r=>r.json()).then(d=>{L2Q=d;}).catch(e=>{});

let l2tIdx=0,l2tScore=0,l2tAnswered=false;

async function loadL2Test(){
  await _l2qReady;
  document.querySelectorAll('.ep-item,.lt-item').forEach(el=>el.classList.remove('active'));
  const si=document.getElementById('l2t-sidebar-item');
  if(si)si.classList.add('active');
  l2tIdx=0;l2tScore=0;l2tAnswered=false;
  document.getElementById('content-area').innerHTML=renderL2TPage();
  renderL2T();
}
function renderL2TPage(){
  return`<div class="lt-page">`
    +`<div class="lt-header">`
      +`<div class="lt-title">🏆 Level 2 마감 테스트</div>`
      +`<div class="lt-subtitle">ep01~ep12 · 문법·어휘·읽기·듣기 · 20문제</div>`
      +`<div class="lt-prog-bar"><div class="lt-prog-fill" id="l2t-prog-fill" style="width:0%"></div></div>`
      +`<div class="lt-prog-label" id="l2t-prog-label">0 / 20</div>`
    +`</div>`
    +`<div id="l2t-q-area"></div>`
  +`</div>`;
}
function renderL2T(){
  const q=L2Q[l2tIdx];
  const pct=Math.round(l2tIdx/L2Q.length*100);
  const pf=document.getElementById('l2t-prog-fill');
  const pl=document.getElementById('l2t-prog-label');
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=l2tIdx+' / '+L2Q.length;
  l2tAnswered=false;
  const area=document.getElementById('l2t-q-area');
  if(!area)return;
  const epLabels={ep01:'관형절',ep02:'허락표현',ep03:'-(으)니까',ep04:'-아/어 보다',ep05:'안 vs 못',ep06:'-아/어도',ep07:'-(으)려고',ep08:'-아/어야 해요',ep09:'-게 되다',ep10:'-잖아요',ep11:'-거든요',ep12:'-다고 하다',read1:'읽기 1',read2:'읽기 2'};
  const badge=`<div class="lt-ep-badge">${(q.ep||'').toUpperCase()} · ${epLabels[q.ep]||q.ep}</div>`;
  const listenBtn=q.type==='listen'
    ?`<button class="lt-listen-btn" onclick="speakTTS('${(q.audio_text||'').replace(/'/g,"\\'")}')">🔊 듣기</button><br>`
    :'';
  const passageHtml=q.passage
    ?`<div style="background:var(--warm-50);border:1.5px solid var(--warm-200);border-radius:10px;padding:14px 16px;margin:0 0 14px;font-family:var(--font-serif);font-size:14px;line-height:1.8;color:var(--warm-900)">${q.passage}</div>`
    :'';
  area.innerHTML=
    badge
    +passageHtml
    +`<div class="lt-q-text">${l2tIdx+1}. ${(q.q||'').replace(/\n/g,'<br>')}</div>`
    +`<div class="lt-q-en">${q.en||''}</div>`
    +listenBtn
    +`<div class="lt-opts">`
    +q.opts.map((o,i)=>`<button class="lt-opt" id="l2t-opt-${i}" onclick="l2tChoose(${i})">${o}</button>`).join('')
    +`</div><div id="l2t-exp-area"></div>`;
}
function l2tChoose(idx){
  if(l2tAnswered)return;
  l2tAnswered=true;
  const q=L2Q[l2tIdx];
  const correct=q.ans===idx;
  if(correct)l2tScore++;
  q.opts.forEach((_,i)=>{
    const el=document.getElementById('l2t-opt-'+i);
    if(!el)return;
    el.disabled=true;
    if(i===q.ans)el.classList.add('correct');
    else if(i===idx&&!correct)el.classList.add('wrong');
  });
  document.getElementById('l2t-exp-area').innerHTML=
    `<div class="lt-exp">${correct?'✅':'❌'} ${q.exp||''}</div>`
    +`<button class="lt-next-btn" onclick="l2tNext()">${l2tIdx===L2Q.length-1?'📊 결과 보기':'다음 →'}</button>`;
}
function l2tNext(){
  l2tIdx++;
  if(l2tIdx>=L2Q.length){renderL2TScore();return;}
  const pf=document.getElementById('l2t-prog-fill');
  const pl=document.getElementById('l2t-prog-label');
  if(pf)pf.style.width=Math.round(l2tIdx/L2Q.length*100)+'%';
  if(pl)pl.textContent=l2tIdx+' / '+L2Q.length;
  renderL2T();
}
function renderL2TScore(){
  const total=L2Q.length;
  const pct=Math.round(l2tScore/total*100);
  const pf=document.getElementById('l2t-prog-fill');
  const pl=document.getElementById('l2t-prog-label');
  if(pf)pf.style.width='100%';
  if(pl)pl.textContent=total+' / '+total;
  let grade,color,msg,next;
  if(pct>=90){grade='A';color='#2e7d50';msg='🏆 완벽해요!';next='TOPIK 2급 실전도 문제없어요! 🚀';}

async function _doLoadEp(epId, level='L1'){
  await Promise.all([_rdPoolReady, _spPoolReady, _sharedSetsReady]);
  document.querySelectorAll('.ep-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById(`ep-item-${level}-${epId}`);
  if(item)item.classList.add('active');
  document.getElementById('content-area').innerHTML='<div class="loading">로딩 중…</div>';
  Object.keys(rlAnswered).forEach(k=>delete rlAnswered[k]);
  const cacheKey=`${level}_${epId}`;
  if(EPISODE_DATA[cacheKey]){
    DATA=EPISODE_DATA[cacheKey];
  } else {
    try{
      const res=await fetch(`data/nhs/${level}/${epId}.json`);
      if(res.ok){ DATA=await res.json(); _resolveRefs(DATA); EPISODE_DATA[cacheKey]=DATA; }
      else DATA=null;
    }catch(e){ DATA=null; }
  }
  if(!DATA){
    document.getElementById('content-area').innerHTML='<div class="loading">⚠️ 에피소드 데이터가 없어요.</div>';
    return;
  }
  // Preload: wait for first slide, then render; load rest async
  if(DATA.slides&&DATA.slides.length){
    await Promise.race([
      new Promise(res=>{const img=new Image();img.onload=img.onerror=res;img.src=encodeURI(DATA.slides[0]);if(img.complete)res();}),
      new Promise(res=>setTimeout(res,600))
    ]);
    DATA.slides.slice(1).forEach(s=>{const img=new Image();img.src=encodeURI(s);});
  }
  qAnswered={};curTab='script';sceneIdx=0;render();
}

function render(){
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const baseLabels=['📽 영상·Script','새어휘 Vocab','문법 Grammar','발음 Pron','반말/존댓말','Usage','Quiz','Real Life'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const labels=DATA.self_check&&DATA.self_check.length?[...baseLabels,'✅ 자기점검']:[...baseLabels];
  document.getElementById('content-area').innerHTML=`
    <div class="ep-header">
      <div class="ep-num-badge">EP.${(DATA.id||'ep01').replace('ep','')} · ${esc(DATA.level)}</div>
      <div class="ep-title-wrap"><div class="ep-title-kr">${esc(DATA.title)}</div><div class="ep-title-en">${esc(DATA.title_en)}${DATA.goal&&DATA.goal.en?` <span class="ep-goal-badge">🎯 ${esc(DATA.goal.en)}</span>`:''}</div></div>
      <div class="ep-scene-badge">${esc(DATA.scene)}</div>
    </div>
    <div class="tab-bar">${tabs.map((t,i)=>`<button class="tab-btn${curTab===t?' active':''}" onclick="showTab('${t}')">${labels[i]}</button>`).join('')}</div>
    <div class="tab-panels">${tabs.map(t=>`<div id="panel-${t}" class="tab-panel${curTab===t?' active':''}"></div>`).join('')}</div>`;
  fillAllPanels();
}

  document.getElementById('panel-script').innerHTML=buildScript();
  document.getElementById('panel-vocab').innerHTML=buildVocab();
  document.getElementById('panel-grammar').innerHTML=buildGrammar();
  document.getElementById('panel-banmal').innerHTML=buildBanmal();

function showTab(name){
  curTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const baseTabs=['script','vocab','grammar','pron','banmal','usage','quiz','reallife'];
  const tabs=DATA.self_check&&DATA.self_check.length?[...baseTabs,'selfcheck']:[...baseTabs];
  const idx=tabs.indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('panel-'+name);
  if(p)p.classList.add('active');
  if(name==='script')requestAnimationFrame(initSceneViewer);
  if(name==='quiz'){quizMode='quiz';quizIdx=0;quizScore=0;const qp=document.getElementById('panel-quiz');if(qp)qp.innerHTML=buildQuiz();renderQuizQ();}

function buildAnnoText(text, anno){
  if(!anno||!anno.highlight) return esc(text);
  const idx=text.indexOf(anno.highlight);
  if(idx<0) return esc(text);
  if(!anno.note&&!anno.grammar){
    return esc(text.slice(0,idx))+'<span class="anno-hl">'+esc(anno.highlight)+'</span>'+esc(text.slice(idx+anno.highlight.length));
  }
  return esc(text.slice(0,idx))
    +'<span class="anno-mark" data-grammar="'+esc(anno.grammar||'')+'" data-note="'+esc(anno.note||'')+'" onclick="showAnnoTooltipEl(event,this)" onmouseleave="hideAnnoTooltip()" title="'+esc(anno.grammar||'')+'">'+esc(anno.highlight)+' 📎</span>'
    +esc(text.slice(idx+anno.highlight.length));
}
function showAnnoTooltip(e,grammar,note){
  document.querySelectorAll('.anno-tooltip').forEach(t=>t.remove());
  const tip=document.createElement('div');
  tip.className='anno-tooltip';
  tip.innerHTML='<div class="anno-tooltip-tag">'+esc(grammar)+'</div><div class="anno-tooltip-note">'+esc(note)+'</div>';
  document.body.appendChild(tip);
  const x=Math.min(e.clientX+8, window.innerWidth-290);
  const y=Math.min(e.clientY+14, window.innerHeight-120);
  tip.style.left=x+'px'; tip.style.top=y+'px';
  e.stopPropagation();
  // 클릭 외부 or 같은 요소 재클릭 시 제거
  const remove=()=>{tip.remove();document.removeEventListener('click',remove);};
  setTimeout(()=>document.addEventListener('click',remove),50);
}

function hideAnnoTooltip(){
  document.querySelectorAll('.anno-tooltip').forEach(t=>t.remove());
}
function showAnnoTooltipEl(e,el){
  const grammar=el.dataset.grammar||'';
  const note=el.dataset.note||'';
  showAnnoTooltip(e,grammar,note);
}

function initSceneViewer(){
  if(DATA.video) return;  // video mode: no slide viewer
  renderScene();
}

function renderScene(){
  const panel=document.getElementById('scene-panel');
  if(!panel)return;
  const line=DATA.script[sceneIdx];
  const slideIdx=(line.slide!=null)?line.slide:sceneIdx;
  const src=DATA.slides&&DATA.slides[slideIdx]?DATA.slides[slideIdx]:(DATA.slides&&DATA.slides[0])||'';
  const encodedSrc=src?encodeURI(src):'';
  panel.style.backgroundImage=encodedSrc?`url('${encodedSrc}')`:'none';
  // Ensure panel refreshes once image is fully loaded (handles first-visit cache miss)
  // Fix: same-URL set doesn't trigger repaint → clear first then rAF; also handle img.complete case
  if(encodedSrc){const _img=new Image();const _si=sceneIdx;const _refresh=()=>{if(sceneIdx===_si&&panel.isConnected){panel.style.backgroundImage='none';void panel.offsetHeight;panel.style.backgroundImage=`url('${encodedSrc}')`;}};_img.onload=_refresh;_img.src=encodedSrc;if(_img.complete)_refresh();}
  const charMap={};DATA.characters.forEach(c=>{charMap[c.id]=c;});
  const ch=charMap[line.speaker]||{name:line.speaker};
  const cfg_def=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
  const cfg={bg:ch.color||cfg_def.bg,emoji:ch.emoji||cfg_def.emoji};
  const tagHtml=line.speech_type&&line.speech_type!=='narrator'?`<span class="caption-tag ${line.speech_type==='반말'?'tag-banmal':'tag-jondaemal'}">${line.speech_type}</span>`:'';
  document.getElementById('scene-caption').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="caption-avatar" style="background:${cfg.bg}">${cfg.emoji}</div>
      <div class="caption-name">${esc(ch.name)}</div>
    </div>
    <div class="caption-body" style="flex:1">
      <div class="caption-kr">${buildAnnoText(line.text, line.annotation)}</div>
      <div class="caption-en">${esc(line.en||line.translation||'')}</div>
      ${tagHtml}

    </div>
`;
  const total=DATA.script.length;
  document.getElementById('nav-steps').innerHTML=DATA.script.map((_,i)=>`<div class="nav-step${i<=sceneIdx?' done':''}"></div>`).join('');
  document.getElementById('nav-count').textContent=`${sceneIdx+1} / ${total}`;
  document.getElementById('nav-prev').disabled=sceneIdx===0;
  document.getElementById('nav-next').disabled=sceneIdx===total-1;
  const sb=document.getElementById('speak-btn');
  if(sb){nhsRecCleanup();sb.textContent='🎙️';sb.title='따라녹음하기';sb.classList.remove('listening','rec-on');sb.classList.add('rec-done');sb.disabled=false;}
  nhsShadStop();
  const _sr=document.getElementById('shad-result');if(_sr){_sr.style.display='none';_sr.innerHTML='';}
  updateStripHighlight();
}

function moveScene(dir){
  const next=sceneIdx+dir;
  if(next<0||next>=DATA.script.length)return;
  sceneIdx=next;renderScene();
}

function jumpScene(i){
  sceneIdx=i;renderScene();
}

function speakCurrent(){
  if(!DATA)return;
  const line=DATA.script[sceneIdx];speak(line.text,line.audio);
}

function randomScene(){
  const total=DATA.script.length;
  let next;
  do{next=Math.floor(Math.random()*total);}while(next===sceneIdx&&total>1);
  sceneIdx=next;renderScene();
}

function toggleStrip(){
  const strip=document.getElementById('script-strip');
  const btn=document.getElementById('strip-toggle-btn');
  const isOpen=strip.classList.toggle('open');
  if(btn){isOpen?btn.classList.add('open'):btn.classList.remove('open');}
  if(isOpen&&!strip.innerHTML)buildStrip();
}

function buildStrip(){
  const strip=document.getElementById('script-strip');
  if(!strip)return;
  strip.innerHTML=DATA.script.map((line,i)=>{
    const cfg=CHAR_CFG[line.speaker]||CHAR_CFG.narrator;
    const _sShadEsc=line.text.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return `<div class="strip-row${i===sceneIdx?' current':''}">
      <div class="strip-avatar" onclick="jumpScene(${i});updateStripHighlight()">${cfg.emoji}</div>
      <div style="flex:1;min-width:0;" onclick="jumpScene(${i});updateStripHighlight()"><div class="strip-kr">${esc(line.text)}</div><div class="strip-en">${esc(line.en||line.translation||'')}</div></div>
      <button class="shad-strip-btn" id="shad-s${i}" data-target="${_sShadEsc}" data-idx="${i}" onclick="nhsShadLine(event,this.dataset.target,parseInt(this.dataset.idx))" title="따라 말하기">🎤</button>
    </div><div class="shad-strip-result" id="shad-sr${i}"></div>`;
  }).join('');
}

function updateStripHighlight(){
  document.querySelectorAll('.strip-row').forEach((el,i)=>el.classList.toggle('current',i===sceneIdx));
}

// ── AUDIO ──────────────────────────────────────────────
function speak(text,audioSrc){
  if(audioSrc){
    if(_audio){_audio.pause();_audio=null;}
    _audio=new Audio(audioSrc);
    _audio.play().catch(()=>speakTTS(text));
  }else{
    speakTTS(text);
  }
}
// ── AUTO-PLAY ───────────────────────────────────────────
let _autoPlay=false,_apTimer=null;

function autoPlayToggle(){
  if(_autoPlay){autoPlayStop();return;}
  _autoPlay=true;
  const btn=document.getElementById('ap-btn');
  if(btn){btn.textContent='⏹ 정지';btn.style.background='var(--coral)';}
  autoPlayStep();
}

function autoPlayStop(){
  _autoPlay=false;
  if(_apTimer){clearTimeout(_apTimer);_apTimer=null;}
  if(_audio){_audio.pause();_audio=null;}
  if(window.speechSynthesis)speechSynthesis.cancel();
  const btn=document.getElementById('ap-btn');
  if(btn){btn.textContent='▶▶ 자동 재생';btn.style.background='var(--teal)';}
}

function autoPlayStep(){
  if(!_autoPlay||!DATA)return;
  const line=DATA.script[sceneIdx];
  const total=DATA.script.length;
  const onEnd=()=>{
    if(!_autoPlay)return;
    if(sceneIdx>=total-1){autoPlayStop();return;}
    _apTimer=setTimeout(()=>{if(!_autoPlay)return;moveScene(1);autoPlayStep();},700);
  };
  if(line.audio){
    if(_audio){_audio.pause();_audio=null;}
    _audio=new Audio(line.audio);
    _audio.onended=onEnd;
    _audio.play().catch(()=>_apTTS(line.text,onEnd));
  }else{
    _apTTS(line.text,onEnd);
  }
}

function _apTTS(text,onEnd){
  if(!window.speechSynthesis){onEnd();return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.88;u.onend=onEnd;
  const go=()=>{const v=speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;});
}

function speakTTS(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.88;
  const go=()=>{const v=speechSynthesis.getVoices().find(v=>v.lang==='ko-KR');if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=()=>{go();speechSynthesis.onvoiceschanged=null;});
}
function stopTTS(){ if(window.speechSynthesis) speechSynthesis.cancel(); }

function buildGrammar(){
  if(!DATA.grammar||!DATA.grammar.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return DATA.grammar.map(g=>{
    // rule_boxes — color-coded rule cards (red=warning, blue=pattern, green=tip, amber=note)
    const ruleBoxHtml=(g.rule_boxes||[]).map(rb=>{
      const colors={red:'#FFF0F0',blue:'#F0F6FF',green:'#EDF7F2',amber:'#FFFBF0'};
      const borders={red:'#F4A0A0',blue:'#A0C4F4',green:'#A8D8B5',amber:'#F0C980'};
      const textColors={red:'#C0392B',blue:'#1A5C9E',green:'#2E7D52',amber:'#7A5500'};
      const t=rb.type||'blue';
      return`<div style="background:${colors[t]||colors.blue};border-left:4px solid ${borders[t]||borders.blue};border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-bottom:8px">

function checkFill(id){
  const container=document.getElementById(id);
  if(!container)return;
  const inputs=container.querySelectorAll('.gram-blank');
  let correct=0;
  inputs.forEach(inp=>{
    const ans=(inp.dataset.answer||'').trim();
    const val=inp.value.trim();
    if(val===ans){inp.style.borderBottomColor='#16A34A';inp.style.color='#16A34A';correct++;}
    else{inp.style.borderBottomColor='#E74C3C';inp.style.color='#E74C3C';}
  });
  const res=document.getElementById(id+'-res');
  if(res){
    res.textContent=correct===inputs.length?`${correct}/${inputs.length} 🎉 완벽해요!`:`${correct}/${inputs.length} 다시 해봐요 😊`;
    res.className='gram-fill-result '+(correct===inputs.length?'ok':'ng');
  }
}

// ── QUIZ ───────────────────────────────────────────────
function _buildQuizTabBar(){
  const epKey=`${DATA.level}_${DATA.id}`;

  const hasSp=!!(SP_QUIZ_POOL[epKey]);

    {id:'quiz',label:'✏️ 객관식'},
    ...(hasRd?[{id:'reading',label:'📖 읽기'}]:[]),

function buildQuiz(){
  if(!DATA.quiz||!DATA.quiz.length)return'<div class="loading">데이터 준비 중이에요.</div>';
  return`<div style="max-width:580px">${_buildQuizTabBar()}<div id="quiz-content"></div></div>`;
}
function renderQuizQ(){
  const total=DATA.quiz.length;
  const qi=quizIdx;
  if(qi>=total){renderQuizScore();return;}
  const q=DATA.quiz[qi];
  const dots=Array.from({length:total},(_,i)=>`<div class="quiz-prog-dot${i<qi?' done':i===qi?' current':''}"></div>`).join('');

  // 각 문항의 type 자동 판별:
  // - audio_text 있음 → 듣기 형식 (🔊 버튼 + 선택지)
  // - audio_text 없음 → 일반 객관식 (질문 + 영어 + 선택지)
  const isListen = !!q.audio_text;

  const opts=(q.options||q.choices||[]).map((opt,oi)=>`
    <button class="quiz-opt" id="qopt-${oi}" onclick="answerMC(${oi},${qi})">
      <span style="font-weight:700;color:var(--teal-md);margin-right:7px">${oi+1}.</span>${esc(opt)}
    </button>`).join('');

  let inner='';
  if(isListen){
    inner=`<div class="quiz-listen-wrap" style="margin-bottom:18px;">
        <div style="font-size:12px;color:var(--teal);margin-bottom:10px">🔊 음성을 듣고 맞는 답을 고르세요 · Listen and choose</div>
        <button class="quiz-listen-btn" onclick="speakTTS('${escA(q.audio_text)}')">🔊 듣기</button>
      </div>
      <div class="quiz-opts">${opts}</div>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  } else {
    inner=`<div class="quiz-opts">${opts}</div>
      <div class="quiz-exp" id="quiz-exp"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuizQ()">${qi+1<total?'다음 문제 →':'결과 보기 🎉'}</button>`;
  }

  // 질문 표시: listen은 지시문 작게 (음성 듣기가 메인), mc는 질문 메인
  const qTextStyle = isListen ? 'font-size:12px;color:var(--warm-400);margin-bottom:4px;' : 'margin-bottom:4px;';
  const qEnHtml = (!isListen && q.question_en)
    ? `<div class="quiz-q-en">${esc(q.question_en)}</div>` : '';

  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-progress">
      <div class="quiz-prog-dots">${dots}</div>
      <div style="font-size:11.5px;color:var(--warm-500);margin-left:4px">${qi+1} / ${total}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-q-num">문제 ${qi+1}</div>
      <div class="quiz-q-text" style="${qTextStyle}">${esc(q.question_ko||q.question||'')}</div>
      ${qEnHtml}
      ${inner}
    </div>`;
}
function answerMC(chosen,qi){
  const q=DATA.quiz[qi];
  const correct=q.answer;
  const hint=q.explanation||'';
  for(let i=0;i<10;i++){
    const el=document.getElementById(`qopt-${i}`);
    if(!el)break;
    el.classList.add('locked');
    if(i===correct)el.classList.add('correct');
    else if(i===chosen)el.classList.add('wrong');
  }
  if(chosen===correct)quizScore++;
  showQuizExp(hint);
}
function checkWriteAnswer(qi){
  const q=DATA.quiz[qi];
  const correctText=q.audio_text||(q.options||[])[q.answer]||'';
  const hint=q.explanation||'';
  const input=document.getElementById('quiz-write-input');
  if(!input)return;
  const val=(input.value||'').trim().replace(/\s+/g,' ');
  const exp=correctText.trim().replace(/\s+/g,' ');
  const ok=val===exp||(val&&exp&&exp.includes(val))||val.toLowerCase()===exp.toLowerCase();
  input.disabled=true;
  input.style.borderColor=ok?'var(--teal-md)':'var(--coral)';
  input.style.background=ok?'#EDF7F2':'#FFF0F0';
  if(ok)quizScore++;
  const fullHint=(ok?'✅ 정답! ':'❌ 오답. 정답: '+correctText+'\n')+hint;
  showQuizExp(fullHint);
}
function showQuizExp(hint){
  const exp=document.getElementById('quiz-exp');
  const btn=document.getElementById('quiz-next');
  if(exp&&hint){exp.textContent='💡 '+hint;exp.classList.add('show');}
  if(btn)btn.classList.add('show');
}
function nextQuizQ(){
  quizIdx++;
  renderQuizQ();
}
function renderQuizScore(){
  const total=DATA.quiz.length;
  const pct=Math.round(quizScore/total*100);
  const msg=pct===100?'🏆 완벽해요!':pct>=80?'🌟 잘했어요!':pct>=60?'👍 좋아요!':'💪 다시 도전!';
  const epKey=`${DATA.level}_${DATA.id}`;
  const rdPool=READING_POOL[epKey]||null;
  const spPool=SP_QUIZ_POOL[epKey]||null;
  // If reading available: reading renders first, then reading→complete triggers spacing
  // If no reading but spacing: spacing renders immediately
  const rdSection=rdPool?'<div id="rd-wrap" style="margin-top:24px;"></div>':'';
  const spSection=(!rdPool&&spPool)?'<div id="spq-wrap" style="margin-top:28px;"></div>':'';
  // ── Progress tracking ──
  _markEpDone(`${DATA.level}_${DATA.id}`);

  const _profileNudge=_hasProfile?'':'<div style="font-size:12px;color:var(--warm-400);margin-top:12px;">💡 My Notes 프로필을 만들면 진도가 저장돼요!</div>';
  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-score-wrap">
      <div class="quiz-score-num">${quizScore}<span style="font-size:24px;color:var(--warm-500)">/${total}</span></div>
      <div class="quiz-score-lbl">${msg}</div>
      <div style="font-size:13px;color:var(--warm-500);margin-top:8px">${pct}% 정답</div>
      <button class="quiz-retry-btn" onclick="resetQuiz()">↺ 다시 풀기</button>
    ${_profileNudge}
    </div>${rdSection}${spSection}`;
  if(rdPool){ _rdPool=rdPool; _rdQIdx=0; _rdAnswered=0; _rdRender(); }
  else if(spPool){ _spqPool=spPool; _spqIdx=0; _spqClicked=[]; _spqRender(); }
}
function setQuizMode(mode){
  quizMode=mode;
  quizIdx=0;quizScore=0;
  const epKey=`${DATA.level}_${DATA.id}`;
  const panel=document.getElementById('panel-quiz');
  if(mode==='reading'){
    const rdPool=READING_POOL[epKey]||null;
    if(!rdPool){panel.innerHTML='<div class="loading">읽기 데이터가 없어요.</div>';return;}

let READING_POOL = {}; const _rdPoolReady = fetch('data/nhs/reading_pool.json').then(r=>r.json()).then(d=>{READING_POOL=d;}).catch(e=>{});
let SHARED_SETS = {}; const _sharedSetsReady = fetch('data/nhs/shared_expression_sets.json').then(r=>r.json()).then(d=>{SHARED_SETS=d;}).catch(e=>{});
// 여러 에피소드가 재사용하는 표현 세트({"ref":"set_name"}) 해석 — vocab/usage 배열 안에서 ref 항목을 실제 데이터로 치환
function _resolveRefs(data){
  if(!data) return data;
  ['vocab','usage'].forEach(key=>{
    if(Array.isArray(data[key])){
      data[key]=data[key].flatMap(entry=>{
        if(entry&&entry.ref){
          const shared=SHARED_SETS[entry.ref];
          return (shared&&shared[key])?[shared[key]]:[];
        }
        return [entry];
      });
    }
  });
  return data;
}

let _rdPool=null, _rdQIdx=0, _rdAnswered=0;

function _rdRender(){

  if(!wrap||!_rdPool) return;

      +'<div style="background:#fff;border-radius:10px;padding:14px 16px;font-size:15px;line-height:1.85;color:#2E3B2E;margin-bottom:14px;border:1px solid #C8E6C9;font-family:\'Noto Serif KR\',serif;">'+d.passage+'</div>'
      +'<div style="font-size:11px;color:#81C784;margin-bottom:14px;font-style:italic;">'+d.passage_en+'</div>'

    +'<div id="rd-opts" style="display:flex;flex-direction:column;gap:8px;">'
    +q.options.map((opt,i)=>'<button class="rd-opt" onclick="_rdChoose('+i+')" data-i="'+i+'" style="background:#fff;border:2px solid #C8E6C9;border-radius:10px;padding:11px 14px;font-size:14px;cursor:pointer;text-align:left;transition:all 0.15s;color:#2E3B2E;">'+opt+'</button>').join('')
    +'</div>'
    +'<div id="rd-fb" style="min-height:28px;margin-top:10px;"></div>'
    +'</div>';
}

function _rdChoose(idx){
  const q=_rdPool.questions[_rdQIdx];
  const opts=document.querySelectorAll('.rd-opt');
  opts.forEach(b=>b.style.pointerEvents='none');
  const correct=idx===q.answer;
  opts[idx].style.background=correct?'#C8E6C9':'#FFCDD2';
  opts[idx].style.borderColor=correct?'#4CAF50':'#EF9A9A';
  opts[q.answer].style.background='#C8E6C9';
  opts[q.answer].style.borderColor='#4CAF50';
  const fb=document.getElementById('rd-fb');
  if(fb) fb.innerHTML=correct
    ?'<span style="color:#2E7D32;font-weight:700;">✅ 정답이에요!</span>'
    :'<span style="color:#C62828;font-weight:700;">❌ 다시 봐요!</span>';
  _rdAnswered++;
  setTimeout(()=>{
    if(_rdQIdx+1<_rdPool.questions.length){ _rdQIdx++; _rdRender(); }
    else { _rdComplete(); }
  }, 1100);
}

function _rdComplete(){
  const wrap=document.getElementById('rd-wrap');
  if(wrap){
    wrap.innerHTML+='<div style="text-align:center;margin-top:14px;font-size:15px;font-weight:700;color:#2E7D32;">🎉 읽기 완료! Great job!</div>';
  }
  const epKey=`${DATA.level}_${DATA.id}`;

  if(spPool){

      spDiv.style.marginTop='24px';
      qcontent.appendChild(spDiv);

    _spqPool=spPool; _spqIdx=0; _spqClicked=[]; _spqRender();

}

// ── QUIZ SPACING GAME ────────────────────────────────
let SP_QUIZ_POOL = {}; const _spPoolReady = fetch('data/nhs/spacing_pool.json').then(r=>r.json()).then(d=>{SP_QUIZ_POOL=d;}).catch(e=>{});

let _spqPool=null, _spqIdx=0, _spqClicked=[];

function _spqRender(){
  const wrap=document.getElementById('spq-wrap');
  if(!wrap||!_spqPool) return;
  if(_spqIdx>=_spqPool.length){ _spqDone(); return; }
  const d=_spqPool[_spqIdx];
  const chars=[...d.chars];
  _spqClicked=new Array(chars.length+1).fill(false);
  let charHtml='<span class="spq-gap" data-i="0"></span>';
  for(let i=0;i<chars.length;i++){
    charHtml+=`<span class="spq-char">${chars[i]}</span>`;
    if(i<chars.length-1)
      charHtml+=`<span class="spq-gap" data-i="${i+1}" onclick="_spqToggle(${i+1})"></span>`;
  }
  const pct=Math.round((_spqIdx/_spqPool.length)*100);
  wrap.innerHTML=
    '<div style="background:linear-gradient(135deg,#E8F5E9,#F0FFF4);border:2px solid #81C784;border-radius:18px;padding:20px 16px;">'+
    '<div style="font-size:0.9rem;font-weight:700;color:#2E7D32;margin-bottom:4px;text-align:center;">📏 띄어쓰기 연습 · Word Spacing Bonus</div>'+
    '<div style="font-size:0.75rem;color:#888;text-align:center;margin-bottom:8px;">'+(_spqIdx+1)+' / '+_spqPool.length+'</div>'+
    '<div style="height:5px;background:#C8E6C9;border-radius:5px;margin-bottom:14px;overflow:hidden;">'+
      '<div style="height:100%;width:'+pct+'%;background:#43A047;border-radius:5px;transition:width .4s;"></div>'+
    '</div>'+
    '<div style="background:#fff9;border-radius:10px;padding:7px 14px;margin-bottom:12px;font-size:0.82rem;color:#555;text-align:center;">'+
      '🇺🇸 '+d.en+
    '</div>'+
    '<div id="spq-chars" style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0;font-family:\'Noto Serif KR\',serif;font-size:1.45rem;font-weight:700;color:#1B5E20;margin:12px 0;min-height:46px;">'+
      charHtml+
    '</div>'+
    '<div id="spq-fb" style="min-height:22px;text-align:center;font-size:0.85rem;margin-bottom:10px;"></div>'+
    '<div style="display:flex;gap:8px;justify-content:center;">'+
      '<button onclick="_spqHint()" style="padding:7px 18px;background:white;border:2px solid #81C784;color:#2E7D32;border-radius:20px;font-size:0.82rem;cursor:pointer;">💡 힌트</button>'+
      '<button onclick="_spqCheck()" style="padding:7px 18px;background:#43A047;color:white;border:none;border-radius:20px;font-size:0.82rem;cursor:pointer;">✅ 확인</button>'+
    '</div>'+
    '</div>';
}
function _spqToggle(i){
  _spqClicked[i]=!_spqClicked[i];
  document.querySelectorAll('#spq-chars .spq-gap').forEach(g=>{
    const gi=parseInt(g.dataset.i);
    if(gi===0) return;
    g.innerHTML=_spqClicked[gi]
      ? '<span style="display:inline-block;width:9px;height:26px;background:#A5D6A7;border-radius:3px;vertical-align:middle;"></span>'
      : '';
  });
  const fb=document.getElementById('spq-fb');
  if(fb) fb.innerHTML='';
}
function _spqHint(){
  const d=_spqPool[_spqIdx];
  const fb=document.getElementById('spq-fb');
  if(fb) fb.innerHTML='<span style="color:#2E7D32;">💡 '+d.hint+'</span>';
}
function _spqCheck(){
  const d=_spqPool[_spqIdx];
  const chars=[...d.chars];
  const correct=d.spaces;
  let ok=true;
  for(let i=1;i<chars.length;i++){
    if(correct.includes(i)!==!!_spqClicked[i]){ok=false;break;}
  }
  const fb=document.getElementById('spq-fb');
  if(ok){
    if(fb) fb.innerHTML='<span style="color:#2E7D32;">🎉 정답! Correct!</span>';
    let word='';
    chars.forEach((c,i)=>{if(correct.includes(i)) word+=' '; word+=c;});
    const cd=document.getElementById('spq-chars');
    if(cd) cd.innerHTML='<span style="letter-spacing:3px;color:#1B5E20;">'+word.trim()+'</span>';
    setTimeout(()=>{ _spqIdx++; _spqClicked=[]; _spqRender(); },1300);
  } else {
    if(fb) fb.innerHTML='<span style="color:var(--coral);">🔄 다시! Try again!</span>';
    setTimeout(()=>{
      _spqClicked=new Array(chars.length+1).fill(false);
      document.querySelectorAll('#spq-chars .spq-gap').forEach(g=>{ if(parseInt(g.dataset.i)>0) g.innerHTML=''; });
      const f=document.getElementById('spq-fb'); if(f) f.innerHTML='';
    },900);
  }
}
function _spqDone(){
  const wrap=document.getElementById('spq-wrap');
  if(!wrap) return;
  wrap.innerHTML=

// ── PRONUNCIATION ─────────────────────────────────────
function buildPron(){
  let _pron=DATA.pronunciation;
  if(_pron&&!Array.isArray(_pron)&&_pron.items){_pron=(_pron.items||[]).map(p=>({title:p.word||p.rule||p.title||'',rule:p.actual||'',tip:p.note||p.tip||'',examples:(p.examples||[]).map(ex=>({before:ex.written||ex.before||ex.ko||'',after:ex.pronounced||ex.pronounced_standard||ex.pronounced_actual||ex.after||'',pronounced_standard:ex.pronounced_standard||ex.pronounced||ex.after||'',pronounced_actual:ex.pronounced_actual||ex.pronounced||ex.after||'',note:ex.note||ex.en||''}))}));}
  const items=Array.isArray(_pron)?_pron:[];
  if(!items.length){
    // 문법에서 발음·불규칙 관련 자동 추출
    const keywords=['불규칙','발음','pronunciation','irregular','받침','연음','liaison'];
    const auto=(DATA.grammar||[]).filter(g=>{
      const txt=((g.title||'')+(g.explanation_en||'')).toLowerCase();
      return keywords.some(k=>txt.includes(k));
    });
    if(!auto.length)return`<div style="text-align:center;padding:40px;color:var(--warm-500)">
      <div style="font-size:36px;margin-bottom:10px">🔤</div>
      <div style="font-size:13px">이 에피소드의 발음 내용은 준비 중이에요.<br>JSON에 <code>pronunciation</code> 배열을 추가하면 표시됩니다.</div></div>`;
    return`<div style="font-size:12px;color:var(--warm-500);margin-bottom:12px">📌 문법에서 발음·불규칙 관련 항목을 자동으로 가져왔어요</div>`+
      auto.map(g=>`<div class="gram-card">
        <div class="gram-title">${esc(g.title)}</div>
        <div class="gram-exp">${esc(g.explanation_en)}</div>
        ${g.rule?`<div class="gram-rule">📐 ${esc(g.rule)}</div>`:''}
        <ul class="gram-ex-list">${(g.examples||[]).slice(0,3).map(ex=>`<li class="gram-ex">
          <div class="gram-ko">${esc(ex.ko)} <button onclick="speakTTS('${escA(ex.ko)}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5">🔊</button></div>
          <div class="gram-en">${esc(ex.en)}</div></li>`).join('')}</ul>
      </div>`).join('');
  }
  return items.map(item=>{
    // 세종 스타일 테이블 (선택적)
    const pronTableHtml=item.table?`<div class="gram-table-wrap" style="margin-top:10px"><table class="gram-table">
      <thead><tr>${(item.table.columns||[]).map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${(item.table.rows||[]).map(r=>`<tr>${r.map((cell,ci)=>
        ci===1
          ? `<td><span style="font-family:var(--font-serif);font-weight:700;color:var(--coral)">${esc(cell)}</span> <button onclick="speakTTS('${escA(cell.replace(/[\[\]]/g,''))}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5">🔊</button></td>`
          : ci===2
            ? `<td style="color:var(--blue);font-weight:600">${esc(cell)}</td>`
            : `<td style="font-family:var(--font-serif);font-weight:700">${esc(cell)}</td>`
      ).join('')}</tr>`).join('')}</tbody>
    </table></div>`:'';
    // 기존 before→after 예문 (선택적)
    const pronExHtml=(item.examples||[]).map(ex=>{
      const written=ex.written||ex.before||ex.ko||'';
      const hasCompare=ex.pronounced_standard||ex.pronounced_actual;
      if(hasCompare){
        const std=ex.pronounced_standard||'';
        const act=ex.pronounced_actual||'';
        const same=std===act;
        return`<div class="pron-ex">
          <div class="pron-before">${esc(written)}</div>
          <div class="pron-arrow">→</div>
          <div style="flex:1">
            ${same
              ? `<div class="pron-after">${esc(std)} <button onclick="speakTTS('${escA(std.replace(/[\[\]]/g,''))}')" style="background:none;border:none;font-size:12px;cursor:pointer;opacity:.5">🔊</button></div>`
              : `<div style="display:flex;flex-direction:column;gap:4px">
                  <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:10px;font-weight:700;color:var(--teal);min-width:44px">🎓 표준</span>
                    <span class="pron-after" style="margin:0">${esc(std)}</span>
                    <button onclick="speakTTS('${escA(std.replace(/[\[\]]/g,''))}')" style="background:none;border:none;font-size:12px;cursor:pointer;opacity:.5">🔊</button>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:10px;font-weight:700;color:var(--coral);min-width:44px">🗣️ 실제</span>
                    <span class="pron-after" style="margin:0;color:var(--coral)">${esc(act)}</span>
                    <button onclick="speakTTS('${escA(act.replace(/[\[\]]/g,''))}')" style="background:none;border:none;font-size:12px;cursor:pointer;opacity:.5">🔊</button>
                  </div>
                </div>`
            }
            <div class="pron-note">${esc(ex.note||'')}</div>
          </div>
        </div>`;
      }
      return`<div class="pron-ex">
        <div class="pron-before">${esc(written)}</div>
        <div class="pron-arrow">→</div>
        <div class="pron-after">${esc(ex.after||ex.pronounced||'')} <button onclick="speakTTS('${escA((ex.after||ex.pronounced||'').replace(/[\[\]]/g,''))}')" style="background:none;border:none;font-size:12px;cursor:pointer;opacity:.5">🔊</button></div>
        <div class="pron-note">${esc(ex.note||ex.en||'')}</div>
      </div>`;
    }).join('');
    return`<div class="pron-card">
      <div class="pron-title">${esc(item.title||'')} ${item.icon||''}</div>
      <div class="pron-rule">${esc(item.rule||'')}</div>
      ${pronTableHtml}
      ${pronExHtml}
      ${item.tip?`<div style="margin-top:12px;background:var(--amber-lt);border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:var(--warm-700)">💡 ${esc(item.tip)}</div>`:''}
    </div>`;
  }).join('');
}

// ── USAGE ──────────────────────────────────────────────

// Real Life comprehension quiz helper
const rlAnswered={};
function buildRLQuiz(questions,prefix){
  if(!questions||!questions.length)return'';
  return`<div style="margin-top:12px">${questions.map((q,i)=>{
    const key=`${prefix}_${i}`;
    const opts=(q.options||[]).map((opt,oi)=>`
      <li id="rlopt-${key}-${oi}" onclick="answerRL('${key}',${i},${oi},${q.answer},'${escA(q.explanation||'')}','${prefix}')"
          style="list-style:none;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--warm-300);margin-bottom:5px;cursor:pointer;font-size:12.5px;transition:background .15s">
        <span style="font-weight:700;color:var(--teal-md);margin-right:6px">${oi+1}.</span>${esc(opt)}
      </li>`).join('');
    return`<div style="margin-bottom:14px">
      <div style="font-size:12.5px;font-weight:700;color:var(--warm-900);margin-bottom:6px">${i+1}. ${esc(q.question_ko||q.question||'')}</div>
      ${q.question_en?`<div style="font-size:11px;color:var(--warm-500);margin-bottom:6px">${esc(q.question_en)}</div>`:''}
      <ul style="padding:0;margin:0">${opts}</ul>
      <div id="rlexp-${key}" style="font-size:12px;color:var(--sage);padding:8px 12px;background:#EDF7F2;border-radius:var(--radius-sm);display:none"></div>
    </div>`;
  }).join('')}</div>`;
}
function answerRL(key,qi,chosen,correct,hint,prefix){
  if(rlAnswered[`${key}`])return;
  rlAnswered[`${key}`]=true;
  const isCorrect=(chosen===correct);
  for(let i=0;i<10;i++){
    const el=document.getElementById(`rlopt-${key}-${i}`);
    if(!el)break;
    el.style.pointerEvents='none';
    if(i===correct){
      el.style.background='#D4F5E2';el.style.border='2px solid #2ECC71';
      el.style.fontWeight='700';
      const mk=document.createElement('span');mk.textContent=' ✓';mk.style.color='#27AE60';mk.style.fontWeight='900';el.appendChild(mk);
    } else if(i===chosen){
      el.style.background='#FDDEDE';el.style.border='2px solid #E74C3C';
      const xk=document.createElement('span');xk.textContent=' ✗';xk.style.color='#C0392B';xk.style.fontWeight='900';el.appendChild(xk);
    }
  }
  const exp=document.getElementById(`rlexp-${key}`);
  if(exp){
    exp.innerHTML=(isCorrect?'<span style="color:#27AE60;font-weight:700">🎉 정답!</span> ':'<span style="color:#C0392B;font-weight:700">❌ 틀렸어요.</span> ')+(hint?'💡 '+hint:'');
    exp.style.display='block';
    exp.style.background=isCorrect?'#EBF9F1':'#FEECEC';
    exp.style.border=isCorrect?'1px solid #2ECC71':'1px solid #E74C3C';
    exp.style.padding='10px 14px';exp.style.fontSize='13px';exp.style.fontWeight='500';
  }
}

async function loadEpAndTab(epKey, tabName){
  closeIndex();
  // epKey may be 'L1_ep01' or 'L2_ep01' or plain 'ep01'
  const parts=epKey.split('_');
  const level=(parts.length>=2)?parts[0]:'L1';
  const epId=(parts.length>=2)?parts.slice(1).join('_'):epKey;
  await _doLoadEp(epId, level);
  showTab(tabName);
}

function getEpLabel(epKey){
  // epKey = 'L1_ep01' or 'L2_ep01'
  const ep=EPISODE_DATA[epKey]||EPISODE_DATA['L1_'+epKey]||EPISODE_DATA['L2_'+epKey];
  const parts=(epKey||'').split('_');
  const level=(parts.length>=2)?parts[0]:(ep?ep.level||'L1':'L1');
  const epId=(parts.length>=2)?parts.slice(1).join('_'):epKey;
  const num=(epId||'').replace('ep','');
  const lvlMap={'초급':'L1','중급':'L2','고급':'L3','기초':'Basics'};
  const lbl=lvlMap[level]||level;
  return lbl+' · ep'+num;
}

// ── 국어사전 정렬 (Unicode 코드포인트 기반, 한글 블록이 ㄱㄴㄷ 순으로 배열됨) ──
function _koCompare(a,b){
  for(let i=0;i<Math.min(a.length,b.length);i++){const d=a.charCodeAt(i)-b.charCodeAt(i);if(d!==0)return d;}
  return a.length-b.length;
}
// ── 초성(받침없는 자음) 추출 ──
function getOnset(ch){
  const c=(ch||'').charCodeAt(0);
  if(c<0xAC00||c>0xD7A3) return (ch||'#').toUpperCase();
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor((c-0xAC00)/588)];
}
let _idxPage=0; const _IDX_PG=30; let _idxFiltered=[];
function _idxGoPage(pg, onset){
  _idxPage=pg;
  _renderIdxVocabPage();
  // scroll to onset section after render
  if(onset){
    const body=document.getElementById('idx-body');
    if(!body)return;
    const hdrs=body.querySelectorAll('.idx-section-hdr');
    for(const h of hdrs){if(h.textContent.trim()===onset){h.scrollIntoView({block:'start'});body.scrollTop=body.scrollTop-8;break;}}
  }
}
function _renderIdxVocabPage(){
  const words=_idxFiltered;
  const total=words.length;
  const totalPg=Math.max(1,Math.ceil(total/_IDX_PG));
  _idxPage=Math.max(0,Math.min(_idxPage,totalPg-1));
  const slice=words.slice(_idxPage*_IDX_PG,(_idxPage+1)*_IDX_PG);
  // 초성별 섹션 헤더 + 단어
  let html='';
  let cur=null;
  slice.forEach(v=>{
    const o=getOnset((v.korean||'')[0]||'');
    if(o!==cur){cur=o;html+=`<div class="idx-section-hdr">${esc(o)}</div>`;}
    html+=`<div class="idx-vocab-row">
      <div class="idx-vocab-kr">${esc(v.korean||'')} ${v.emoji||''}</div>
      <div style="font-size:11px;color:var(--warm-500);min-width:90px">${esc(v.romanization||'')}</div>
      <div class="idx-vocab-en">${esc(v.english||v.en||'')}</div>
      <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(v.ep||'')}','vocab')">${esc(getEpLabel(v.ep||''))}</span>
      <button onclick="speakTTS('${escA(v.korean||'')}')" style="background:none;border:none;font-size:13px;cursor:pointer;opacity:.4">🔊</button>
    </div>`;
  });
  document.getElementById('idx-body').innerHTML=html||'<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';
  // 페이지 컨트롤 업데이트
  const pc=document.getElementById('idx-page-ctrl');
  if(pc){
    pc.style.display=totalPg>1?'flex':'none';
    pc.innerHTML=`<button class="idx-page-btn" onclick="_idxGoPage(${_idxPage-1})" ${_idxPage===0?'disabled':''}>◀</button>
      <span class="idx-page-info">${_idxPage+1} / ${totalPg}</span>
      <button class="idx-page-btn" onclick="_idxGoPage(${_idxPage+1})" ${_idxPage===totalPg-1?'disabled':''}>▶</button>`;
  }
}

function switchIdxTab(tab){
  idxTab=tab;
  document.querySelectorAll('.idx-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('idx-tab-'+tab).classList.add('active');
  document.getElementById('idx-search-input').value='';
  renderIdxBody();
}

function renderIdxBody(){
  const q=(document.getElementById('idx-search-input').value||'').toLowerCase();
  const body=document.getElementById('idx-body');
  if(!body)return;

  // 전체 에피소드 데이터 수집
  const allEps=Object.values(EPISODE_DATA).filter(ep=>ep&&ep.id);

  if(idxTab==='vocab'){
    // 전체 단어 수집
    let allWords=[];
    allEps.forEach(ep=>{
      const vocab=ep.vocab||[];
      const isGrouped=vocab.length>0&&vocab[0].items;
      if(isGrouped){
        vocab.forEach(g=>g.items.forEach(v=>allWords.push({...v,ep:(ep.level||'L1')+'_'+ep.id,epTitle:ep.title})));
      } else {
        vocab.forEach(v=>allWords.push({...v,ep:(ep.level||'L1')+'_'+ep.id,epTitle:ep.title}));
      }
    });
    // 검색 필터 + 정렬
    if(q) allWords=allWords.filter(v=>(v.korean||'').toLowerCase().includes(q)||(v.english||v.en||'').toLowerCase().includes(q));
    allWords.sort((a,b)=>_koCompare(a.korean||'',b.korean||''));
    _idxFiltered=allWords;
    _idxPage=0;
    // 초성 점프바 구성
    const onsetPage={};
    allWords.forEach((w,i)=>{
      const o=getOnset((w.korean||'')[0]||'');
      if(!(o in onsetPage)) onsetPage[o]=Math.floor(i/_IDX_PG);
    });
    const jbar=document.getElementById('idx-jump-bar');
    if(jbar) jbar.innerHTML=Object.entries(onsetPage).map(([o,pg])=>
      `<button class="idx-jump-btn" onclick="_idxGoPage(${pg},'${o}')">${o}</button>`).join('');
    _renderIdxVocabPage();

  } else if(idxTab==='grammar'){
    let allGram=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>allGram.push({...g,ep:(ep.level||'L1')+'_'+ep.id,epTitle:ep.title}));
    });
    if(q) allGram=allGram.filter(g=>(g.title||'').toLowerCase().includes(q)||(g.explanation_en||'').toLowerCase().includes(q));
    let html='';
    if(!allGram.length){html='<div style="color:var(--warm-500);font-size:13px;text-align:center;padding:30px">검색 결과 없음</div>';}
    else{
      // 에피소드별 그룹
      const byEp={};
      allGram.forEach(g=>{
        if(!byEp[g.ep])byEp[g.ep]=[];
        byEp[g.ep].push(g);
      });
      Object.keys(byEp).sort().forEach(epKey=>{
        const ep=EPISODE_DATA[epKey]||allEps.find(e=>e.id===epKey);
        const epNum=(epKey||'').replace(/^(L1|L2|L3)_ep/,'');
        const lvlPart=(epKey||'').split('_')[0]||'L1';
        const lvlMap2={'초급':'L1','중급':'L2','고급':'L3'};
        const lvlLabel=lvlMap2[lvlPart]||lvlPart;
        html+=`<div class="idx-section-hdr">${esc(lvlLabel)} · EP.${esc(epNum)} ${esc(ep?ep.title:'')}</div>`;
        html+=byEp[epKey].map(g=>`
          <div class="idx-gram-row">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">${esc(g.icon||'📌')}</span>
              <div>
                <div class="idx-gram-title">${esc(g.title||'')} <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(g.ep||'')}','grammar')">${esc(getEpLabel(g.ep||''))}</span></div>
                ${g.rule?`<div class="idx-gram-rule">📐 ${esc(g.rule)}</div>`:''}
                <div style="font-size:11.5px;color:var(--warm-500);margin-top:2px">${esc(g.explanation_en||'')}</div>
              </div>
            </div>
          </div>`).join('');
      });
    }
    body.innerHTML=html;

  } else if(idxTab==='pron'){
    // 발음 — grammar 중 발음 관련 항목 + 불규칙 동사 패턴 자동 추출
    const pronKeywords=['불규칙','발음','pronunciation','irregular','받침','연음','liaison','sound'];
    let allPron=[];
    allEps.forEach(ep=>{
      (ep.grammar||[]).forEach(g=>{
        const txt=((g.title||'')+(g.explanation_en||'')).toLowerCase();
        if(pronKeywords.some(k=>txt.includes(k))){
          allPron.push({...g,ep:ep.id});
        }
      });
    });
    if(q) allPron=allPron.filter(g=>(g.title||'').toLowerCase().includes(q));
    let html='';
    if(!allPron.length){
      html=`<div style="text-align:center;padding:30px;color:var(--warm-500)">
        <div style="font-size:32px;margin-bottom:10px">🔤</div>
        <div style="font-size:13px">발음·불규칙 관련 문법 항목이 자동으로 표시돼요.<br>아직 해당 항목이 없거나 검색 결과가 없어요.</div>
      </div>`;
    } else {
      html=allPron.map(g=>`
        <div class="idx-pron-row">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <span style="font-size:18px">${esc(g.icon||'🔤')}</span>
            <div>
              <div class="idx-pron-word">${esc(g.title||'')} <span class="idx-ep-badge" style="cursor:pointer" onclick="loadEpAndTab('${escA(g.ep||'')}','pron')">${esc(getEpLabel(g.ep||''))}</span></div>
              ${g.rule?`<div class="idx-pron-note">📐 ${esc(g.rule)}</div>`:''}
              ${(g.examples||[]).slice(0,2).map(ex=>`<div style="font-size:12px;color:var(--warm-700);margin-top:3px">${esc(ex.ko)} <span style="color:var(--warm-500)">— ${esc(ex.en)}</span></div>`).join('')}
            </div>
          </div>
        </div>`).join('');
    }
    body.innerHTML=html;
  }
}

function combineSyl(onset,nucleus,coda){
  const onsets=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const nuclei=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const codas=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const oi=onsets.indexOf(onset),ni=nuclei.indexOf(nucleus),ci=codas.indexOf(coda||'');
  if(oi<0||ni<0||ci<0)return null;
  return String.fromCharCode(0xAC00+oi*21*28+ni*28+ci);
}

function updateSylResult(){
  const od=document.getElementById('syl-onset-display'),nd=document.getElementById('syl-nuc-display'),cd=document.getElementById('syl-coda-display');
  const rc=document.getElementById('syl-result-char'),rr=document.getElementById('syl-result-rom');

      rc.textContent=ch;

}

let _wuEpId=null, _wuLevel='L1', _wuQs=[], _wuIdx=0, _wuScore=0, _wuChosen=null;
const _wuSeen=new Set(); // session memory: epKeys already shown warm-up

async function loadEp(epId, level='L1'){
  const epKey=level+'_'+epId;
  if(_wuSeen.has(epKey)){ await _doLoadEp(epId,level); return; }
  const epNum=parseInt(epId.replace(/\D/g,''));
  const pool=(level==='L1')
    ? WARMUP_POOL.filter(q=>parseInt(q.ep.replace(/\D/g,''))<epNum)
    : WARMUP_POOL;
  if(pool.length>=3){
    _showWarmup(epId, level, pool);
  } else {
    await _doLoadEp(epId, level);
  }
}

function _showWarmup(epId, level, pool){
  _wuEpId=epId; _wuLevel=level; _wuIdx=0; _wuScore=0; _wuChosen=null;
  _wuQs=shuffleArr([...pool]).slice(0,3);
  const modal=document.getElementById('wu-modal');
  modal.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">'
    +'<div><div style="font-size:22px;font-weight:800;color:var(--gray-900);">🔥 빠른 복습</div>'
    +'<div style="font-size:12px;color:var(--warm-500);margin-top:3px;">Quick Review — before the episode</div></div>'
    +'<button onclick="_wuSkip()" style="background:var(--teal);color:#fff;border:none;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,128,128,0.25);">📽 바로 보기</button>'
    +'</div>'
    +'<div id="wu-dots" style="display:flex;gap:8px;margin-bottom:28px;"></div>'
    +'<div id="wu-body"></div>';
  document.getElementById('wu-overlay').classList.add('open');
  _renderWarmupQ();
}

function _renderWarmupQ(){
  const dots=document.getElementById('wu-dots');
  if(dots)dots.innerHTML=[0,1,2].map(i=>'<div style="flex:1;height:6px;border-radius:3px;background:'+(i<_wuIdx?'var(--teal)':i===_wuIdx?'var(--amber)':'var(--gray-200)')+'"></div>').join('');
  const body=document.getElementById('wu-body');
  if(!body)return;
  const q=_wuQs[_wuIdx];
  _wuChosen=null;
  body.innerHTML=
    '<div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">질문 '+(_wuIdx+1)+' / 3</div>'
    +'<div style="font-size:18px;font-weight:700;color:var(--gray-900);margin-bottom:22px;line-height:1.5;">'+q.q+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +q.choices.map((c,i)=>'<button id="wu-opt-'+i+'" onclick="_wuPick('+i+')" style="text-align:left;padding:13px 17px;border:2px solid var(--gray-200);border-radius:11px;background:#fff;font-size:15px;cursor:pointer;transition:background 0.15s,border-color 0.15s;font-weight:500;color:var(--gray-900);">'+String.fromCharCode(65+i)+'. '+c+'</button>').join('')
    +'</div>';
}

function _wuPick(idx){
  if(_wuChosen!==null)return;
  _wuChosen=idx;
  const q=_wuQs[_wuIdx];
  const correct=q.ans;
  for(let i=0;i<q.choices.length;i++){
    const btn=document.getElementById('wu-opt-'+i);
    if(!btn)continue;
    btn.disabled=true;
    if(i===correct){btn.style.background='#dcfce7';btn.style.borderColor='#22c55e';btn.style.color='#15803d';}
    else if(i===idx&&idx!==correct){btn.style.background='#fee2e2';btn.style.borderColor='#ef4444';btn.style.color='#dc2626';}
  }
  if(idx===correct)_wuScore++;
  setTimeout(()=>{_wuIdx++;_wuIdx>=3?_renderWarmupScore():_renderWarmupQ();},1300);
}

function _renderWarmupScore(){
  const dots=document.getElementById('wu-dots');
  if(dots)dots.innerHTML=[0,1,2].map(()=>'<div style="flex:1;height:6px;border-radius:3px;background:var(--teal);"></div>').join('');
  const body=document.getElementById('wu-body');
  if(!body)return;
  const em=_wuScore===3?'🏆':_wuScore===2?'🌟':'📚';
  const msg=_wuScore===3?'완벽해요! Perfect!':_wuScore===2?'잘했어요! Well done!':'복습이 도움 됐죠? Keep it up!';
  body.innerHTML='<div style="text-align:center;padding:16px 0 24px;">'
    +'<div style="font-size:60px;margin-bottom:14px;">'+em+'</div>'
    +'<div style="font-size:32px;font-weight:800;color:var(--gray-900);margin-bottom:8px;">'+_wuScore+' / 3</div>'
    +'<div style="font-size:14px;color:var(--warm-600);margin-bottom:28px;">'+msg+'</div>'
    +'<button onclick="_wuGo()" style="background:var(--teal);color:#fff;border:none;border-radius:11px;padding:15px 38px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,128,128,0.3);">에피소드 시작 →</button>'
    +'</div>';
}

function _wuCloseModal(){ document.getElementById('wu-overlay').classList.remove('open'); }
async function _wuGo(){ _wuCloseModal(); _wuSeen.add(_wuLevel+'_'+_wuEpId); await _doLoadEp(_wuEpId,_wuLevel); }
async function _wuSkip(){ _wuCloseModal(); _wuSeen.add(_wuLevel+'_'+_wuEpId); await _doLoadEp(_wuEpId,_wuLevel); }

function _nmsProfile(){ return localStorage.getItem('nms_current')||''; }
function _fcCardId(c){ return c.epId+'_'+c.korean; }
function _fcReviewSet(){
  const p=_nmsProfile(); if(!p) return new Set();
  return new Set(JSON.parse(localStorage.getItem('nms_'+p+'_fc_review')||'[]'));
}
function _fcKnownSet(){
  const p=_nmsProfile(); if(!p) return new Set();
  return new Set(JSON.parse(localStorage.getItem('nms_'+p+'_fc_known')||'[]'));
}
function _fcMark(card, isReview){
  const p=_nmsProfile(); if(!p) return;
  const rev=_fcReviewSet(), kn=_fcKnownSet(), id=_fcCardId(card);
  if(isReview){ rev.add(id); kn.delete(id); }
  else{ kn.add(id); rev.delete(id); }
  localStorage.setItem('nms_'+p+'_fc_review', JSON.stringify([...rev]));
  localStorage.setItem('nms_'+p+'_fc_known',  JSON.stringify([...kn]));
}
function _epDoneSet(){
  const p=_nmsProfile(); if(!p) return new Set();
  return new Set(JSON.parse(localStorage.getItem('nms_'+p+'_ep_done')||'[]'));
}
function _markEpDone(epKey){
  const p=_nmsProfile(); if(!p) return;
  const done=_epDoneSet(); done.add(epKey);
  localStorage.setItem('nms_'+p+'_ep_done', JSON.stringify([...done]));
  // Refresh sidebar checkmarks
  _refreshSidebarDone();
}
function _refreshSidebarDone(){
  const done=_epDoneSet();
  document.querySelectorAll('.ep-item[data-epkey]').forEach(el=>{
    const badge=el.querySelector('.ep-done');
    if(badge) badge.style.opacity=done.has(el.dataset.epkey)?'1':'0';
  });
}

let _fcAllCards=[],_fcCards=[],_fcEps=[],_fcIdx=0,_fcFlipped=false;
let _fcFilter=new Set(); // empty = all episodes

async function openFlashcards(){
  document.getElementById('fc-overlay').classList.add('open');
  document.getElementById('fc-modal').innerHTML='<div style="text-align:center;padding:60px 20px;"><div style="font-size:40px;margin-bottom:14px;">⏳</div><div style="font-size:15px;color:var(--warm-600);">단어 불러오는 중...<br><small>Loading vocabulary...</small></div></div>';
  await _sharedSetsReady;
  const _lvRaw=(DATA&&DATA.level)||(typeof curLevel!=='undefined'?curLevel:'Level 1');
  const lv=(_lvRaw==='L2'||_lvRaw==='Level 2')?'L2':'L1';
  _fcEps=(lv==='L2'?L2_EPISODES:L1_EPISODES).filter(ep=>!ep.disabled);
  const cards=[];
  await Promise.all(_fcEps.map(async(ep)=>{
    const epKey=lv+'_'+ep.id;
    let data=EPISODE_DATA[epKey];
    if(!data){
      try{const r=await fetch('data/nhs/'+lv+'/'+ep.id+'.json');if(r.ok){data=await r.json();_resolveRefs(data);EPISODE_DATA[epKey]=data;}}catch(e){return;}
    }
    if(!data||!data.vocab)return;
    data.vocab.forEach(cat=>{
      (cat.items||[]).forEach(item=>{
        if(!item.korean||!item.english)return;
        cards.push({korean:item.korean,rom:item.romanization||'',english:item.english,emoji:item.emoji||'📖',note:item.note||'',epId:ep.id,ep:ep.label,cat:(cat.category||'').replace(/^[\u{1F300}-\u{1FAD6}\s]+/u,'').trim()});
      });
    });
  }));
  _fcAllCards=cards; _fcFilter=new Set();
  _fcApplyFilter();
}

function _fcApplyFilter(){
  const pool=_fcFilter.size===0?_fcAllCards:_fcAllCards.filter(c=>_fcFilter.has(c.epId));
  const rev=_fcReviewSet();
  const revCards=shuffleArr(pool.filter(c=>rev.has(_fcCardId(c))));
  const otherCards=shuffleArr(pool.filter(c=>!rev.has(_fcCardId(c))));
  _fcCards=[...revCards,...otherCards].slice(0,25);
  _fcIdx=0; _fcFlipped=false; _renderFC();
}

function _fcChip(epId){
  if(epId===null){_fcFilter.clear();}
  else{if(_fcFilter.has(epId))_fcFilter.delete(epId);else _fcFilter.add(epId);}
  _fcApplyFilter();
}

function _fcClose(){document.getElementById('fc-overlay').classList.remove('open');}
function _fcShuffle(){_fcApplyFilter();}
function _fcFlip(){
  _fcFlipped=!_fcFlipped;
  const c=document.getElementById('fc-card-inner');
  if(c) c.classList.toggle('flipped',_fcFlipped);
  const tw=document.getElementById('fc-type-wrap');
  if(tw) tw.style.display=_fcFlipped?'block':'none';
  if(!_fcFlipped){
    const inp=document.getElementById('fc-type-input');
    if(inp){inp.value='';inp.style.borderColor='';inp.style.background='';}
    const disp=document.getElementById('fc-type-disp');
    if(disp) disp.innerHTML='';
  } else {
    // focus input when flipped to back
    setTimeout(()=>{const inp=document.getElementById('fc-type-input');if(inp)inp.focus();},50);
  }
}
function _fcPrev(){if(_fcIdx>0){_fcIdx--;_fcFlipped=false;_renderFC();}}
function _fcNext(){if(_fcIdx<_fcCards.length-1){_fcIdx++;_fcFlipped=false;_renderFC();}}
function _fcUpdateTyping(input, target){
  const disp=document.getElementById('fc-type-disp');
  if(!disp)return;
  const typed=input.value;
  if(typed===target){
    disp.innerHTML='<span style="color:#16a34a;font-size:18px;font-weight:800;">🎉 정답!</span>';
    input.style.borderColor='#22c55e'; input.style.background='#f0fdf4'; return;
  }
  let h='';
  for(let i=0;i<target.length;i++){
    const ch=esc(target[i]);
    if(i<typed.length){
      h+='<span style="color:'+(typed[i]===target[i]?'#16a34a':'#dc2626')+';font-weight:800;">'+ch+'</span>';
    }else{
      h+='<span style="color:#cbd5e1;">'+ch+'</span>';
    }
  }
  disp.innerHTML=h;
  input.style.borderColor=typed.length?'var(--amber)':'var(--gray-200)';
  input.style.background='';
}

function _fcMarkAndNext(isReview){
  _fcMark(_fcCards[_fcIdx], isReview);
  if(_fcIdx<_fcCards.length-1){_fcIdx++;_fcFlipped=false;_renderFC();}
  else{
    // End of deck — reshuffle with SRS priority
    _fcApplyFilter();
  }
}

function showIrregQ(){

let curWriteChar=WRITE_CHARS[0];
function selectWriteChar(kr){
  curWriteChar=WRITE_CHARS.find(c=>c.kr===kr)||WRITE_CHARS[0];
  document.querySelectorAll('.wchar-btn').forEach(b=>b.classList.toggle('active',b.textContent===kr));
  const gc=document.getElementById('wguide-char'),gr=document.getElementById('wguide-rom');
  if(gc)gc.textContent=curWriteChar.kr;if(gr)gr.textContent=curWriteChar.rom;

function initWritingCanvas(){
  wCanvas=document.getElementById('writing-canvas');
  if(!wCanvas)return;
  wCtx=wCanvas.getContext('2d');
  wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;wCtx.lineCap='round';wCtx.lineJoin='round';
  drawGridLines();
  wCanvas.addEventListener('mousedown',e=>{const r=wCanvas.getBoundingClientRect();wDrawing=true;wLX=e.clientX-r.left;wLY=e.clientY-r.top;});
  wCanvas.addEventListener('mousemove',e=>{if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;});
  wCanvas.addEventListener('mouseup',()=>wDrawing=false);
  wCanvas.addEventListener('mouseleave',()=>wDrawing=false);
  wCanvas.addEventListener('touchstart',e=>{e.preventDefault();const r=wCanvas.getBoundingClientRect();const t=e.touches[0];wDrawing=true;wLX=t.clientX-r.left;wLY=t.clientY-r.top;},{passive:false});
  wCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!wDrawing)return;const r=wCanvas.getBoundingClientRect();const t=e.touches[0];const x=t.clientX-r.left,y=t.clientY-r.top;wCtx.beginPath();wCtx.moveTo(wLX,wLY);wCtx.lineTo(x,y);wCtx.stroke();wLX=x;wLY=y;},{passive:false});
  wCanvas.addEventListener('touchend',()=>wDrawing=false);
}
function drawGridLines(){
  if(!wCtx||!wCanvas)return;
  const w=wCanvas.width,h=wCanvas.height;
  wCtx.clearRect(0,0,w,h);
  wCtx.save();wCtx.strokeStyle='#e8e8e8';wCtx.lineWidth=1;
  wCtx.beginPath();wCtx.moveTo(w/2,0);wCtx.lineTo(w/2,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,h/2);wCtx.lineTo(w,h/2);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(0,0);wCtx.lineTo(w,h);wCtx.stroke();
  wCtx.beginPath();wCtx.moveTo(w,0);wCtx.lineTo(0,h);wCtx.stroke();
  wCtx.strokeStyle='#cccccc';wCtx.lineWidth=1.5;wCtx.strokeRect(2,2,w-4,h-4);
  wCtx.restore();wCtx.strokeStyle='#1a1a1a';wCtx.lineWidth=4;
}
function clearCanvas(){if(!wCtx||!wCanvas)return;drawGridLines();}

async function setLevel(btn){
  await _epIdxReady;
  const _lv=btn.textContent.trim();
  if(NHS_IS_TRIAL&&_lv!=='Level 1'&&_lv!=='Basics'){
    alert('체험판에서는 Level 1의 일부 에피소드만 이용할 수 있어요.\n전체 이용은 hangeulquest@gmail.com으로 문의해 주세요!\n\nThis trial covers a few Level 1 episodes only. Email hangeulquest@gmail.com for full access.');
    return;
  }
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curLevel=btn.textContent.trim();
  const hdr=document.querySelector('.sidebar-hdr,.sidebar-hdr-amber');
  if(curLevel==='Basics'){
    if(hdr){hdr.className='sidebar-hdr-amber';hdr.innerHTML='🌱 기초반 · Basics';}
    buildBasicsSidebar();
    loadBasics(curBasicsTopic);
  }else{
    if(hdr){hdr.className='sidebar-hdr';hdr.innerHTML='📺 Episodes';}
    const lv=curLevel==='Level 5'?'L5':curLevel==='Level 4'?'L4':curLevel==='Level 3'?'L3':curLevel==='Level 2'?'L2':'L1';
    if(hdr){hdr.className='sidebar-hdr';hdr.innerHTML='📺 '+curLevel;}
    buildSidebar(lv);
    loadEp('ep01',lv);
  }
}

function buildBasicsSidebar(){
  const list=document.getElementById('ep-list');
  list.innerHTML=
    (NHS_IS_TRIAL?'':'<a href="start.html" target="_blank" style="display:block;margin:0 0 10px;padding:9px 14px;background:linear-gradient(135deg,#0a2540,#0d3d5c);border-radius:10px;text-decoration:none;color:#4ecdc4;font-size:12px;font-weight:700;">🗺 학습 경로 보기 · Learning Roadmap</a>')
    +BASICS_TOPICS.map(t=>
    '<div class="basics-topic-item'+(t.id===curBasicsTopic?' active':'')+'" id="bt-'+t.id+'" onclick="loadBasics(\''+t.id+'\')">'
    +'<div class="basics-topic-icon">'+t.icon+'</div>'
    +'<div class="basics-topic-name">'+t.label+'<span class="basics-topic-name-en">'+t.en+'</span></div>'
    +'</div>').join('');
}

function loadBasics(topicId){
  curBasicsTopic=topicId;
  document.querySelectorAll('.basics-topic-item').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('bt-'+topicId);
  if(item)item.classList.add('active');
  const topic=BASICS_TOPICS.find(t=>t.id===topicId);
  if(!topic)return;
  document.getElementById('content-area').innerHTML=
    '<div style="width:100%;max-width:860px;margin:0 auto;padding:24px;box-sizing:border-box;">'
    +'<div class="basics-header"><div class="basics-icon-big">'+topic.icon+'</div>'
    +'<div><div class="basics-title-kr">'+topic.label+'</div><div class="basics-title-en">'+topic.en+'</div></div></div>'
    +'<div id="basics-body"></div></div>';
  const body=document.getElementById('basics-body');
  if(topicId==='hangul')    body.innerHTML=buildHangul();
  if(topicId==='structure') body.innerHTML=buildStructure();
  if(topicId==='greetings') body.innerHTML=buildGreetings();
  if(topicId==='numbers')   body.innerHTML=buildNumbers();
  if(topicId==='writing')   body.innerHTML=buildWriting();
  if(topicId==='verbs')     body.innerHTML=buildVerbs();
  if(topicId==='speaking')  body.innerHTML=buildSpeaking();
  if(topicId==='questions') body.innerHTML=buildQuestions();
  if(topicId==='honorifics')body.innerHTML=buildHonorifics();
  if(topicId==='spacing')  body.innerHTML=buildSpacing();
  if(topicId==='hangul')  requestAnimationFrame(()=>updateSylResult());
  if(topicId==='writing') requestAnimationFrame(()=>initWritingCanvas());
  if(topicId==='verbs')   requestAnimationFrame(()=>renderVerbGame());
  if(topicId==='spacing') requestAnimationFrame(()=>renderSpGame());
}

function switchBtab(pfx,tabId){
  document.querySelectorAll('[id^="'+pfx+'-"]').forEach(p=>{if(p.classList.contains('btab-panel'))p.classList.remove('active');});
  document.querySelectorAll('[data-btab-group="'+pfx+'"]').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById(pfx+'-'+tabId);if(p)p.classList.add('active');
  document.querySelectorAll('[data-btab-group="'+pfx+'"][data-tab="'+tabId+'"]').forEach(b=>b.classList.add('active'));
}

function buildHangul(){
  const tabs=[['cons','자음 Consonants'],['vowels','모음 Vowels'],['batchim','받침 Batchim'],['syllable','음절 Syllables']];
  return '<div class="basics-intro">한글(Hangul)은 1443년 세종대왕이 만든 소리 문자예요. 자음 19개 + 모음 21개로 이루어져 있어요.<br><em>Hangul is a phonetic alphabet invented by King Sejong in 1443.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-hangul" data-tab="'+id+'" onclick="switchBtab(\'bp-hangul\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-hangul-cons" class="btab-panel active">'+buildConsPanel()+'</div>'
    +'<div id="bp-hangul-vowels" class="btab-panel">'+buildVowPanel()+'</div>'
    +'<div id="bp-hangul-batchim" class="btab-panel">'+buildBatchimPanel()+'</div>'
    +'<div id="bp-hangul-syllable" class="btab-panel">'+buildSylPanel()+'</div>';
}
function hcHtml(item){
  return '<div class="hcard" onclick="speak(\''+item.kr+'\''+(item.audio?',\''+item.audio+'\'':'')+')">'
    +'<div class="hcard-kr">'+item.kr+'</div>'
    +(item.name?'<div class="hcard-name">'+item.name+'</div>':'')
    +'<div class="hcard-rom">'+item.rom+'</div>'
    +'<div class="hcard-ex">'+item.ex+'</div></div>';
}
function buildConsPanel(){
  return '<div class="hangul-section-title">기본 자음 · Basic Consonants (14)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(0,14).map(hcHtml).join('')+'</div>'
    +'<div class="hangul-section-title">쌍자음 · Double Consonants (5)</div>'
    +'<div class="hangul-grid">'+CONSONANTS.slice(14).map(hcHtml).join('')+'</div>'
    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Consonants need a vowel to be voiced!</strong> They cannot stand alone as a syllable.<br>'
    +'자음은 홀로 발음될 수 없어요 — 반드시 모음과 함께 써야 해요.<br><br>'
    +'⚠️ The same consonant can sound different as an <strong>initial (첫소리)</strong> vs. <strong>final consonant (받침소리)</strong>.<br>'
    +'예: ㄱ → initial: <em>g</em> (가) / final: <em>k</em> (국) · Final consonants are always one of 7 representative sounds.</div>';

function buildVowPanel(){
  return '<div class="hangul-section-title">기본 모음 · Simple Vowels (10)</div>'
    +'<div class="hangul-grid">'+VOWELS.slice(0,10).map(hcHtml).join('')+'</div>'

    +'<div class="basics-intro" style="margin-top:12px;font-size:12px;">💡 <strong>Vowel placement depends on shape:</strong><br>'
    +'세로 모음 (ㅏ ㅑ ㅓ ㅕ ㅣ) — consonant is on the <strong>left</strong>, vowel on the <strong>right</strong>: 가 나 다<br>'
    +'가로 모음 (ㅗ ㅛ ㅜ ㅠ ㅡ) — consonant is on <strong>top</strong>, vowel <strong>below</strong>: 고 노 도</div>';
}

    {sound:'ㄷ',rom:'t  (읃)',tts:'읃',audio:'data/elem/level1/TTS/batchim/06_읃.mp3',ex:'곧 (straight)',members:[{kr:'ㄷ',ex:'곧'},{kr:'ㅅ',ex:'옷'},{kr:'ㅆ',ex:'있다'},{kr:'ㅈ',ex:'낮'},{kr:'ㅊ',ex:'꽃'},{kr:'ㅌ',ex:'끝'},{kr:'ㅎ',ex:'좋다'}]},

    {sound:'ㅁ',rom:'m  (음)',tts:'음',audio:'data/elem/level1/TTS/batchim/10_음.mp3',ex:'봄 (spring)',members:[{kr:'ㅁ',ex:'봄'}]},
    {sound:'ㅂ',rom:'p  (읍)',tts:'읍',audio:'data/elem/level1/TTS/batchim/12_읍.mp3',ex:'밥 (rice)',members:[{kr:'ㅂ',ex:'밥'},{kr:'ㅍ',ex:'앞'}]},
    {sound:'ㅇ',rom:'ng (응)',tts:'응',audio:'data/elem/level1/TTS/batchim/14_응.mp3',ex:'강 (river)',members:[{kr:'ㅇ',ex:'강'}]},
  ];
  const grpHtml=groups.map(g=>{

}
