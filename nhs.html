// ── GREETINGS RENDER ───────────────────────────────────
// ══════════════════════════════════════════════════════
function buildGreetings(){
  // 기본 인사 — 반말 | Casual 존댓말 | Formal 존댓말 3열 비교표
  function speakCell(txt){
    if(!txt) return '<td style="color:var(--gray-200);text-align:center;">—</td>';
    return '<td style="cursor:pointer" onclick="speakTTS(\''+txt.replace(/'/g,"\\'")+'\')">'+txt+' <span class="greet-speak-icon">🔊</span></td>';
  }
  function gTable(data){
    let rows='<tr><th>반말</th><th>Casual 존댓말</th><th>Formal 존댓말</th><th>뜻 · Meaning</th></tr>';
    data.forEach(group=>{
      rows+='<tr><td colspan="4" style="background:var(--teal-50);font-weight:800;color:var(--teal-dark);font-size:13px;padding:8px 12px;">'+group.cat+' <span style="font-weight:400;color:var(--warm-400);font-size:11px;">· '+group.cat_en+'</span></td></tr>';
      if(group.tip) rows+='<tr><td colspan="4" style="padding:0;border-top:none;"><div class="farewell-tip" style="margin:8px 12px;">'+group.tip+'</div></td></tr>';
      group.rows.forEach(r=>{
        rows+='<tr>'+speakCell(r.ban)+speakCell(r.cas)+speakCell(r.for_)+'<td style="color:var(--warm-500);font-size:12px;font-style:italic;text-align:center;">'+(r.en||'—')+'</td></tr>';
      });
    });
    return '<table class="structure-ex-table">'+rows+'</table>';
  }
  // 교실 표현 카드 (텍스트 중심)
  function cCards(list){
    return list.map(c=>'<div class="class-card" onclick="speakTTS(\''+c.kr+'\')">'
      +'<div class="class-kr">'+c.kr+' <span class="greet-speak-icon">🔊</span></div>'
      +'<div class="class-rom">'+c.rom+'</div>'
      +'<div class="class-en">'+c.en+'</div></div>').join('');
  }
  // Usage 탭 — 반말/Casual 존댓말/Formal 존댓말 언제 쓰는지 가이드
  const usageCards=[
    {emoji:'😎',title:'반말 Banmal',color:'coral',who:'친구, 나보다 어리거나 아주 가까운 사이',who_en:'Friends, younger people, very close relationships',ex:'안녕! 뭐 해?',ex_en:'Hey! What are you doing?'},
    {emoji:'🙂',title:'Casual 존댓말 (해요체)',color:'teal',who:'처음 만난 사람, 어른, 선생님과 일상 대화 — 가장 흔히 쓰는 존댓말',who_en:'Strangers, elders, everyday talk with teachers — the most common polite form',ex:'안녕하세요! 뭐 하세요?',ex_en:'Hello! What are you doing?'},
    {emoji:'🎙️',title:'Formal 존댓말 (합쇼체)',color:'purple',who:'발표, 뉴스, 방송, 면접, 아주 격식 있는 자리',who_en:'Presentations, news, broadcasts, interviews, very formal settings',ex:'안녕하십니까! 발표를 시작하겠습니다.',ex_en:"Hello! I'll begin the presentation."},
  ];
  const usageTab='<div class="basics-intro">같은 말도 상대와 상황에 따라 3가지로 달라져요!<br><em>The same phrase changes depending on who you\'re talking to.</em></div>'
    +usageCards.map(u=>'<div class="vconj-verb-card" style="margin-bottom:12px;">'
      +'<div class="vconj-section-title" style="margin:0 0 8px;">'+u.emoji+' '+u.title+'</div>'
      +'<div style="font-size:12.5px;color:var(--gray-900);margin-bottom:4px;"><strong>누구에게?</strong> '+u.who+'</div>'
      +'<div style="font-size:11px;color:var(--warm-400);margin-bottom:8px;"><em>'+u.who_en+'</em></div>'
      +'<div class="qna-bubble a-bubble" style="cursor:pointer" onclick="speakTTS(\''+u.ex+'\')">'+u.ex+' 🔊<br><span style="font-size:11px;color:var(--warm-500)">'+u.ex_en+'</span></div>'
    +'</div>').join('')
    +'<div class="structure-note" style="background:var(--amber-lt);border-color:#e8b86a;color:var(--amber-600);margin-top:8px;">'
    +'⭐ <strong>빠른 판단법 · Quick Guide</strong><br>'
    +'친구·동생 → 반말 &nbsp;|&nbsp; 처음 보는 사람·어른 → Casual 존댓말 &nbsp;|&nbsp; 발표·방송 → Formal 존댓말<br>'
    +'<em>Friends/younger → Banmal | Strangers/elders → Casual polite | Presentations/broadcast → Formal polite</em>'
    +'</div>';
  const tabs=[['basic','👋 기본 인사'],['classroom','🏫 교실 표현'],['usage','📌 Usage']];
  return '<div class="basics-intro">클릭하면 발음을 들을 수 있어요! 선생님 앞에서는 항상 존댓말을 써요.<br><em>Click any cell to hear it. Always use formal speech with your teacher.</em></div>'
    +'<div class="btab-bar">'+tabs.map(([id,lbl],i)=>'<button class="btab'+(i===0?' active':'')+'" data-btab-group="bp-greet" data-tab="'+id+'" onclick="switchBtab(\'bp-greet\',\''+id+'\')">'+lbl+'</button>').join('')+'</div>'
    +'<div id="bp-greet-basic" class="btab-panel active">'+gTable(GREETINGS_TABLE)+'</div>'
    +'<div id="bp-greet-classroom" class="btab-panel">'
      +'<div class="class-cols">'
        +'<div class="class-col">'
          +'<div class="class-col-hdr teacher-hdr">🎓 선생님이 말해요<br><em>Teacher says</em></div>'
          +cCards(CLASSROOM_TEACHER)
        +'</div>'
        +'<div class="class-col">'
          +'<div class="class-col-hdr student-hdr">🙋 학생이 말해요<br><em>Student says</em></div>'
          +cCards(CLASSROOM_STUDENT)
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div id="bp-greet-usage" class="btab-panel">'+usageTab+'</div>';
}

iv class="num-card" onclick="speakTTS(&#39;시월&#39;)"><div class="num-card-num">10월</div><div class="num-card-kr">시월</div><div class="num-card-rom">siwol</div><div class="num-card-hint">십월 ❌</div></div><div class="num-card" onclick="speakTTS(&#39;십일월&#39;)"><div class="num-card-num">11월</div><div class="num-card-kr">십일월</div><div class="num-card-rom">sibiwol</div></div><div class="num-card" onclick="speakTTS(&#39;십이월&#39;)"><div class="num-card-num">12월</div><div class="num-card-kr">십이월</div><div class="num-card-rom">sibiwol2</div></div></div><div class="vconj-section-title">📆 일 · Days of the Month</div><div class="structure-note" style="margin-bottom:10px;">모두 한자어 숫자 + 일. 11일부터는 십일일, 십이일... 이십일일 순서.</div><div class="num-grid" style="grid-template-columns:repeat(auto-fill,minmax(80px,1fr));margin-bottom:22px;"><div class="num-card" onclick="speakTTS(&#39;일일&#39;)"><div class="num-card-num">1일</div><div class="num-card-kr">일일</div><div class="num-card-rom"></div><div class="num-card-hint">하루</div></div><div class="num-card" onclick="speakTTS(&#39;이일&#39;)"><div class="num-card-num">2일</div><div class="num-card-kr">이일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;삼일&#39;)"><div class="num-card-num">3일</div><div class="num-card-kr">삼일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;사일&#39;)"><div class="num-card-num">4일</div><div class="num-card-kr">사일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;오일&#39;)"><div class="num-card-num">5일</div><div class="num-card-kr">오일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;육일&#39;)"><div class="num-card-num">6일</div><div class="num-card-kr">육일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;칠일&#39;)"><div class="num-card-num">7일</div><div class="num-card-kr">칠일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;팔일&#39;)"><div class="num-card-num">8일</div><div class="num-card-kr">팔일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;구일&#39;)"><div class="num-card-num">9일</div><div class="num-card-kr">구일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;십일&#39;)"><div class="num-card-num">10일</div><div class="num-card-kr">십일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;십오일&#39;)"><div class="num-card-num">15일</div><div class="num-card-kr">십오일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;이십일&#39;)"><div class="num-card-num">20일</div><div class="num-card-kr">이십일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;이십오일&#39;)"><div class="num-card-num">25일</div><div class="num-card-kr">이십오일</div><div class="num-card-rom"></div></div><div class="num-card" onclick="speakTTS(&#39;삼십일일&#39;)"><div class="num-card-num">31일</div><div class="num-card-kr">삼십일일</div><div class="num-card-rom"></div></div></div><div class="vconj-section-title">🗓️ 요일 · Days of the Week</div><div class="num-grid" style="grid-template-columns:repeat(auto-fill,minmax(90px,1fr));margin-bottom:22px;"><div class="num-card" onclick="speakTTS(&#39;월요일&#39;)"><div style="font-size:20px;">😐</div><div class="num-card-kr" style="font-size:16px;">월요일</div><div class="num-card-rom" style="font-size:10px;">Monday</div></div><div class="num-card" onclick="speakTTS(&#39;화요일&#39;)"><div style="font-size:20px;">😐</div><div class="num-card-kr" style="font-size:16px;">화요일</div><div class="num-card-rom" style="font-size:10px;">Tuesday</div></div><div class="num-card" onclick="speakTTS(&#39;수요일&#39;)"><div style="font-size:20px;">😊</div><div class="num-card-kr" style="font-size:16px;">수요일</div><div class="num-card-rom" style="font-size:10px;">Wednesday</div></div><div class="num-card" onclick="speakTTS(&#39;목요일&#39;   // ── 큰 숫자 탭 콘텐츠 ──
  const bigNumTab =
    '<div class="basics-intro">한국어는 <strong>4자리</strong>씩 끊어요! 영어(3자리)와 달리 <strong>만·억·조</strong>가 핵심 단위예요.<br><em>Korean groups by 4 digits — not 3. The key units are 만, 억, 조.</em></div>'

    // Key units 박스
    +'<div class="bignum-key-row">'
      +'<div class="bignum-key-card teal">'
        +'<div class="bignum-key-num">10,000</div>'

    +'<tr><td><strong>Rule 2</strong></td><td>그 외 모음<br><em>All other vowels</em></td><td style="color:var(--teal-dark);font-weight:700">-어요</td><td onclick="speakTTS(\'먹어요\')" style="cursor:pointer">먹다 → <strong>먹어요</strong> 🔊</td></tr>'

  const tabRegular =

// ── 띄어쓰기 (WORD SPACING) GAME ───────────────────────
// ══════════════════════════════════════════════════════
const SP_DATA = [
  {chars:'나는한국어를배워요',  spaces:[2,6], en:'I am learning Korean.', hint:'나는 · 한국어를 · 배워요'},
  {chars:'저는밥을먹어요',      spaces:[2,4], en:'I eat rice.',           hint:'저는 · 밥을 · 먹어요'},
  {chars:'오늘날씨가좋아요',    spaces:[2,5], en:"Today\'s weather is nice.", hint:'오늘 · 날씨가 · 좋아요'},
  {chars:'저는한국사람이에요',  spaces:[2,4], en:'I am Korean.',          hint:'저는 · 한국 · 사람이에요'},
  {chars:'공원에서자전거를타요', spaces:[4,8], en:'I ride a bicycle in the park.', hint:'공원에서 · 자전거를 · 타요'},
  {chars:'어제친구하고공원에갔어요', spaces:[2,6,9], en:'Yesterday I went to the park with a friend.', hint:'어제 · 친구하고 · 공원에 · 갔어요'},
  {chars:'내일도서관에서공부할거예요', spaces:[2,7,10], en:'Tomorrow I will study at the library.', hint:'내일 · 도서관에서 · 공부할 · 거예요'},
  {chars:'이음식이정말맛있어요', spaces:[1,4,6], en:'This food is really delicious.', hint:'이 · 음식이 · 정말 · 맛있어요'},
  {chars:'할머니께서요리를하세요', spaces:[5,8], en:'Grandmother is cooking (honorific).', hint:'할머니께서 · 요리를 · 하세요'},
  {chars:'한국어공부가재미있어요', spaces:[3,6], en:'Korean study is fun.', hint:'한국어 · 공부가 · 재미있어요'},
];
let spIdx=0, spUserSpaces=[], spChecked=false;

function renderSpGame(){
  const box=document.getElementById('sp-game-box');
  if(!box)return;
  const d=SP_DATA[spIdx];
  const chars=[...d.chars];
  spUserSpaces=[];
  spChecked=false;
  let row='<div class="sp-char-row">';
  row+='<span class="sp-char">'+chars[0]+'</span>';
  for(let i=1;i<chars.length;i++){
    row+='<button class="sp-gap" id="spg-'+i+'" onclick="toggleSpGap('+i+')"></button>';
    row+='<span class="sp-char">'+chars[i]+'</span>';
  }
  row+='</div>';
  box.innerHTML=
    '<div class="sp-progress">'+SP_DATA.map((_,i)=>'<span class="sp-dot'+(i===spIdx?' sp-dot-cur':'')+'">&bull;</span>').join('')+'</div>'
    +'<div class="sp-en-label">'+d.en+'</div>'
    +'<div class="sp-hint-label">어디에 띄어야 할까요? Click between characters to add a space.</div>'
    +row
    +'<div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;">'
    +'<button class="sp-check-btn" id="sp-check-btn" onclick="checkSpGame()">확인 Check ✓</button>'
    +'</div>'
    +'<div id="sp-feedback" style="margin-top:14px;"></div>';
}

function toggleSpGap(idx){
  if(spChecked)return;
  const btn=document.getElementById('spg-'+idx);
  if(!btn)return;
  const pos=spUserSpaces.indexOf(idx);
  if(pos===-1){
    spUserSpaces.push(idx);
    btn.classList.add('sp-gap-on');
    btn.textContent='|';
  } else {
    spUserSpaces.splice(pos,1);
    btn.classList.remove('sp-gap-on');
    btn.textContent='';
  }
}

function checkSpGame(){
  if(spChecked)return;
  spChecked=true;
  const d=SP_DATA[spIdx];
  const correct=d.spaces;
  const chars=[...d.chars];
  let allRight=true;
  // Color each gap
  for(let i=1;i<chars.length;i++){
    const btn=document.getElementById('spg-'+i);
    if(!btn)continue;
    const userHas=spUserSpaces.includes(i);
    const shouldHave=correct.includes(i);
    if(shouldHave&&userHas){
      btn.classList.add('sp-gap-correct');btn.textContent='|';
    } else if(shouldHave&&!userHas){
      btn.classList.add('sp-gap-miss');btn.textContent='|'; allRight=false;
    } else if(!shouldHave&&userHas){
      btn.classList.add('sp-gap-wrong');allRight=false;
    }
  }
  const fb=document.getElementById('sp-feedback');
  if(allRight){
    fb.innerHTML='<div class="sp-result-ok">🎉 정답! · Correct!</div>'
      +'<div class="sp-hint-reveal">'+d.hint+'</div>';
    setTimeout(()=>nextSpGame(), 1800);
  } else {
    fb.innerHTML='<div class="sp-result-no">다시 확인해 보세요. · Check again!</div>'
      +'<div class="sp-hint-reveal">정답: '+d.hint+'</div>'
      +'<button class="sp-next-btn" onclick="nextSpGame()">다음 →</button>';
  }
  const cb=document.getElementById('sp-check-btn');
  if(cb)cb.disabled=true;
}

}

// ── SPEAKING PRACTICE ────────────────────────────────────


function nhsRecCleanup(){
  const r=_nhsRec;
  if(r.recording){try{r.recorder.stop();}catch(e){}}
  if(r.stream){r.stream.getTracks().forEach(t=>t.stop());r.stream=null;}
  if(r.blobURL){URL.revokeObjectURL(r.blobURL);r.blobURL=null;}
  r.recording=false;r.chunks=[];r.recorder=null;
  const sb=document.getElementById('speak-btn');
  if(sb){sb.textContent='🎙️';sb.title='따라녹음하기';sb.classList.remove('rec-on');sb.classList.add('rec-done');sb.disabled=false;}
}
async function nhsRecToggle(){
  const sb=document.getElementById('speak-btn');
  if(!sb)return;
  const r=_nhsRec;
  // Has recording → play back
  if(!r.recording&&r.blobURL){
    const a=new Audio(r.blobURL);
    sb.textContent='▶';sb.disabled=true;
    a.onended=()=>{URL.revokeObjectURL(r.blobURL);r.blobURL=null;sb.textContent='🎙️';sb.title='다시 녹음하기';sb.classList.remove('rec-done');sb.disabled=false;};
    a.play();
    return;
  }
  // Recording → stop
  if(r.recording){
    try{r.recorder.stop();}catch(e){}
    return;
  }
  // Idle → start recording
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('이 환경에서는 녹음을 지원하지 않아요.');return;
  }
  try{
    r.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    if(r.blobURL){URL.revokeObjectURL(r.blobURL);r.blobURL=null;}
    r.chunks=[];
    r.recorder=new MediaRecorder(r.stream);
    r.recorder.ondataavailable=e=>{if(e.data&&e.data.size)r.chunks.push(e.data);};
    r.recorder.onstop=()=>{
      r.blobURL=URL.createObjectURL(new Blob(r.chunks,{type:'audio/webm'}));
      r.recording=false;
      if(r.stream){r.stream.getTracks().forEach(t=>t.stop());r.stream=null;}
      const sb2=document.getElementById('speak-btn');
      if(sb2&&sb2.isConnected){sb2.textContent='👂';sb2.title='내발음듣기';sb2.classList.remove('rec-on');sb2.classList.add('rec-done');sb2.disabled=false;}
    };
    r.recorder.start();
    r.recording=true;
    sb.textContent='⏹';sb.title='정지';sb.classList.add('rec-on');sb.classList.remove('rec-done');
  }catch(e){
    alert('마이크 권한이 필요해요.');
  }
}

let _shadRec=null, _shadBtnEl=null, _shadResultId=null;

function nhsShadStop(){
  if(_shadRec){try{_shadRec.stop();}catch(e){}_shadRec=null;}
  if(_shadBtnEl){_shadBtnEl.textContent='🎤';_shadBtnEl.classList.remove('rec-on');}
  _shadBtnEl=null; _shadResultId=null;
}

function nhsShadToggle(){
  // Slide mode: shadow current scene line
  if(!DATA||!DATA.script)return;
  const line=DATA.script[sceneIdx];
  if(!line)return;
  const btn=document.getElementById('shad-btn');
  if(!btn)return;
  if(_shadRec){nhsShadStop();return;}
  _nhsShadStart(btn, line.text, 'shad-result', true);
}

function nhsShadLine(evt, targetText, resultId){
  evt.stopPropagation();
  const btn=evt.currentTarget;
  const fullResultId='shad-sr'+resultId;
  if(_shadRec){nhsShadStop(); return;}
  _nhsShadStart(btn, targetText, fullResultId, false);
}

function _nhsShadStart(btn, targetText, resultDivId, isGlobal){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Chrome 브라우저에서만 사용할 수 있어요. (설정 > 마이크 허용)');return;}
  const rec=new SR();
  _shadRec=rec; _shadBtnEl=btn; _shadResultId=resultDivId;
  rec.lang='ko-KR';
  rec.interimResults=true;
  rec.maxAlternatives=1;
  btn.textContent='⏹';btn.classList.add('rec-on');
  let final='';
  rec.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    _shadShow(resultDivId, targetText, final||interim, false, isGlobal);
  };
  rec.onend=()=>{
    _shadRec=null;
    btn.textContent='🎤';btn.classList.remove('rec-on');
    _shadBtnEl=null;
    _shadShow(resultDivId, targetText, final||(isGlobal?'(소리를 인식하지 못했어요)':'❓'), true, isGlobal);
  };
  rec.onerror=(e)=>{
    _shadRec=null;
    btn.textContent='🎤';btn.classList.remove('rec-on');
    _shadBtnEl=null;
    const msg=e.error==='no-speech'?'(소리를 인식하지 못했어요)':e.error==='not-allowed'?'(마이크 권한 필요)':'(인식 실패)';
    _shadShow(resultDivId, targetText, msg, true, isGlobal);
  };
  try{rec.start();}catch(e){_shadRec=null;btn.textContent='🎤';btn.classList.remove('rec-on');}
}

function _shadShow(divId, target, said, isFinal, isGlobal){
  if(isGlobal){
    // Global shad-result panel below caption
    const panel=document.getElementById('shad-result');
    if(!panel)return;
    panel.style.display='block';
    panel.innerHTML=
      '<div class="shad-label">🎤 내가 말한 것 · I said:</div>'
      +'<div class="shad-said">'+(said||'...')+'</div>'
      +(isFinal?'<div class="shad-orig">원문 · Original: '+esc(target)+'</div>':'');
  } else {
    // Inline result below the strip/video line
    const el=document.getElementById(divId);
    if(!el)return;
    el.style.display='block';
    el.innerHTML='🎤 <strong>'+(said||'...')+'</strong>'+(isFinal?' <span style="color:#aaa;font-size:10px;">| 원문: '+esc(target)+'</span>':'');
  }
}

// ═══════════════════════════ VERB DRILL GAME ═══════════════════════════
let vdState = {};

function vdInit(gramId) {
  const g = (DATA.grammar||[]).find(function(x){return x.id===gramId;});
  if(!g||!g.verb_drill) return;
  const drillCfg = g.verb_drill;
  const verbs = drillCfg.verbs||[];
  const tenses = ['present','past','future'];
  const tenseLabels = {present:'현재형 Present',past:'과거형 Past',future:'미래형 Future'};
  let allQ = [];
  verbs.forEach(function(v){
    tenses.forEach(function(t){
      allQ.push({verb:v, tense:t, tenseLabel:tenseLabels[t],
        correct:v[t], exp:v['exp_'+t]||''});
    });
  });
  allQ = allQ.sort(function(){return Math.random()-.5;}).slice(0, drillCfg.rounds||10);
  vdState[gramId] = {questions:allQ, idx:0, score:0, verbs:verbs};
  vdRender(gramId);
}

function vdBuildOpts(gramId, qIdx) {
  const st = vdState[gramId];
  const q = st.questions[qIdx];
  const correct = q.correct;
  const pool = st.verbs.map(function(v){return v[q.tense];}).filter(function(v){return v!==correct;});
  const shuffled = pool.sort(function(){return Math.random()-.5;});
  const opts = [correct, shuffled[0], shuffled[1]].sort(function(){return Math.random()-.5;});
  return opts;
}

function vdRender(gramId) {
  const st = vdState[gramId];
  const body = document.getElementById('vd-body-'+gramId);
  if(!body) return;
  if(st.idx >= st.questions.length) { vdRenderScore(gramId); return; }
  const q = st.questions[st.idx];
  const opts = vdBuildOpts(gramId, st.idx);
  const pct = Math.round(st.idx/st.questions.length*100);
  const isLast = st.idx === st.questions.length-1;
  const optHtml = opts.map(function(o,i){
    const oSafe = o.replace(/'/g,"\\'");
    const cSafe = q.correct.replace(/'/g,"\\'");
    return '<button class="vd-opt" onclick="vdAnswer(\''+gramId+'\','+i+',this,\''+oSafe+'\',\''+cSafe+'\')"><span class="vd-opt-lbl">○</span><span>'+o+'</span><button onclick="speakTTS(\''+oSafe+'\');event.stopPropagation();" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.5;margin-left:auto" tabindex="-1">🔊</button></button>';
  }).join('');
  body.innerHTML =
    '<div class="vd-prog-bar"><div class="vd-prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="vd-prog-label">'+st.idx+' / '+st.questions.length+'</div>'+
    '<div class="vd-q-box">'+
      '<div style="font-size:1.8rem">'+q.verb.emoji+'</div>'+
      '<div class="vd-verb">'+q.verb.dict+'</div>'+
      '<div class="vd-tense-badge">→ '+q.tenseLabel+'?</div>'+
      '<div class="vd-tag">'+q.verb.tag+'</div>'+
    '</div>'+
    '<div class="vd-opts" id="vd-opts-'+gramId+'">'+optHtml+'</div>'+
    '<div class="vd-exp" id="vd-exp-'+gramId+'">💡 '+q.exp+'</div>'+
    '<button class="vd-next-btn" id="vd-next-'+gramId+'" onclick="vdNext(\''+gramId+'\')">'+
      (isLast?'📊 결과 보기':'다음 →')+'</button>';
}

function vdAnswer(gramId, i, btn, chosen, correct) {
  const container = document.getElementById('vd-opts-'+gramId);
  if(!container) return;
  container.querySelectorAll('.vd-opt').forEach(function(b){
    b.disabled = true;
    const lbl = b.querySelector('.vd-opt-lbl');
    const txt = b.querySelector('span:nth-child(2)');
    const val = txt ? txt.textContent.trim() : '';
    if(val === correct){ b.classList.add('correct'); if(lbl)lbl.textContent='✓'; }
    else if(b===btn && chosen!==correct){ b.classList.add('wrong'); if(lbl)lbl.textContent='✗'; }
  });
  if(chosen===correct) vdState[gramId].score++;
  const exp = document.getElementById('vd-exp-'+gramId);
  if(exp) exp.classList.add('show');
  const nxt = document.getElementById('vd-next-'+gramId);
  if(nxt) nxt.classList.add('show');
  vdState[gramId].idx++;
}

function vdNext(gramId){ vdRender(gramId); }

function vdRenderScore(gramId) {
  const st = vdState[gramId];
  const body = document.getElementById('vd-body-'+gramId);
  if(!body) return;
  const total = st.questions.length;
  const pct = Math.round(st.score/total*100);
  var grade, gradeLabel, gradeColor;
  if(pct>=90){grade='🏆';gradeLabel='완벽해요! Perfect!';gradeColor='var(--teal)';}
  else if(pct>=70){grade='🌟';gradeLabel='잘했어요! Great job!';gradeColor='var(--blue)';}
  else if(pct>=50){grade='👍';gradeLabel='좋아요! Keep going!';gradeColor='#B45309';}
  else{grade='🌱';gradeLabel='다시 해봐요! Try again!';gradeColor='var(--coral)';}
  body.innerHTML =
    '<div class="vd-score-wrap">'+
      '<div class="vd-grade">'+grade+'</div>'+
      '<div class="vd-score-num" style="color:'+gradeColor+'">'+st.score+' <span style="font-size:1.2rem;color:var(--warm-500)">/ '+total+'</span></div>'+
      '<div class="vd-grade-label" style="color:'+gradeColor+'">'+gradeLabel+'</div>'+
      '<div class="vd-score-label">'+pct+'% 정답 · accuracy</div>'+
    '</div>'+
    '<button class="vd-restart-btn" onclick="vdInit(\''+gramId+'\')">↺ 다시 도전 / Play Again</button>';
}
